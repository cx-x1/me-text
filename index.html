<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PasteBin - Public JSONBin.io Storage</title>
    
    <link href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5.0.18/index.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Inter', sans-serif; background: #0d1117; color: #c9d1d9; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,.1); border-radius: 50%; border-top-color: #58a6ff; animation: spin 1s ease-in-out infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        pre { white-space: pre-wrap; word-wrap: break-word; }
        textarea, input { background: #161b22 !important; color: #c9d1d9 !important; border-color: #30363d !important; }
        textarea:focus, input:focus { border-color: #58a6ff !important; outline: none; }
        .modal-backdrop { background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); }
        .public-badge { background: linear-gradient(135deg, #00b4d8 0%, #0077b6 100%); }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    
    <nav class="bg-[#161b22] border-b border-[#30363d] sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center flex-wrap gap-3">
            <a href="#home" class="text-xl font-bold flex items-center gap-2 hover:text-[#58a6ff] transition">
                <i class="fa-solid fa-paste text-[#58a6ff]"></i> PasteBin
                <span class="text-xs public-badge px-2 py-1 rounded-full text-white">Public Bins</span>
            </a>
            <div class="flex gap-4 text-sm font-medium">
                <a href="#home" class="text-gray-300 hover:text-white transition">New Paste</a>
                <a href="#dashboard" class="text-gray-300 hover:text-white transition">My Pastes</a>
            </div>
        </div>
    </nav>

    <main id="app" class="container mx-auto px-4 py-8 flex-grow fade-in">
        <div class="text-center py-20">
            <div class="spinner"></div>
            <p class="mt-4 text-gray-500">Loading...</p>
        </div>
    </main>

    <!-- Password Modal -->
    <div id="passwordModal" class="fixed inset-0 modal-backdrop hidden items-center justify-center z-[100]">
        <div class="bg-[#161b22] border border-[#30363d] rounded-xl p-6 max-w-md w-full mx-4 shadow-2xl">
            <h3 class="text-xl font-bold text-white mb-2 flex items-center gap-2">
                <i class="fa-solid fa-lock text-[#58a6ff]"></i> Password Required
            </h3>
            <p class="text-gray-400 text-sm mb-4">This paste is protected. Enter the password to edit it.</p>
            <input type="password" id="modalPassword" 
                class="w-full px-4 py-3 rounded-md mb-4" 
                placeholder="Enter password..."
                autocomplete="current-password">
            <div id="modalError" class="text-red-400 text-sm mb-4 hidden">
                <i class="fa-solid fa-circle-xmark"></i> Incorrect password
            </div>
            <div class="flex gap-3">
                <button id="modalCancel" class="flex-1 bg-[#30363d] text-white py-2 px-4 rounded-md hover:bg-[#30363d]/80 transition font-bold">
                    Cancel
                </button>
                <button id="modalSubmit" class="flex-1 bg-[#238636] text-white py-2 px-4 rounded-md hover:bg-[#2ea043] transition font-bold">
                    Unlock
                </button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-5 right-5 bg-[#21262d] text-white px-6 py-3 rounded-lg shadow-xl transform translate-y-20 opacity-0 transition-all duration-300 flex items-center gap-3 z-50 border border-[#30363d]">
        <i id="toast-icon" class="fa-solid fa-circle-check text-green-400"></i>
        <span id="toast-msg"></span>
    </div>

    <script>
    // ============================================
    // PASTEBIN - PUBLIC JSONBin.io Storage
    // ============================================
    
    // YOUR API KEY (pre-configured)
    const YOUR_API_KEY = '$2a$10$9eJHjKaI3n.wv2RMQ8ggeeAINlSZyFLtGkk76kmh0kSq/mlbkpTDm';
    
    const app = {
        jsonbinApiKey: YOUR_API_KEY,
        jsonbinBinId: '',
        
        encode(str) {
            try { return btoa(unescape(encodeURIComponent(str))); } 
            catch(e) { return btoa(str); }
        },
        
        decode(str) {
            try { return decodeURIComponent(escape(atob(str))); } 
            catch(e) { return atob(str); }
        },
        
        async hashPassword(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            return hashHex;
        },
        
        escapeHtml(text) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return text.replace(/[&<>"']/g, m => map[m]);
        },
        
        showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toast-icon');
            document.getElementById('toast-msg').textContent = message;
            icon.className = type === 'error' 
                ? 'fa-solid fa-circle-xmark text-red-400' 
                : 'fa-solid fa-circle-check text-green-400';
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3000);
        },
        
        copy(text) {
            navigator.clipboard.writeText(text).then(() => {
                this.showToast('Copied!', 'success');
            }).catch(() => prompt('Copy:', text));
        },
        
        getBaseUrl() {
            return window.location.origin + window.location.pathname;
        },
        
        // ========================================
        // Create PUBLIC Bin on JSONBin.io
        // ========================================
        async createPublicJsonBin(data) {
            try {
                console.log('Creating PUBLIC bin with data:', data);
                
                const response = await fetch('https://api.jsonbin.io/v3/b', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': this.jsonbinApiKey
                    },
                    body: JSON.stringify({
                        ...data,
                        private: false  // 🔓 MAKE IT PUBLIC!
                    })
                });
                
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errorText}`);
                }
                
                const result = await response.json();
                console.log('✅ Public bin created:', result);
                
                // Public URL (no API key needed!)
                const publicUrl = `https://api.jsonbin.io/v3/b/${result.metadata.id}/latest`;
                
                return {
                    id: result.metadata.id,
                    url: publicUrl,
                    private: false
                };
            } catch (error) {
                console.error('Create Public Bin error:', error);
                this.showToast('Failed to create public bin: ' + error.message, 'error');
                return null;
            }
        },
        
        // ========================================
        // Create a paste with PUBLIC Bin
        // ========================================
        async createPaste(slug, content, password = null) {
            const pastes = JSON.parse(localStorage.getItem('my_pastes') || '[]');
            const filtered = pastes.filter(p => p.slug !== slug);
            
            let passwordHash = null;
            if (password) {
                passwordHash = await this.hashPassword(password);
            }
            
            const pasteData = {
                slug: slug,
                content: content,
                created: new Date().toISOString(),
                passwordHash: passwordHash
            };
            
            let jsonbinUrl = null;
            let jsonbinId = null;
            
            // Save to JSONBin.io as PUBLIC bin
            this.showToast('Creating public bin on JSONBin.io...', 'info');
            const binResult = await this.createPublicJsonBin(pasteData);
            
            if (binResult) {
                jsonbinUrl = binResult.url;
                jsonbinId = binResult.id;
                this.showToast('✅ Saved as PUBLIC bin! Anyone can access it directly.', 'success');
            } else {
                this.showToast('⚠️ Failed to create public bin, saving locally only', 'error');
            }
            
            const paste = {
                slug: slug,
                encoded: this.encode(content),
                created: new Date().toISOString(),
                passwordHash: passwordHash,
                jsonbinUrl: jsonbinUrl,
                jsonbinId: jsonbinId,
                isPublic: true
            };
            
            filtered.push(paste);
            localStorage.setItem('my_pastes', JSON.stringify(filtered));
            return paste;
        },
        
        // ========================================
        // Update existing paste
        // ========================================
        async updatePaste(slug, content, passwordHash) {
            const pastes = JSON.parse(localStorage.getItem('my_pastes') || '[]');
            const pasteIndex = pastes.findIndex(p => p.slug === slug);
            
            if (pasteIndex === -1) return null;
            
            const paste = pastes[pasteIndex];
            
            if (paste.passwordHash && paste.passwordHash !== passwordHash) {
                return { error: 'Invalid password' };
            }
            
            paste.encoded = this.encode(content);
            paste.updated = new Date().toISOString();
            
            // Update JSONBin.io if exists (keep it public)
            if (paste.jsonbinId) {
                const updateData = {
                    slug: slug,
                    content: content,
                    updated: new Date().toISOString(),
                    passwordHash: paste.passwordHash
                };
                
                try {
                    const response = await fetch(`https://api.jsonbin.io/v3/b/${paste.jsonbinId}`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-Master-Key': this.jsonbinApiKey
                        },
                        body: JSON.stringify(updateData)
                    });
                    
                    if (response.ok) {
                        this.showToast('Updated on JSONBin.io (public bin)', 'success');
                    }
                } catch (error) {
                    console.error('Update error:', error);
                }
            }
            
            pastes[pasteIndex] = paste;
            localStorage.setItem('my_pastes', JSON.stringify(pastes));
            return paste;
        },
        
        // ========================================
        // Get paste content
        // ========================================
        async getPasteContent(slug) {
            const pastes = JSON.parse(localStorage.getItem('my_pastes') || '[]');
            const paste = pastes.find(p => p.slug === slug);
            
            if (paste && paste.jsonbinId) {
                try {
                    // This URL is PUBLIC - no API key needed!
                    const response = await fetch(`https://api.jsonbin.io/v3/b/${paste.jsonbinId}/latest`);
                    if (response.ok) {
                        const data = await response.json();
                        if (data.record && data.record.content) {
                            return data.record.content;
                        }
                    }
                } catch (e) {
                    console.error('Failed to fetch from public bin:', e);
                }
            }
            
            if (paste) {
                try { return this.decode(paste.encoded); } catch(e) { return null; }
            }
            return null;
        },
        
        // ========================================
        // Generate URLs
        // ========================================
        getViewUrl(slug, content, passwordHash = null) {
            const encoded = this.encode(content);
            let url = `${this.getBaseUrl()}?view&slug=${slug}&data=${encodeURIComponent(encoded)}`;
            if (passwordHash) {
                url += `&pw=${passwordHash}`;
            }
            return url;
        },
        
        getJsonUrl(slug, content, jsonbinUrl = null) {
            if (jsonbinUrl) return jsonbinUrl;
            const encoded = this.encode(content);
            return `${this.getBaseUrl()}?api=json&slug=${slug}&data=${encodeURIComponent(encoded)}`;
        },
        
        getRawUrl(slug, content) {
            const encoded = this.encode(content);
            return `${this.getBaseUrl()}?api=raw&slug=${slug}&data=${encodeURIComponent(encoded)}`;
        },
        
        // ========================================
        // API Handler
        // ========================================
        handleApi() {
            const params = new URLSearchParams(window.location.search);
            const api = params.get('api');
            const slug = params.get('slug');
            const data = params.get('data');
            
            if (params.get('view') !== null && slug && data) return false;
            
            if (api === 'json' && slug && data) {
                try {
                    const content = this.decode(decodeURIComponent(data));
                    document.body.innerHTML = '';
                    document.head.innerHTML = '';
                    document.title = slug + ' - JSON API';
                    
                    const response = { slug: slug, content: content, timestamp: new Date().toISOString() };
                    const pre = document.createElement('pre');
                    pre.style.cssText = 'font-family:monospace;padding:20px;background:#0d1117;color:#58a6ff;min-height:100vh;margin:0;font-size:14px;line-height:1.6;';
                    pre.textContent = JSON.stringify(response, null, 2);
                    document.body.appendChild(pre);
                    return true;
                } catch(e) {
                    document.body.innerHTML = '<pre style="color:red;padding:20px;">Error decoding data</pre>';
                    return true;
                }
            }
            
            if (api === 'raw' && slug && data) {
                try {
                    const content = this.decode(decodeURIComponent(data));
                    document.body.innerHTML = '';
                    document.head.innerHTML = '';
                    const pre = document.createElement('pre');
                    pre.style.cssText = 'font-family:monospace;padding:20px;background:#0d1117;color:#c9d1d9;min-height:100vh;margin:0;white-space:pre-wrap;font-size:14px;';
                    pre.textContent = content;
                    document.body.appendChild(pre);
                    return true;
                } catch(e) {
                    document.body.innerHTML = '<pre style="color:red;padding:20px;">Error decoding data</pre>';
                    return true;
                }
            }
            return false;
        },

        renderApiInfo(container, jsonUrl, rawUrl, isPublic = true, binId = null) {
            const publicNote = isPublic ? `
                <div class="bg-green-900/30 border border-green-700/50 text-green-400 text-xs p-3 rounded-lg mb-4">
                    <i class="fa-solid fa-globe"></i> 
                    <strong>🌍 PUBLIC Bin!</strong> Anyone can access this JSON URL directly without any API key.
                    <br><small>Share this link with anyone - it works immediately!</small>
                </div>
            ` : '';

            container.innerHTML = `
                ${publicNote}
                <div class="bg-[#0d1117] rounded-lg p-4 border border-[#30363d]">
                    <p class="text-xs text-gray-400 mb-2 font-semibold">📦 PUBLIC JSON API (No Auth Required):</p>
                    <div class="flex items-center gap-2">
                        <code class="flex-1 text-xs text-green-400 break-all font-mono bg-[#161b22] p-2 rounded">${jsonUrl}</code>
                        <button onclick="app.copy('${jsonUrl}')" class="text-gray-400 hover:text-white p-2" title="Copy">
                            <i class="fa-solid fa-copy"></i>
                        </button>
                    </div>
                    ${binId ? `<p class="text-xs text-gray-500 mt-2">Bin ID: <code class="text-cyan-400">${binId}</code> (Public)</p>` : ''}
                </div>
                
                <div class="bg-[#0d1117] rounded-lg p-4 border border-[#30363d]">
                    <p class="text-xs text-gray-400 mb-2 font-semibold">📄 Raw Content (plain text):</p>
                    <div class="flex items-center gap-2">
                        <code class="flex-1 text-xs text-yellow-400 break-all font-mono bg-[#161b22] p-2 rounded">${rawUrl}</code>
                        <button onclick="app.copy('${rawUrl}')" class="text-gray-400 hover:text-white p-2" title="Copy">
                            <i class="fa-solid fa-copy"></i>
                        </button>
                    </div>
                </div>
                
                <div class="bg-[#0d1117] rounded-lg p-4 border border-[#30363d]">
                    <p class="text-xs text-gray-400 mb-2 font-semibold">💡 Test the Public API:</p>
                    <button onclick="window.open('${jsonUrl}', '_blank')" 
                        class="w-full bg-[#238636] text-white py-2 rounded-md hover:bg-[#2ea043] transition text-sm">
                        <i class="fa-solid fa-arrow-up-right-from-square"></i> Open JSON URL in new tab
                    </button>
                </div>
            `;
        },
        
        // ========================================
        // Render: View Paste (Public)
        // ========================================
        async renderView(container) {
            const params = new URLSearchParams(window.location.search);
            const slug = params.get('slug');
            const data = params.get('data');
            const urlPasswordHash = params.get('pw');
            
            if (!slug || !data) {
                container.innerHTML = `<div class="max-w-2xl mx-auto text-center py-20">...</div>`;
                return;
            }
            
            let content;
            try {
                content = this.decode(decodeURIComponent(data));
            } catch(e) {
                container.innerHTML = `<div class="text-center py-20 text-red-400">Error: Invalid data</div>`;
                return;
            }
            
            const pastes = JSON.parse(localStorage.getItem('my_pastes') || '[]');
            const localPaste = pastes.find(p => p.slug === slug);
            const realJsonUrl = localPaste?.jsonbinUrl || this.getJsonUrl(slug, content);
            const rawUrl = this.getRawUrl(slug, content);
            const storedPasswordHash = localPaste?.passwordHash;
            const isPublic = true;
            
            const isProtected = !!storedPasswordHash;
            const hasValidPassword = urlPasswordHash && storedPasswordHash && urlPasswordHash === storedPasswordHash;
            
            container.innerHTML = `
                <div class="max-w-4xl mx-auto">
                    <div class="bg-[#161b22] rounded-xl border border-[#30363d] mb-6">
                        <div class="p-5 border-b border-[#30363d] flex justify-between items-center flex-wrap gap-3">
                            <div>
                                <h1 class="text-xl font-bold font-mono text-[#58a6ff]">
                                    <i class="fa-solid fa-file-code"></i> /${slug}
                                </h1>
                                <div class="flex items-center gap-2 mt-2">
                                    <span class="text-xs bg-green-900 text-green-400 px-2 py-1 rounded-full">
                                        <i class="fa-solid fa-globe"></i> Public Bin
                                    </span>
                                    ${isProtected ? `<span class="text-xs text-yellow-400"><i class="fa-solid fa-lock"></i> Password Protected</span>` : ''}
                                </div>
                            </div>
                            <div class="flex gap-2 flex-wrap">
                                <button id="editBtn" class="bg-[#f0883e] text-white px-4 py-2 rounded-lg hover:bg-[#f0883e]/80 transition font-bold text-sm">
                                    <i class="fa-solid fa-pen-to-square"></i> Edit
                                </button>
                                <button onclick="app.copy('${realJsonUrl}')" class="bg-[#1f6feb] text-white px-4 py-2 rounded-lg hover:bg-[#1f6feb]/80 transition font-bold text-sm">
                                    <i class="fa-solid fa-code"></i> Copy JSON URL
                                </button>
                            </div>
                        </div>
                        <div class="p-6">
                            <pre class="text-sm bg-[#0d1117] p-5 rounded-lg border border-[#30363d] overflow-x-auto text-gray-200 font-mono">${this.escapeHtml(content)}</pre>
                        </div>
                    </div>
                    
                    <div class="bg-[#161b22] rounded-xl border border-[#30363d] p-6">
                        <h3 class="font-bold text-lg text-white mb-4">
                            <i class="fa-solid fa-plug text-[#58a6ff]"></i> Public API Access
                        </h3>
                        <div id="apiInfoContainer" class="space-y-4"></div>
                    </div>
                </div>
            `;

            const infoContainer = document.getElementById('apiInfoContainer');
            this.renderApiInfo(infoContainer, realJsonUrl, rawUrl, true, localPaste?.jsonbinId);

            document.getElementById('editBtn').addEventListener('click', async () => {
                if (!isProtected) {
                    this.renderEdit(document.getElementById('app'), slug, content, null);
                    return;
                }
                
                if (hasValidPassword) {
                    this.renderEdit(document.getElementById('app'), slug, content, urlPasswordHash);
                    return;
                }
                
                const password = await this.showPasswordModal();
                if (!password) return;
                
                const inputHash = await this.hashPassword(password);
                if (inputHash !== storedPasswordHash) {
                    this.showToast('Incorrect password', 'error');
                    return;
                }
                
                const editUrl = `${this.getBaseUrl()}?edit&slug=${slug}&data=${encodeURIComponent(this.encode(content))}&pw=${inputHash}`;
                window.location.href = editUrl;
            });
        },
        
        // ========================================
        // Render: Home Page
        // ========================================
        renderHome(container) {
            container.innerHTML = `
                <div class="max-w-3xl mx-auto bg-[#161b22] p-8 rounded-xl border border-[#30363d]">
                    <div class="bg-green-900/30 border border-green-700/50 rounded-lg p-4 mb-6">
                        <div class="flex items-center gap-3">
                            <i class="fa-solid fa-globe text-green-400 text-2xl"></i>
                            <div>
                                <p class="text-green-400 font-bold">✅ Public Bins Enabled!</p>
                                <p class="text-gray-400 text-sm">All pastes will be created as PUBLIC bins. Anyone can access the JSON URL directly.</p>
                            </div>
                        </div>
                    </div>
                    
                    <h2 class="text-2xl font-bold mb-2 text-white">
                        <i class="fa-solid fa-file-circle-plus text-[#58a6ff]"></i> Create New Paste
                    </h2>
                    
                    <form id="createForm" class="space-y-5 mt-6">
                        <div>
                            <label class="block text-sm font-semibold text-gray-300 mb-1">Slug (URL Name)</label>
                            <div class="flex">
                                <span class="inline-flex items-center px-3 rounded-l-md border border-r-0 border-[#30363d] bg-[#0d1117] text-gray-400 text-sm font-mono">/</span>
                                <input type="text" id="slug" required pattern="[a-zA-Z0-9_-]+" 
                                    class="flex-1 block w-full px-4 py-3 rounded-r-md font-mono" 
                                    placeholder="my-public-paste">
                            </div>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-semibold text-gray-300 mb-1">
                                <i class="fa-solid fa-lock text-[#58a6ff]"></i> Password (Optional)
                            </label>
                            <input type="password" id="password" 
                                class="block w-full px-4 py-3 rounded-md" 
                                placeholder="Leave empty for public paste">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-semibold text-gray-300 mb-1">Content</label>
                            <textarea id="content" required rows="14" 
                                class="block w-full px-4 py-3 rounded-md text-sm font-mono" 
                                placeholder="Paste your content here..."></textarea>
                        </div>
                        
                        <button type="submit" class="w-full bg-[#238636] text-white py-3 px-4 rounded-md hover:bg-[#2ea043] transition font-bold text-lg">
                            <i class="fa-solid fa-paper-plane"></i> Create Public Paste
                        </button>
                    </form>
                </div>
            `;
            
            document.getElementById('createForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const slug = document.getElementById('slug').value.trim().toLowerCase();
                const content = document.getElementById('content').value;
                const password = document.getElementById('password').value;
                
                if (!/^[a-zA-Z0-9_-]{3,50}$/.test(slug)) {
                    this.showToast('Invalid slug', 'error');
                    return;
                }
                
                const btn = e.target.querySelector('button[type="submit"]');
                btn.innerHTML = '<div class="spinner"></div> Creating Public Bin...';
                btn.disabled = true;

                const paste = await this.createPaste(slug, content, password);
                
                const viewUrl = this.getViewUrl(slug, content, paste.passwordHash);
                window.location.href = viewUrl;
            });
        },
        
        renderEdit(container, slug, content, passwordHash) {
            container.innerHTML = `
                <div class="max-w-3xl mx-auto bg-[#161b22] p-8 rounded-xl border border-[#30363d]">
                    <h2 class="text-2xl font-bold mb-2 text-white">
                        <i class="fa-solid fa-pen-to-square text-[#58a6ff]"></i> Edit Paste: /${slug}
                    </h2>
                    <form id="editForm" class="space-y-5 mt-6">
                        <textarea id="editContent" required rows="14" 
                            class="block w-full px-4 py-3 rounded-md text-sm font-mono">${this.escapeHtml(content)}</textarea>
                        <div class="flex gap-3">
                            <button type="button" onclick="history.back()" class="flex-1 bg-[#30363d] text-white py-3 px-4 rounded-md hover:bg-[#30363d]/80 transition font-bold">
                                Cancel
                            </button>
                            <button type="submit" class="flex-1 bg-[#238636] text-white py-3 px-4 rounded-md hover:bg-[#2ea043] transition font-bold">
                                Save Changes
                            </button>
                        </div>
                    </form>
                </div>
            `;
            
            document.getElementById('editForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const newContent = document.getElementById('editContent').value;
                const btn = e.target.querySelector('button[type="submit"]');
                btn.innerHTML = '<div class="spinner"></div> Saving...';
                btn.disabled = true;

                const result = await this.updatePaste(slug, newContent, passwordHash);
                
                if (result && result.error) {
                    this.showToast(result.error, 'error');
                    btn.innerHTML = 'Save Changes';
                    btn.disabled = false;
                    return;
                }
                
                this.showToast('Paste updated successfully!', 'success');
                setTimeout(() => {
                    const viewUrl = this.getViewUrl(slug, newContent, passwordHash);
                    window.location.href = viewUrl;
                }, 1000);
            });
        },
        
        renderDashboard(container) {
            const pastes = JSON.parse(localStorage.getItem('my_pastes') || '[]');
            container.innerHTML = `
                <div class="max-w-6xl mx-auto">
                    <h2 class="text-2xl font-bold text-white mb-6">
                        <i class="fa-solid fa-list text-[#58a6ff]"></i> My Pastes
                    </h2>
                    <div class="bg-[#161b22] rounded-xl border border-[#30363d] overflow-hidden">
                        ${pastes.length === 0 ? '<div class="text-center py-16">No pastes yet</div>' : `
                            <table class="w-full">
                                <thead>
                                    <tr class="bg-[#0d1117]">
                                        <th class="py-3 px-6 text-left">Slug</th>
                                        <th class="py-3 px-6 text-left">Created</th>
                                        <th class="py-3 px-6 text-left">Status</th>
                                        <th class="py-3 px-6 text-left">Actions</th>
                                     </tr>
                                </thead>
                                <tbody>
                                    ${pastes.slice().reverse().map(p => {
                                        let content;
                                        try { content = app.decode(p.encoded); } catch(e) { content = ''; }
                                        const viewUrl = app.getViewUrl(p.slug, content, p.passwordHash);
                                        return `
                                        <tr class="border-t border-[#30363d]">
                                            <td class="py-3 px-6 font-mono">/${p.slug}</td>
                                            <td class="py-3 px-6 text-sm text-gray-400">${new Date(p.created).toLocaleDateString()}</td>
                                            <td class="py-3 px-6"><span class="text-green-400 text-xs"><i class="fa-solid fa-globe"></i> Public</span></td>
                                            <td class="py-3 px-6">
                                                <a href="${viewUrl}" class="text-blue-400 hover:underline text-sm">View</a>
                                                <button onclick="app.deletePaste('${p.slug}')" class="text-red-400 hover:underline text-sm ml-3">Delete</button>
                                            </td>
                                         </tr>`;
                                    }).join('')}
                                </tbody>
                            </table>
                        `}
                    </div>
                </div>
            `;
        },
        
        deletePaste(slug) {
            if (confirm('Delete this paste?')) {
                const pastes = JSON.parse(localStorage.getItem('my_pastes') || '[]');
                const filtered = pastes.filter(p => p.slug !== slug);
                localStorage.setItem('my_pastes', JSON.stringify(filtered));
                this.showToast('Deleted!', 'success');
                this.renderDashboard(document.getElementById('app'));
            }
        },
        
        showPasswordModal() {
            return new Promise((resolve) => {
                const modal = document.getElementById('passwordModal');
                const input = document.getElementById('modalPassword');
                const error = document.getElementById('modalError');
                const submit = document.getElementById('modalSubmit');
                const cancel = document.getElementById('modalCancel');
                
                modal.classList.remove('hidden');
                modal.classList.add('flex');
                input.value = '';
                error.classList.add('hidden');
                input.focus();
                
                const cleanup = () => {
                    modal.classList.add('hidden');
                    modal.classList.remove('flex');
                    submit.removeEventListener('click', onSubmit);
                    cancel.removeEventListener('click', onCancel);
                };
                
                const onSubmit = () => {
                    const password = input.value;
                    if (!password) {
                        error.classList.remove('hidden');
                        return;
                    }
                    cleanup();
                    resolve(password);
                };
                
                const onCancel = () => {
                    cleanup();
                    resolve(null);
                };
                
                submit.addEventListener('click', onSubmit);
                cancel.addEventListener('click', onCancel);
            });
        },
        
        route() {
            const params = new URLSearchParams(window.location.search);
            const main = document.getElementById('app');
            
            if (this.handleApi()) return;
            
            if (params.get('edit') !== null) {
                const slug = params.get('slug');
                const data = params.get('data');
                const passwordHash = params.get('pw');
                if (slug && data) {
                    const content = this.decode(decodeURIComponent(data));
                    this.renderEdit(main, slug, content, passwordHash);
                    return;
                }
            } else if (params.get('view') !== null) {
                this.renderView(main);
                return;
            } else if (window.location.hash === '#dashboard') {
                this.renderDashboard(main);
                return;
            }
            this.renderHome(main);
        },
        
        init() {
            console.log('✅ App initialized with PUBLIC bin support');
            console.log('API Key configured:', this.jsonbinApiKey ? 'Yes' : 'No');
            this.route();
            window.addEventListener('hashchange', () => this.route());
        }
    };

    document.addEventListener('DOMContentLoaded', () => app.init());
    </script>
</body>
</html>
