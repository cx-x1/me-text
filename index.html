<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حفظ الأسماء في JSON - نظام تخزين متكامل</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tahoma', 'Arial', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        /* تأثير خلفية متحركة */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="10" cy="10" r="2" fill="rgba(255,255,255,0.1)"/><circle cx="90" cy="20" r="3" fill="rgba(255,255,255,0.1)"/><circle cx="50" cy="85" r="2" fill="rgba(255,255,255,0.1)"/></svg>');
            pointer-events: none;
        }

        .container {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 25px;
            padding: 40px;
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.3);
            max-width: 650px;
            width: 100%;
            backdrop-filter: blur(10px);
            animation: fadeIn 0.5s ease-in;
            position: relative;
            z-index: 1;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 15px;
            font-size: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 15px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: #555;
            font-weight: bold;
            font-size: 16px;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        input {
            flex: 1;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .button-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .button-group button {
            flex: 1;
            justify-content: center;
        }

        .btn-secondary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .btn-danger {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
        }

        .btn-success {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
        }

        .result {
            margin-top: 25px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 15px;
            min-height: 150px;
            display: none;
            border: 1px solid #e0e0e0;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result.show {
            display: block;
        }

        .result h3 {
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 18px;
        }

        .names-list {
            list-style: none;
            padding: 0;
            max-height: 300px;
            overflow-y: auto;
        }

        .names-list li {
            padding: 12px;
            background: white;
            margin: 8px 0;
            border-radius: 10px;
            border-right: 4px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
        }

        .names-list li:hover {
            transform: translateX(-5px);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .name-text {
            font-weight: bold;
            color: #333;
        }

        .name-date {
            font-size: 11px;
            color: #999;
        }

        .delete-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .delete-btn:hover {
            background: #ff3838;
            transform: scale(1.05);
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            padding: 10px;
            background: linear-gradient(135deg, #667eea20 0%, #764ba220 100%);
            border-radius: 10px;
            font-size: 14px;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state svg {
            margin-bottom: 10px;
            opacity: 0.5;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }
            
            h1 {
                font-size: 24px;
            }
            
            .input-wrapper {
                flex-direction: column;
            }
            
            button {
                width: 100%;
                justify-content: center;
            }
            
            .names-list li {
                flex-direction: column;
                gap: 8px;
                text-align: center;
            }
        }

        /* تخصيص شريط التمرير */
        .names-list::-webkit-scrollbar {
            width: 8px;
        }

        .names-list::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .names-list::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            z-index: 1000;
            animation: slideInRight 0.3s ease-out;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            <span>📝</span>
            نظام حفظ الأسماء
            <span>💾</span>
        </h1>
        <div class="subtitle">
            حفظ الأسماء في ملف JSON مع إمكانية التحميل والعرض
        </div>
        
        <div class="form-group">
            <label>✏️ أدخل الاسم الجديد:</label>
            <div class="input-wrapper">
                <input type="text" id="nameInput" placeholder="مثال: أحمد محمد" autocomplete="off">
                <button id="saveBtn">
                    <span>💾</span> حفظ الاسم
                </button>
            </div>
        </div>

        <div class="button-group">
            <button id="loadBtn" class="btn-secondary">
                <span>📋</span> عرض جميع الأسماء
            </button>
            <button id="downloadBtn" class="btn-success">
                <span>⬇️</span> تحميل ملف JSON
            </button>
            <button id="clearAllBtn" class="btn-danger">
                <span>🗑️</span> مسح الكل
            </button>
        </div>

        <div id="result" class="result"></div>
    </div>

    <script>
        // تعريف المتغيرات
        let namesData = [];
        const STORAGE_KEY = 'names_json_data';
        
        // تحميل البيانات من localStorage عند بدء التشغيل
        function loadDataFromStorage() {
            const storedData = localStorage.getItem(STORAGE_KEY);
            if (storedData) {
                try {
                    namesData = JSON.parse(storedData);
                    showToast(`✅ تم تحميل ${namesData.length} اسم محفوظ`, 'success');
                } catch(e) {
                    namesData = [];
                }
            } else {
                namesData = [];
                // إنشاء ملف JSON فارغ مبدئيًا
                saveToStorage();
                console.log('تم إنشاء ملف JSON فارغ');
            }
        }
        
        // حفظ البيانات إلى localStorage
        function saveToStorage() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(namesData));
        }
        
        // عرض رسالة منبثقة
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }
        
        // إضافة اسم جديد
        function addName(name) {
            if (!name || !name.trim()) {
                showToast('⚠️ الرجاء إدخال اسم صحيح', 'error');
                return false;
            }
            
            // التحقق من عدم تكرار الاسم (اختياري)
            const exists = namesData.some(item => item.name === name.trim());
            if (exists) {
                showToast(`⚠️ الاسم "${name}" موجود بالفعل!`, 'warning');
                return false;
            }
            
            const newName = {
                id: Date.now(),
                name: name.trim(),
                date: new Date().toISOString(),
                dateFormatted: new Date().toLocaleString('ar-EG')
            };
            
            namesData.push(newName);
            saveToStorage();
            showToast(`✅ تم حفظ "${name}" بنجاح!`, 'success');
            
            // تحديث العرض تلقائيًا إذا كان مفتوحًا
            const resultDiv = document.getElementById('result');
            if (resultDiv.classList.contains('show')) {
                displayNames();
            }
            
            return true;
        }
        
        // حذف اسم معين
        function deleteName(id) {
            const deletedName = namesData.find(item => item.id === id);
            namesData = namesData.filter(item => item.id !== id);
            saveToStorage();
            showToast(`🗑️ تم حذف "${deletedName?.name || 'الاسم'}"`, 'info');
            
            // تحديث العرض
            const resultDiv = document.getElementById('result');
            if (resultDiv.classList.contains('show')) {
                displayNames();
            }
        }
        
        // مسح جميع الأسماء
        function clearAllNames() {
            if (namesData.length === 0) {
                showToast('📭 لا توجد أسماء للحذف', 'info');
                return;
            }
            
            if (confirm(`⚠️ هل أنت متأكد من حذف جميع الأسماء (${namesData.length} اسم)؟`)) {
                namesData = [];
                saveToStorage();
                showToast('🗑️ تم مسح جميع الأسماء بنجاح', 'success');
                
                const resultDiv = document.getElementById('result');
                if (resultDiv.classList.contains('show')) {
                    displayNames();
                } else {
                    // إخفاء النتيجة إذا كانت ظاهرة
                    resultDiv.classList.remove('show');
                }
            }
        }
        
        // عرض جميع الأسماء
        function displayNames() {
            const resultDiv = document.getElementById('result');
            
            if (namesData.length === 0) {
                resultDiv.innerHTML = `
                    <div class="empty-state">
                        <div style="font-size: 50px;">📭</div>
                        <p>لا توجد أسماء محفوظة بعد</p>
                        <p style="font-size: 12px; margin-top: 10px;">يمكنك إضافة اسم جديد باستخدام الحقل أعلاه</p>
                    </div>
                `;
                resultDiv.classList.add('show');
                return;
            }
            
            // إحصائيات
            const today = new Date().toDateString();
            const todayCount = namesData.filter(item => {
                const itemDate = new Date(item.date).toDateString();
                return itemDate === today;
            }).length;
            
            let html = `
                <div class="stats">
                    <span>📊 المجموع: <strong>${namesData.length}</strong> اسم</span>
                    <span>📅 اليوم: <strong>${todayCount}</strong> اسم</span>
                </div>
                <h3>
                    <span>📋</span>
                    قائمة الأسماء المحفوظة
                    <span style="font-size: 12px;">(${namesData.length})</span>
                </h3>
                <ul class="names-list">
            `;
            
            // عرض الأسماء من الأحدث إلى الأقدم
            [...namesData].reverse().forEach(item => {
                html += `
                    <li>
                        <div style="flex:1">
                            <div class="name-text">📌 ${escapeHtml(item.name)}</div>
                            <div class="name-date">📅 ${item.dateFormatted || new Date(item.date).toLocaleString('ar-EG')}</div>
                        </div>
                        <button class="delete-btn" onclick="deleteName(${item.id})">🗑️ حذف</button>
                    </li>
                `;
            });
            
            html += `</ul>`;
            resultDiv.innerHTML = html;
            resultDiv.classList.add('show');
        }
        
        // دالة لتجنب XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // تحميل ملف JSON إلى الجهاز
        function downloadJSON() {
            if (namesData.length === 0) {
                showToast('⚠️ لا توجد بيانات للحفظ في ملف JSON', 'warning');
                return;
            }
            
            const jsonString = JSON.stringify(namesData, null, 2);
            const blob = new Blob([jsonString], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `names_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.json`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            
            showToast(`✅ تم تحميل ملف JSON يحتوي على ${namesData.length} اسم`, 'success');
        }
        
        // رفع ملف JSON من الجهاز (استيراد)
        function importJSON(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    if (Array.isArray(importedData)) {
                        // دمج البيانات مع تجنب التكرار بناءً على الاسم
                        const existingNames = new Set(namesData.map(item => item.name));
                        let newCount = 0;
                        
                        importedData.forEach(item => {
                            if (item.name && !existingNames.has(item.name)) {
                                namesData.push({
                                    id: Date.now() + Math.random(),
                                    name: item.name,
                                    date: new Date().toISOString(),
                                    dateFormatted: new Date().toLocaleString('ar-EG')
                                });
                                newCount++;
                            }
                        });
                        
                        saveToStorage();
                        showToast(`✅ تم استيراد ${newCount} اسم جديد من ملف JSON`, 'success');
                        
                        if (newCount > 0 && document.getElementById('result').classList.contains('show')) {
                            displayNames();
                        }
                    } else {
                        showToast('❌ ملف JSON غير صالح', 'error');
                    }
                } catch(error) {
                    showToast('❌ خطأ في قراءة ملف JSON', 'error');
                }
            };
            reader.readAsText(file);
        }
        
        // إنشاء زر استيراد مخفي
        function createImportButton() {
            const importBtn = document.createElement('button');
            importBtn.innerHTML = '<span>📂</span> استيراد JSON';
            importBtn.className = 'btn-secondary';
            importBtn.style.background = 'linear-gradient(135deg, #a8edea 0%, #fed6e3 100%)';
            importBtn.style.color = '#333';
            
            const fileInput = document.createElement('input');
            fileInput.type = 'file';
            fileInput.accept = '.json';
            fileInput.style.display = 'none';
            fileInput.onchange = (e) => {
                if (e.target.files && e.target.files[0]) {
                    importJSON(e.target.files[0]);
                }
                fileInput.value = '';
            };
            
            importBtn.onclick = () => fileInput.click();
            
            const buttonGroup = document.querySelector('.button-group');
            buttonGroup.appendChild(importBtn);
            document.body.appendChild(fileInput);
        }
        
        // إعادة تعيين وإنشاء ملف JSON فارغ
        function resetToEmptyJSON() {
            if (confirm('⚠️ هذا الإجراء سيحذف جميع البيانات الحالية. هل تريد إنشاء ملف JSON فارغ جديد؟')) {
                namesData = [];
                saveToStorage();
                showToast('📄 تم إنشاء ملف JSON فارغ جديد', 'success');
                
                const resultDiv = document.getElementById('result');
                resultDiv.classList.remove('show');
            }
        }
        
        // تهيئة الصفحة والأحداث
        function init() {
            loadDataFromStorage();
            
            // ربط الأحداث
            document.getElementById('saveBtn').addEventListener('click', () => {
                const nameInput = document.getElementById('nameInput');
                const name = nameInput.value;
                if (addName(name)) {
                    nameInput.value = '';
                    nameInput.focus();
                }
            });
            
            document.getElementById('loadBtn').addEventListener('click', () => {
                displayNames();
            });
            
            document.getElementById('downloadBtn').addEventListener('click', () => {
                downloadJSON();
            });
            
            document.getElementById('clearAllBtn').addEventListener('click', () => {
                clearAllNames();
            });
            
            // الضغط على Enter في حقل الإدخال
            document.getElementById('nameInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    document.getElementById('saveBtn').click();
                }
            });
            
            // إضافة زر الاستيراد
            createImportButton();
            
            // إضافة زر إنشاء ملف JSON فارغ (اختياري)
            const resetBtn = document.createElement('button');
            resetBtn.innerHTML = '<span>🆕</span> JSON فارغ';
            resetBtn.className = 'btn-danger';
            resetBtn.style.opacity = '0.7';
            resetBtn.onclick = () => resetToEmptyJSON();
            document.querySelector('.button-group').appendChild(resetBtn);
            
            // عرض عدد الأسماء المحفوظة في console
            console.log(`🚀 تم تهيئة النظام - عدد الأسماء المحفوظة: ${namesData.length}`);
            if (namesData.length === 0) {
                console.log('📄 ملف JSON فارغ وجاهز للاستخدام');
            }
        }
        
        // بدء التطبيق عند تحميل الصفحة
        window.addEventListener('DOMContentLoaded', init);
        
        // جعل deleteName دالة عامة
        window.deleteName = deleteName;
    </script>
</body>
</html>
