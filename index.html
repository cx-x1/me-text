<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PasteBin API - Pure JSON</title>
    
    <link href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5.0.18/index.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Inter', sans-serif; background: #0d1117; color: #c9d1d9; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,.1); border-radius: 50%; border-top-color: #58a6ff; animation: spin 1s ease-in-out infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        pre { white-space: pre-wrap; word-wrap: break-word; }
        textarea, input { background: #161b22 !important; color: #c9d1d9 !important; border-color: #30363d !important; }
        textarea:focus, input:focus { border-color: #58a6ff !important; outline: none; }
        .tab-active { background: #1f6feb; color: white; }
        .tab-inactive { background: #21262d; color: #8b949e; }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    
    <nav class="bg-[#161b22] border-b border-[#30363d] sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <a href="#home" class="text-xl font-bold flex items-center gap-2 hover:text-[#58a6ff] transition">
                <i class="fa-solid fa-bolt text-[#58a6ff]"></i> Pure JSON API
            </a>
            <div class="flex gap-4 text-sm font-medium">
                <a href="#home" class="text-gray-300 hover:text-white transition">Create</a>
                <a href="#dashboard" class="text-gray-300 hover:text-white transition">My APIs</a>
            </div>
        </div>
    </nav>

    <main id="app" class="container mx-auto px-4 py-8 flex-grow fade-in">
        <div class="text-center py-20">
            <div class="spinner"></div>
            <p class="mt-4 text-gray-500">Loading...</p>
        </div>
    </main>

    <div id="toast" class="fixed bottom-5 right-5 bg-[#21262d] text-white px-6 py-3 rounded-lg shadow-xl transform translate-y-20 opacity-0 transition-all duration-300 flex items-center gap-3 z-50 border border-[#30363d]">
        <i id="toast-icon" class="fa-solid fa-circle-check text-green-400"></i>
        <span id="toast-msg"></span>
    </div>

    <script>
    // ============================================
    // PURE JSON API - Using npoint.io
    // Returns pure JSON with Content-Type: application/json
    // ============================================
    
    const app = {
        // npoint.io API Service
        apiService: {
            baseUrl: 'https://api.npoint.io',
            
            async create(data) {
                const res = await fetch(this.baseUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (!res.ok) throw new Error('Failed to create API');
                return await res.json();
            },
            
            async update(id, data) {
                const res = await fetch(`${this.baseUrl}/${id}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (!res.ok) throw new Error('Failed to update API');
                return await res.json();
            },
            
            async get(id) {
                const res = await fetch(`${this.baseUrl}/${id}`);
                if (!res.ok) throw new Error('Failed to fetch API');
                return await res.json();
            }
        },
        
        // Base64 encode/decode
        encode(str) {
            try { return btoa(unescape(encodeURIComponent(str))); } 
            catch(e) { return btoa(str); }
        },
        
        decode(str) {
            try { return decodeURIComponent(escape(atob(str))); } 
            catch(e) { return atob(str); }
        },
        
        // SHA-256 hash
        async hashPassword(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        },
        
        escapeHtml(text) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return text.replace(/[&<>"']/g, m => map[m]);
        },
        
        showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toast-icon');
            document.getElementById('toast-msg').textContent = message;
            icon.className = type === 'error' 
                ? 'fa-solid fa-circle-xmark text-red-400' 
                : 'fa-solid fa-circle-check text-green-400';
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3000);
        },
        
        copy(text) {
            navigator.clipboard.writeText(text).then(() => {
                this.showToast('Copied to clipboard!', 'success');
            }).catch(() => prompt('Copy this:', text));
        },
        
        getBaseUrl() {
            return window.location.origin + window.location.pathname;
        },
        
        // ========================================
        // Create API Endpoint
        // ========================================
        async createApiEndpoint(slug, content, password = null) {
            let passwordHash = null;
            if (password) {
                passwordHash = await this.hashPassword(password);
            }
            
            // Prepare payload
            let payload;
            try {
                payload = JSON.parse(content);
            } catch (e) {
                payload = {
                    slug: slug,
                    content: content,
                    timestamp: new Date().toISOString(),
                    type: 'text'
                };
            }
            
            // Create API endpoint via npoint.io
            const result = await this.apiService.create(payload);
            const apiId = result.id;
            const apiUrl = `https://api.npoint.io/${apiId}`;
            
            // Save to localStorage
            const pastes = JSON.parse(localStorage.getItem('my_pastes') || '[]');
            const filtered = pastes.filter(p => p.slug !== slug);
            
            const paste = {
                slug: slug,
                encoded: this.encode(content),
                created: new Date().toISOString(),
                passwordHash: passwordHash,
                apiId: apiId,
                apiUrl: apiUrl
            };
            
            filtered.push(paste);
            localStorage.setItem('my_pastes', JSON.stringify(filtered));
            
            return paste;
        },
        
        // ========================================
        // Update API Endpoint
        // ========================================
        async updateApiEndpoint(slug, content, passwordHash) {
            const pastes = JSON.parse(localStorage.getItem('my_pastes') || '[]');
            const pasteIndex = pastes.findIndex(p => p.slug === slug);
            
            if (pasteIndex === -1) throw new Error('Paste not found');
            
            const paste = pastes[pasteIndex];
            
            // Verify password
            if (paste.passwordHash && paste.passwordHash !== passwordHash) {
                throw new Error('Invalid password');
            }
            
            // Prepare payload
            let payload;
            try {
                payload = JSON.parse(content);
            } catch (e) {
                payload = {
                    slug: slug,
                    content: content,
                    timestamp: new Date().toISOString(),
                    type: 'text'
                };
            }
            
            // Update API via npoint.io
            await this.apiService.update(paste.apiId, payload);
            
            // Update localStorage
            paste.encoded = this.encode(content);
            paste.updated = new Date().toISOString();
            
            pastes[pasteIndex] = paste;
            localStorage.setItem('my_pastes', JSON.stringify(pastes));
            
            return paste;
        },
        
        // ========================================
        // Render: Code Examples
        // ========================================
        renderCodeExamples(apiUrl) {
            return `
                <div class="space-y-4">
                    <div class="bg-[#0d1117] rounded-lg p-4 border border-[#30363d]">
                        <div class="flex items-center justify-between mb-2">
                            <p class="text-xs text-gray-400 font-semibold">🌐 Pure JSON Endpoint:</p>
                            <button onclick="app.copy('${apiUrl}')" class="text-gray-400 hover:text-white text-xs">
                                <i class="fa-solid fa-copy"></i> Copy
                            </button>
                        </div>
                        <code class="text-sm text-green-400 break-all font-mono bg-[#161b22] p-3 rounded block">${apiUrl}</code>
                        <div class="mt-3 text-xs text-green-400">
                            <i class="fa-solid fa-circle-check"></i> Content-Type: application/json
                        </div>
                    </div>
                    
                    <div class="bg-[#0d1117] rounded-lg p-4 border border-[#30363d]">
                        <p class="text-xs text-gray-400 mb-3 font-semibold">💻 Code Examples:</p>
                        
                        <div class="flex gap-2 mb-3 flex-wrap">
                            <button onclick="app.showTab('python')" id="tab-python" class="tab-active px-3 py-1 rounded text-xs font-bold transition">Python</button>
                            <button onclick="app.showTab('js')" id="tab-js" class="tab-inactive px-3 py-1 rounded text-xs font-bold transition">JavaScript</button>
                            <button onclick="app.showTab('curl')" id="tab-curl" class="tab-inactive px-3 py-1 rounded text-xs font-bold transition">cURL</button>
                            <button onclick="app.showTab('php')" id="tab-php" class="tab-inactive px-3 py-1 rounded text-xs font-bold transition">PHP</button>
                        </div>
                        
                        <div id="code-python" class="code-example">
                            <pre class="text-xs bg-[#161b22] text-green-400 p-3 rounded overflow-x-auto"><code>import requests

# Pure JSON - works directly!
r = requests.get("${apiUrl}")
print(r.json())  # ✅ Returns dict directly

# Access data
data = r.json()
print(data)</code></pre>
                        </div>
                        
                        <div id="code-js" class="code-example hidden">
                            <pre class="text-xs bg-[#161b22] text-green-400 p-3 rounded overflow-x-auto"><code>// Fetch pure JSON
fetch("${apiUrl}")
  .then(r => r.json())
  .then(data => {
    console.log(data);
  });</code></pre>
                        </div>
                        
                        <div id="code-curl" class="code-example hidden">
                            <pre class="text-xs bg-[#161b22] text-green-400 p-3 rounded overflow-x-auto"><code>curl "${apiUrl}"</code></pre>
                        </div>
                        
                        <div id="code-php" class="code-example hidden">
                            <pre class="text-xs bg-[#161b22] text-green-400 p-3 rounded overflow-x-auto"><code>&lt;?php
$data = json_decode(file_get_contents("${apiUrl}"), true);
print_r($data);
?&gt;</code></pre>
                        </div>
                    </div>
                </div>
            `;
        },
        
        showTab(lang) {
            document.querySelectorAll('.code-example').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('[id^="tab-"]').forEach(el => {
                el.classList.remove('tab-active');
                el.classList.add('tab-inactive');
            });
            
            document.getElementById(`code-${lang}`).classList.remove('hidden');
            document.getElementById(`tab-${lang}`).classList.remove('tab-inactive');
            document.getElementById(`tab-${lang}`).classList.add('tab-active');
        },
        
        // ========================================
        // Render: Home Page
        // ========================================
        renderHome(container) {
            container.innerHTML = `
                <div class="max-w-3xl mx-auto">
                    <div class="text-center mb-8">
                        <h1 class="text-4xl font-bold text-white mb-3">
                            <i class="fa-solid fa-bolt text-[#58a6ff]"></i> Pure JSON API
                        </h1>
                        <p class="text-gray-400 text-lg">
                            Create real JSON endpoints that return <strong>pure JSON</strong> directly
                        </p>
                        <div class="flex justify-center gap-4 mt-4 text-sm flex-wrap">
                            <span class="text-green-400"><i class="fa-solid fa-check"></i> Content-Type: application/json</span>
                            <span class="text-green-400"><i class="fa-solid fa-check"></i> CORS Enabled</span>
                            <span class="text-green-400"><i class="fa-solid fa-check"></i> No HTML</span>
                        </div>
                    </div>
                    
                    <div class="bg-[#161b22] p-8 rounded-xl border border-[#30363d]">
                        <form id="createForm" class="space-y-5">
                            <div>
                                <label class="block text-sm font-semibold text-gray-300 mb-1">
                                    <i class="fa-solid fa-tag text-[#58a6ff]"></i> API Name
                                </label>
                                <input type="text" id="slug" required pattern="[a-zA-Z0-9_-]+" 
                                    class="block w-full px-4 py-3 rounded-md font-mono" 
                                    placeholder="my-api">
                            </div>
                            
                            <div>
                                <label class="block text-sm font-semibold text-gray-300 mb-1">
                                    <i class="fa-solid fa-lock text-[#58a6ff]"></i> Password (Optional)
                                </label>
                                <input type="password" id="password" 
                                    class="block w-full px-4 py-3 rounded-md" 
                                    placeholder="For editing later">
                            </div>
                            
                            <div>
                                <label class="block text-sm font-semibold text-gray-300 mb-1">
                                    <i class="fa-solid fa-code text-[#58a6ff]"></i> JSON Content
                                </label>
                                <textarea id="content" required rows="12" 
                                    class="block w-full px-4 py-3 rounded-md text-sm font-mono" 
                                    placeholder='{"key": "value"}'></textarea>
                            </div>
                            
                            <button type="submit" id="submitBtn" class="w-full bg-[#238636] text-white py-3 px-4 rounded-md hover:bg-[#2ea043] transition font-bold text-lg flex justify-center items-center gap-2">
                                <i class="fa-solid fa-rocket"></i> Create Pure JSON API
                            </button>
                        </form>
                    </div>
                </div>
            `;
            
            document.getElementById('createForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const slug = document.getElementById('slug').value.trim().toLowerCase();
                const content = document.getElementById('content').value;
                const password = document.getElementById('password').value;
                
                if (!/^[a-zA-Z0-9_-]{3,50}$/.test(slug)) {
                    this.showToast('Invalid slug', 'error');
                    return;
                }
                
                const btn = document.getElementById('submitBtn');
                btn.innerHTML = '<div class="spinner"></div> Creating...';
                btn.disabled = true;

                try {
                    const paste = await this.createApiEndpoint(slug, content, password);
                    window.location.href = `${this.getBaseUrl()}?view&slug=${slug}`;
                } catch (error) {
                    this.showToast('Error: ' + error.message, 'error');
                    btn.innerHTML = '<i class="fa-solid fa-rocket"></i> Create Pure JSON API';
                    btn.disabled = false;
                }
            });
        },
        
        // ========================================
        // Render: View API
        // ========================================
        renderView(container) {
            const params = new URLSearchParams(window.location.search);
            const slug = params.get('slug');
            
            if (!slug) {
                container.innerHTML = `<div class="text-center py-20">No API specified</div>`;
                return;
            }
            
            const pastes = JSON.parse(localStorage.getItem('my_pastes') || '[]');
            const paste = pastes.find(p => p.slug === slug);
            
            if (!paste) {
                container.innerHTML = `<div class="text-center py-20">API not found</div>`;
                return;
            }
            
            let content;
            try { content = this.decode(paste.encoded); } catch(e) { content = ''; }
            
            const isProtected = !!paste.passwordHash;
            
            container.innerHTML = `
                <div class="max-w-4xl mx-auto">
                    <div class="bg-[#161b22] rounded-xl border border-[#30363d] mb-6">
                        <div class="p-6 border-b border-[#30363d]">
                            <div class="flex items-start justify-between flex-wrap gap-4">
                                <div>
                                    <h1 class="text-2xl font-bold text-white mb-2">
                                        <i class="fa-solid fa-bolt text-[#58a6ff]"></i> /${slug}
                                    </h1>
                                    <div class="text-sm text-gray-400">
                                        ${isProtected ? '<span class="text-green-400"><i class="fa-solid fa-lock"></i> Protected</span>' : '<span class="text-gray-500"><i class="fa-solid fa-lock-open"></i> Public</span>'}
                                    </div>
                                </div>
                                <div class="flex gap-2">
                                    <button id="editBtn" class="bg-[#f0883e] text-white px-4 py-2 rounded-lg hover:bg-[#f0883e]/80 transition font-bold text-sm">
                                        <i class="fa-solid fa-pen"></i> Edit
                                    </button>
                                    <button onclick="app.copy('${paste.apiUrl}')" class="bg-[#1f6feb] text-white px-4 py-2 rounded-lg hover:bg-[#1f6feb]/80 transition font-bold text-sm">
                                        <i class="fa-solid fa-copy"></i> Copy URL
                                    </button>
                                </div>
                            </div>
                        </div>
                        
                        <div class="p-6">
                            <h3 class="text-sm font-semibold text-gray-400 mb-3">Content Preview:</h3>
                            <pre class="text-sm bg-[#0d1117] p-4 rounded-lg border border-[#30363d] overflow-x-auto text-gray-200 font-mono max-h-96">${this.escapeHtml(content)}</pre>
                        </div>
                    </div>
                    
                    <div class="bg-[#161b22] rounded-xl border border-[#30363d] p-6">
                        <h2 class="text-xl font-bold text-white mb-4">
                            <i class="fa-solid fa-book text-[#58a6ff]"></i> API Usage
                        </h2>
                        
                        <div class="bg-green-900/20 border border-green-700/50 rounded-lg p-4 mb-6">
                            <p class="text-green-400 text-sm font-semibold mb-2">
                                <i class="fa-solid fa-circle-check"></i> Pure JSON - No HTML!
                            </p>
                            <ul class="text-xs text-gray-300 space-y-1">
                                <li>✓ Returns: application/json</li>
                                <li>✓ Works with r.json() in Python</li>
                                <li>✓ CORS enabled</li>
                            </ul>
                        </div>
                        
                        ${this.renderCodeExamples(paste.apiUrl)}
                    </div>
                </div>
            `;
            
            document.getElementById('editBtn').addEventListener('click', () => {
                if (isProtected) {
                    this.showEditWithPassword(slug);
                } else {
                    this.renderEdit(document.getElementById('app'), slug);
                }
            });
        },
        
        async showEditWithPassword(slug) {
            const password = prompt('Enter password:');
            if (!password) return;
            
            const hash = await this.hashPassword(password);
            const pastes = JSON.parse(localStorage.getItem('my_pastes') || '[]');
            const paste = pastes.find(p => p.slug === slug);
            
            if (!paste || paste.passwordHash !== hash) {
                this.showToast('Incorrect password', 'error');
                return;
            }
            
            this.renderEdit(document.getElementById('app'), slug, hash);
        },
        
        renderEdit(container, slug, passwordHash = null) {
            const pastes = JSON.parse(localStorage.getItem('my_pastes') || '[]');
            const paste = pastes.find(p => p.slug === slug);
            
            if (!paste) return;
            
            let content;
            try { content = this.decode(paste.encoded); } catch(e) { content = ''; }
            
            container.innerHTML = `
                <div class="max-w-3xl mx-auto bg-[#161b22] p-8 rounded-xl border border-[#30363d]">
                    <h2 class="text-2xl font-bold mb-6 text-white">
                        <i class="fa-solid fa-pen"></i> Edit: /${slug}
                    </h2>
                    
                    <form id="editForm" class="space-y-5">
                        <textarea id="editContent" required rows="14" 
                            class="block w-full px-4 py-3 rounded-md text-sm font-mono">${this.escapeHtml(content)}</textarea>
                        
                        <div class="flex gap-3">
                            <button type="button" onclick="history.back()" class="flex-1 bg-[#30363d] text-white py-3 rounded-md font-bold">Cancel</button>
                            <button type="submit" id="saveBtn" class="flex-1 bg-[#238636] text-white py-3 rounded-md font-bold">
                                <i class="fa-solid fa-save"></i> Update
                            </button>
                        </div>
                    </form>
                </div>
            `;
            
            document.getElementById('editForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const newContent = document.getElementById('editContent').value;
                
                const btn = document.getElementById('saveBtn');
                btn.innerHTML = '<div class="spinner"></div> Updating...';
                btn.disabled = true;

                try {
                    await this.updateApiEndpoint(slug, newContent, passwordHash);
                    this.showToast('Updated!', 'success');
                    setTimeout(() => {
                        window.location.href = `${this.getBaseUrl()}?view&slug=${slug}`;
                    }, 1000);
                } catch (error) {
                    this.showToast('Error: ' + error.message, 'error');
                    btn.innerHTML = '<i class="fa-solid fa-save"></i> Update';
                    btn.disabled = false;
                }
            });
        },
        
        renderDashboard(container) {
            const pastes = JSON.parse(localStorage.getItem('my_pastes') || '[]');
            
            container.innerHTML = `
                <div class="max-w-6xl mx-auto">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-2xl font-bold text-white">
                            <i class="fa-solid fa-list text-[#58a6ff]"></i> My APIs (${pastes.length})
                        </h2>
                        <a href="${this.getBaseUrl()}" class="bg-[#238636] text-white px-5 py-3 rounded-lg font-bold text-sm">
                            <i class="fa-solid fa-plus"></i> New API
                        </a>
                    </div>
                    
                    <div class="bg-[#161b22] rounded-xl border border-[#30363d] overflow-hidden">
                        ${pastes.length === 0 ? `
                            <div class="text-center py-16">
                                <p class="text-gray-500">No APIs yet</p>
                            </div>
                        ` : `
                            <div class="divide-y divide-[#30363d]">
                                ${pastes.reverse().map(p => `
                                    <div class="p-5 hover:bg-[#1c2128] transition">
                                        <div class="flex items-start justify-between flex-wrap gap-4">
                                            <div class="flex-1">
                                                <a href="${this.getBaseUrl()}?view&slug=${p.slug}" class="text-lg font-bold text-[#58a6ff] font-mono">
                                                    /${p.slug}
                                                </a>
                                                ${p.passwordHash ? '<span class="text-xs text-green-400 ml-2"><i class="fa-solid fa-lock"></i></span>' : ''}
                                                <div class="text-xs text-gray-500 mt-1">${new Date(p.created).toLocaleString()}</div>
                                                <div class="text-xs text-gray-400 font-mono mt-2">${p.apiUrl}</div>
                                            </div>
                                            <div class="flex gap-2">
                                                <button onclick="app.copy('${p.apiUrl}')" class="text-green-400 hover:bg-[#21262d] px-3 py-2 rounded text-xs font-bold">
                                                    <i class="fa-solid fa-copy"></i> Copy
                                                </button>
                                                <button onclick="app.deletePaste('${p.slug}')" class="text-red-400 hover:bg-[#21262d] px-3 py-2 rounded text-xs font-bold">
                                                    <i class="fa-solid fa-trash"></i>
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        `}
                    </div>
                </div>
            `;
        },
        
        deletePaste(slug) {
            if (confirm(`Delete /${slug}?`)) {
                const pastes = JSON.parse(localStorage.getItem('my_pastes') || '[]');
                const filtered = pastes.filter(p => p.slug !== slug);
                localStorage.setItem('my_pastes', JSON.stringify(filtered));
                this.showToast('Deleted', 'success');
                this.renderDashboard(document.getElementById('app'));
            }
        },
        
        route() {
            const params = new URLSearchParams(window.location.search);
            const main = document.getElementById('app');
            
            main.innerHTML = '';
            main.classList.remove('fade-in');
            void main.offsetWidth;
            main.classList.add('fade-in');
            
            const hash = window.location.hash;
            
            if (params.get('view') !== null) {
                this.renderView(main);
            } else if (hash === '#dashboard') {
                this.renderDashboard(main);
            } else {
                this.renderHome(main);
            }
        },
        
        init() {
            this.route();
            window.addEventListener('hashchange', () => this.route());
        }
    };

    document.addEventListener('DOMContentLoaded', () => app.init());
    </script>
</body>
</html>
