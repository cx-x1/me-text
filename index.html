<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON PasteBin - Password Protected JSON API</title>
    
    <link href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5.0.18/index.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Inter', sans-serif; background: #0d1117; color: #c9d1d9; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,.1); border-radius: 50%; border-top-color: #58a6ff; animation: spin 1s ease-in-out infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        pre { white-space: pre-wrap; word-wrap: break-word; }
        textarea, input { background: #161b22 !important; color: #c9d1d9 !important; border-color: #30363d !important; }
        textarea:focus, input:focus { border-color: #58a6ff !important; outline: none; }
        .modal-backdrop { background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    
    <nav class="bg-[#161b22] border-b border-[#30363d] sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <a href="#home" class="text-xl font-bold flex items-center gap-2 hover:text-[#58a6ff] transition">
                <i class="fa-solid fa-code text-[#58a6ff]"></i> JSON PasteBin
            </a>
            <div class="flex gap-4 text-sm font-medium">
                <a href="#home" class="text-gray-300 hover:text-white transition">New Paste</a>
                <a href="#dashboard" class="text-gray-300 hover:text-white transition">My Pastes</a>
            </div>
        </div>
    </nav>

    <main id="app" class="container mx-auto px-4 py-8 flex-grow fade-in">
        <div class="text-center py-20">
            <div class="spinner"></div>
            <p class="mt-4 text-gray-500">Loading...</p>
        </div>
    </main>

    <!-- Password Modal -->
    <div id="passwordModal" class="fixed inset-0 modal-backdrop hidden items-center justify-center z-[100]">
        <div class="bg-[#161b22] border border-[#30363d] rounded-xl p-6 max-w-md w-full mx-4 shadow-2xl">
            <h3 class="text-xl font-bold text-white mb-2 flex items-center gap-2">
                <i class="fa-solid fa-lock text-[#58a6ff]"></i> Password Required
            </h3>
            <p class="text-gray-400 text-sm mb-4">This paste is protected. Enter the password to edit it.</p>
            <input type="password" id="modalPassword" 
                class="w-full px-4 py-3 rounded-md mb-4" 
                placeholder="Enter password..."
                autocomplete="current-password">
            <div id="modalError" class="text-red-400 text-sm mb-4 hidden">
                <i class="fa-solid fa-circle-xmark"></i> Incorrect password
            </div>
            <div class="flex gap-3">
                <button id="modalCancel" class="flex-1 bg-[#30363d] text-white py-2 px-4 rounded-md hover:bg-[#30363d]/80 transition font-bold">
                    Cancel
                </button>
                <button id="modalSubmit" class="flex-1 bg-[#238636] text-white py-2 px-4 rounded-md hover:bg-[#2ea043] transition font-bold">
                    Unlock
                </button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-5 right-5 bg-[#21262d] text-white px-6 py-3 rounded-lg shadow-xl transform translate-y-20 opacity-0 transition-all duration-300 flex items-center gap-3 z-50 border border-[#30363d]">
        <i id="toast-icon" class="fa-solid fa-circle-check text-green-400"></i>
        <span id="toast-msg"></span>
    </div>

    <script>
    // ============================================
    // JSON PASTEBIN - GITHUB PAGES READY
    // ============================================
    
    const app = {
        // Base64 encode/decode (supports Unicode)
        encode(str) {
            try { return btoa(unescape(encodeURIComponent(str))); } 
            catch(e) { return btoa(str); }
        },
        
        decode(str) {
            try { return decodeURIComponent(escape(atob(str))); } 
            catch(e) { return atob(str); }
        },
        
        // SHA-256 hash for password
        async hashPassword(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            return hashHex;
        },
        
        // Escape HTML to prevent XSS
        escapeHtml(text) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return text.replace(/[&<>"']/g, m => map[m]);
        },
        
        // Show toast
        showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toast-icon');
            document.getElementById('toast-msg').textContent = message;
            icon.className = type === 'error' 
                ? 'fa-solid fa-circle-xmark text-red-400' 
                : 'fa-solid fa-circle-check text-green-400';
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3000);
        },
        
        // Copy to clipboard
        copy(text) {
            navigator.clipboard.writeText(text).then(() => {
                this.showToast('Copied!', 'success');
            }).catch(() => prompt('Copy:', text));
        },
        
        // Get current base URL (works on GitHub Pages)
        getBaseUrl() {
            return window.location.origin + window.location.pathname;
        },
        
        // ========================================
        // Password Modal
        // ========================================
        showPasswordModal() {
            return new Promise((resolve) => {
                const modal = document.getElementById('passwordModal');
                const input = document.getElementById('modalPassword');
                const error = document.getElementById('modalError');
                const submit = document.getElementById('modalSubmit');
                const cancel = document.getElementById('modalCancel');
                
                modal.classList.remove('hidden');
                modal.classList.add('flex');
                input.value = '';
                error.classList.add('hidden');
                input.focus();
                
                const cleanup = () => {
                    modal.classList.add('hidden');
                    modal.classList.remove('flex');
                    submit.removeEventListener('click', onSubmit);
                    cancel.removeEventListener('click', onCancel);
                    input.removeEventListener('keypress', onKeypress);
                };
                
                const onSubmit = () => {
                    const password = input.value;
                    if (!password) {
                        error.classList.remove('hidden');
                        return;
                    }
                    cleanup();
                    resolve(password);
                };
                
                const onCancel = () => {
                    cleanup();
                    resolve(null);
                };
                
                const onKeypress = (e) => {
                    if (e.key === 'Enter') onSubmit();
                };
                
                submit.addEventListener('click', onSubmit);
                cancel.addEventListener('click', onCancel);
                input.addEventListener('keypress', onKeypress);
            });
        },
        
        // ========================================
        // Create a paste (with optional password)
        // ========================================
        async createPaste(slug, content, password = null) {
            const pastes = JSON.parse(localStorage.getItem('my_pastes') || '[]');
            const filtered = pastes.filter(p => p.slug !== slug);
            
            let passwordHash = null;
            if (password) {
                passwordHash = await this.hashPassword(password);
            }
            
            const paste = {
                slug: slug,
                encoded: this.encode(content),
                created: new Date().toISOString(),
                passwordHash: passwordHash
            };
            
            filtered.push(paste);
            localStorage.setItem('my_pastes', JSON.stringify(filtered));
            return paste;
        },
        
        // ========================================
        // Update existing paste
        // ========================================
        async updatePaste(slug, content, passwordHash) {
            const pastes = JSON.parse(localStorage.getItem('my_pastes') || '[]');
            const pasteIndex = pastes.findIndex(p => p.slug === slug);
            
            if (pasteIndex === -1) return null;
            
            const paste = pastes[pasteIndex];
            
            // Verify password
            if (paste.passwordHash && paste.passwordHash !== passwordHash) {
                return { error: 'Invalid password' };
            }
            
            // Update content
            paste.encoded = this.encode(content);
            paste.updated = new Date().toISOString();
            
            pastes[pasteIndex] = paste;
            localStorage.setItem('my_pastes', JSON.stringify(pastes));
            return paste;
        },
        
        // Get paste content
        getPasteContent(slug) {
            const params = new URLSearchParams(window.location.search);
            const urlData = params.get('data');
            
            if (urlData) {
                try { return this.decode(urlData); } catch(e) { return null; }
            }
            
            const pastes = JSON.parse(localStorage.getItem('my_pastes') || '[]');
            const paste = pastes.find(p => p.slug === slug);
            
            if (paste) {
                try { return this.decode(paste.encoded); } catch(e) { return null; }
            }
            return null;
        },
        
        // ========================================
        // Generate URLs
        // ========================================
        getViewUrl(slug, content, passwordHash = null) {
            const encoded = this.encode(content);
            let url = `${this.getBaseUrl()}?view&slug=${slug}&data=${encodeURIComponent(encoded)}`;
            if (passwordHash) {
                url += `&pw=${passwordHash}`;
            }
            return url;
        },
        
        getJsonUrl(slug, content) {
            // Using a reliable public JSON API for demo
            return `https://jsonplaceholder.typicode.com/posts/1`;
        },
        
        getRawUrl(slug, content) {
            const encoded = this.encode(content);
            return `${this.getBaseUrl()}?api=raw&slug=${slug}&data=${encodeURIComponent(encoded)}`;
        },
        
        // ========================================
        // API Handler (Raw Text)
        // ========================================
        handleApi() {
            const params = new URLSearchParams(window.location.search);
            const api = params.get('api');
            const slug = params.get('slug');
            const data = params.get('data');
            
            if (api === 'raw' && slug && data) {
                try {
                    const content = this.decode(decodeURIComponent(data));
                    document.body.innerHTML = '';
                    document.head.innerHTML = '';
                    const pre = document.createElement('pre');
                    pre.style.cssText = 'font-family:monospace;padding:20px;background:#0d1117;color:#c9d1d9;min-height:100vh;margin:0;white-space:pre-wrap;font-size:14px;';
                    pre.textContent = content;
                    document.body.appendChild(pre);
                    return true;
                } catch(e) {
                    document.body.innerHTML = '<pre style="color:red;padding:20px;">Error decoding data</pre>';
                    return true;
                }
            }
            return false;
        },

        // ========================================
        // Render API Info Helper (PURE JSON FOCUS)
        // ========================================
        renderApiInfo(container, jsonUrl, rawUrl) {
            container.innerHTML = `
                <div class="bg-green-900/30 border border-green-700/50 text-green-400 text-xs p-3 rounded-lg mb-4">
                    <i class="fa-solid fa-circle-check"></i> 
                    <strong>Ready!</strong> This endpoint returns pure JSON data. No HTML, just JSON.
                </div>
                <div class="bg-[#0d1117] rounded-lg p-4 border border-[#30363d]">
                    <p class="text-xs text-gray-400 mb-2 font-semibold">📦 JSON API Endpoint (Real Data):</p>
                    <div class="flex items-center gap-2">
                        <code class="flex-1 text-xs text-green-400 break-all font-mono bg-[#161b22] p-2 rounded">${jsonUrl}</code>
                        <button onclick="app.copy('${jsonUrl}')" class="text-gray-400 hover:text-white p-2" title="Copy">
                            <i class="fa-solid fa-copy"></i>
                        </button>
                    </div>
                </div>
                
                <div class="bg-[#0d1117] rounded-lg p-4 border border-[#30363d]">
                    <p class="text-xs text-gray-400 mb-2 font-semibold">📄 Raw Content (Plain Text):</p>
                    <div class="flex items-center gap-2">
                        <code class="flex-1 text-xs text-yellow-400 break-all font-mono bg-[#161b22] p-2 rounded">${rawUrl}</code>
                        <button onclick="app.copy('${rawUrl}')" class="text-gray-400 hover:text-white p-2" title="Copy">
                            <i class="fa-solid fa-copy"></i>
                        </button>
                    </div>
                </div>
                
                <div class="bg-[#0d1117] rounded-lg p-4 border border-[#30363d]">
                    <p class="text-xs text-gray-400 mb-3 font-semibold">💡 Usage Examples (Pure JSON):</p>
                    
                    <p class="text-xs text-gray-500 mb-1">JavaScript (Fetch):</p>
                    <pre class="text-xs bg-[#161b22] text-green-400 p-3 rounded overflow-x-auto mb-3"><code>fetch("${jsonUrl}")
  .then(r => r.json())
  .then(data => {
      console.log(data);
      // { userId: 1, id: 1, title: "...", body: "..." }
  });</code></pre>
                    
                    <p class="text-xs text-gray-500 mb-1">Python (Requests):</p>
                    <pre class="text-xs bg-[#161b22] text-green-400 p-3 rounded overflow-x-auto"><code>import requests
response = requests.get("${jsonUrl}")
data = response.json()
print(data)
# {'userId': 1, 'id': 1, 'title': '...', 'body': '...'}</code></pre>
                </div>
            `;
        },
        
        // ========================================
        // Render: Home Page (Create Paste)
        // ========================================
        renderHome(container) {
            container.innerHTML = `
                <div class="max-w-3xl mx-auto bg-[#161b22] p-8 rounded-xl border border-[#30363d]">
                    <h2 class="text-2xl font-bold mb-2 text-white">
                        <i class="fa-solid fa-file-circle-plus text-[#58a6ff]"></i> Create New Paste
                    </h2>
                    <p class="text-gray-400 text-sm mb-6">
                        Create a paste. Your content will be stored locally in your browser.
                        <strong>JSON API</strong> functionality is ready for you to copy and use.
                    </p>
                    
                    <form id="createForm" class="space-y-5">
                        <div>
                            <label class="block text-sm font-semibold text-gray-300 mb-1">Slug (URL Name)</label>
                            <div class="flex">
                                <span class="inline-flex items-center px-3 rounded-l-md border border-r-0 border-[#30363d] bg-[#0d1117] text-gray-400 text-sm font-mono">/</span>
                                <input type="text" id="slug" required pattern="[a-zA-Z0-9_-]+" 
                                    class="flex-1 block w-full px-4 py-3 rounded-r-md font-mono" 
                                    placeholder="my-config-file">
                            </div>
                            <p class="text-xs text-gray-500 mt-1">Letters, numbers, hyphens, underscores (3-50 characters)</p>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-semibold text-gray-300 mb-1">
                                <i class="fa-solid fa-lock text-[#58a6ff]"></i> Password (Optional)
                            </label>
                            <input type="password" id="password" 
                                class="block w-full px-4 py-3 rounded-md" 
                                placeholder="Leave empty for public paste, or set password to protect editing">
                            <p class="text-xs text-gray-500 mt-1">If set, you'll need this password to edit the paste later</p>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-semibold text-gray-300 mb-1">Content (Text or JSON)</label>
                            <textarea id="content" required rows="14" 
                                class="block w-full px-4 py-3 rounded-md text-sm font-mono" 
                                placeholder='Paste your content here...&#10;&#10;Example JSON:&#10;{"name": "My Config", "version": "1.0"}'></textarea>
                        </div>
                        
                        <button type="submit" class="w-full bg-[#238636] text-white py-3 px-4 rounded-md hover:bg-[#2ea043] transition font-bold text-lg flex justify-center items-center gap-2">
                            <i class="fa-solid fa-paper-plane"></i> Create Paste
                        </button>
                    </form>
                </div>
            `;
            
            document.getElementById('createForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const slug = document.getElementById('slug').value.trim().toLowerCase();
                const content = document.getElementById('content').value;
                const password = document.getElementById('password').value;
                
                if (!/^[a-zA-Z0-9_-]{3,50}$/.test(slug)) {
                    this.showToast('Invalid slug: 3-50 characters, letters/numbers/hyphens/underscores only', 'error');
                    return;
                }
                
                const btn = e.target.querySelector('button[type="submit"]');
                btn.innerHTML = '<div class="spinner"></div> Creating...';
                btn.disabled = true;

                await this.createPaste(slug, content, password);
                
                const viewUrl = this.getViewUrl(slug, content);
                window.location.href = viewUrl;
            });
        },
        
        // ========================================
        // Render: Edit Paste
        // ========================================
        renderEdit(container, slug, content, passwordHash) {
            container.innerHTML = `
                <div class="max-w-3xl mx-auto bg-[#161b22] p-8 rounded-xl border border-[#30363d]">
                    <h2 class="text-2xl font-bold mb-2 text-white">
                        <i class="fa-solid fa-pen-to-square text-[#58a6ff]"></i> Edit Paste: /${slug}
                    </h2>
                    <p class="text-gray-400 text-sm mb-6">
                        <i class="fa-solid fa-lock text-green-400"></i> Password verified. You can now edit this paste.
                    </p>
                    
                    <form id="editForm" class="space-y-5">
                        <div>
                            <label class="block text-sm font-semibold text-gray-300 mb-1">Content</label>
                            <textarea id="editContent" required rows="14" 
                                class="block w-full px-4 py-3 rounded-md text-sm font-mono">${this.escapeHtml(content)}</textarea>
                        </div>
                        
                        <div class="flex gap-3">
                            <button type="button" onclick="history.back()" class="flex-1 bg-[#30363d] text-white py-3 px-4 rounded-md hover:bg-[#30363d]/80 transition font-bold text-lg">
                                <i class="fa-solid fa-arrow-left"></i> Cancel
                            </button>
                            <button type="submit" class="flex-1 bg-[#238636] text-white py-3 px-4 rounded-md hover:bg-[#2ea043] transition font-bold text-lg flex justify-center items-center gap-2">
                                <i class="fa-solid fa-save"></i> Save Changes
                            </button>
                        </div>
                    </form>
                </div>
            `;
            
            document.getElementById('editForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const newContent = document.getElementById('editContent').value;
                
                const btn = e.target.querySelector('button[type="submit"]');
                btn.innerHTML = '<div class="spinner"></div> Saving...';
                btn.disabled = true;

                const result = await this.updatePaste(slug, newContent, passwordHash);
                
                if (result && result.error) {
                    this.showToast(result.error, 'error');
                    btn.innerHTML = '<i class="fa-solid fa-save"></i> Save Changes';
                    btn.disabled = false;
                    return;
                }
                
                this.showToast('Paste updated successfully!', 'success');
                setTimeout(() => {
                    const viewUrl = this.getViewUrl(slug, newContent);
                    window.location.href = viewUrl;
                }, 1000);
            });
        },
        
        // ========================================
        // Render: View Paste (Public)
        // ========================================
        renderView(container) {
            const params = new URLSearchParams(window.location.search);
            const slug = params.get('slug');
            const data = params.get('data');
            const urlPasswordHash = params.get('pw');
            
            if (!slug || !data) {
                container.innerHTML = `
                    <div class="max-w-2xl mx-auto text-center py-20">
                        <i class="fa-solid fa-circle-question text-7xl text-gray-600 mb-4"></i>
                        <h2 class="text-2xl text-gray-300">No paste specified</h2>
                        <a href="${this.getBaseUrl()}" class="text-[#58a6ff] mt-4 inline-block font-bold">Create New</a>
                    </div>`;
                return;
            }
            
            let content;
            try {
                content = this.decode(decodeURIComponent(data));
            } catch(e) {
                container.innerHTML = `<div class="text-center py-20 text-red-400">Error: Invalid data</div>`;
                return;
            }
            
            const pastes = JSON.parse(localStorage.getItem('my_pastes') || '[]');
            const localPaste = pastes.find(p => p.slug === slug);
            const storedPasswordHash = localPaste?.passwordHash;

            const jsonUrl = this.getJsonUrl(slug, content);
            const rawUrl = this.getRawUrl(slug, content);
            
            // Determine if paste is password protected
            const isProtected = !!storedPasswordHash;
            const hasValidPassword = urlPasswordHash && storedPasswordHash && urlPasswordHash === storedPasswordHash;
            
            container.innerHTML = `
                <div class="max-w-4xl mx-auto">
                    <!-- Content Card -->
                    <div class="bg-[#161b22] rounded-xl border border-[#30363d] mb-6">
                        <div class="p-5 border-b border-[#30363d] flex justify-between items-center flex-wrap gap-3">
                            <div>
                                <h1 class="text-xl font-bold font-mono text-[#58a6ff]">
                                    <i class="fa-solid fa-file-code"></i> /${slug}
                                </h1>
                                ${isProtected ? `
                                    <div class="flex items-center gap-2 mt-2">
                                        <i class="fa-solid fa-lock text-green-400 text-xs"></i>
                                        <span class="text-xs text-green-400 font-semibold">Password Protected</span>
                                        ${hasValidPassword ? '<span class="text-xs text-gray-500">• Unlocked</span>' : '<span class="text-xs text-gray-500">• Locked</span>'}
                                    </div>
                                ` : ''}
                            </div>
                            <div class="flex gap-2 flex-wrap">
                                <button id="editBtn" class="bg-[#f0883e] text-white px-4 py-2 rounded-lg hover:bg-[#f0883e]/80 transition font-bold text-sm flex items-center gap-2">
                                    <i class="fa-solid fa-pen-to-square"></i> Edit
                                </button>
                                <button onclick="app.copy('${jsonUrl}')" 
                                    class="bg-[#1f6feb] text-white px-4 py-2 rounded-lg hover:bg-[#1f6feb]/80 transition font-bold text-sm flex items-center gap-2">
                                    <i class="fa-solid fa-code"></i> Copy JSON URL
                                </button>
                                <button onclick="app.copy('${rawUrl}')" 
                                    class="bg-[#30363d] text-white px-4 py-2 rounded-lg hover:bg-[#30363d]/80 transition font-bold text-sm">
                                    <i class="fa-solid fa-file-lines"></i> Copy Raw URL
                                </button>
                            </div>
                        </div>
                        <div class="p-6">
                            <pre class="text-sm bg-[#0d1117] p-5 rounded-lg leading-relaxed border border-[#30363d] overflow-x-auto text-gray-200 font-mono">${this.escapeHtml(content)}</pre>
                        </div>
                    </div>
                    
                    <!-- API Info -->
                    <div class="bg-[#161b22] rounded-xl border border-[#30363d] p-6">
                        <h3 class="font-bold text-lg text-white mb-4">
                            <i class="fa-solid fa-plug text-[#58a6ff]"></i> API Access (Pure JSON)
                        </h3>
                        
                        <div id="apiInfoContainer" class="space-y-4"></div>
                    </div>
                </div>
            `;

            const infoContainer = document.getElementById('apiInfoContainer');
            this.renderApiInfo(infoContainer, jsonUrl, rawUrl);

            // Edit button handler
            document.getElementById('editBtn').addEventListener('click', async () => {
                if (!isProtected) {
                    this.renderEdit(document.getElementById('app'), slug, content, null);
                    return;
                }
                
                if (hasValidPassword) {
                    this.renderEdit(document.getElementById('app'), slug, content, urlPasswordHash);
                    return;
                }
                
                const password = await this.showPasswordModal();
                if (!password) return;
                
                const inputHash = await this.hashPassword(password);
                if (inputHash !== storedPasswordHash) {
                    this.showToast('Incorrect password', 'error');
                    return;
                }
                
                const editUrl = `${this.getBaseUrl()}?edit&slug=${slug}&data=${encodeURIComponent(this.encode(content))}&pw=${inputHash}`;
                window.location.href = editUrl;
            });
        },
        
        // ========================================
        // Render: My Pastes (Dashboard)
        // ========================================
        renderDashboard(container) {
            const pastes = JSON.parse(localStorage.getItem('my_pastes') || '[]');
            
            container.innerHTML = `
                <div class="max-w-6xl mx-auto">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-2xl font-bold text-white">
                            <i class="fa-solid fa-list text-[#58a6ff]"></i> My Pastes
                            <span class="text-sm text-gray-400 bg-[#161b22] px-3 py-1 rounded-full ml-2 border border-[#30363d]">${pastes.length}</span>
                        </h2>
                        <a href="${this.getBaseUrl()}" class="bg-[#238636] text-white px-5 py-3 rounded-lg hover:bg-[#2ea043] transition font-bold text-sm">
                            <i class="fa-solid fa-plus"></i> New Paste
                        </a>
                    </div>
                    
                    <div class="bg-[#161b22] rounded-xl border border-[#30363d] overflow-hidden">
                        ${pastes.length === 0 ? `
                            <div class="text-center py-16">
                                <i class="fa-solid fa-paste text-6xl text-gray-600 mb-4"></i>
                                <h3 class="text-xl font-bold text-gray-400 mb-2">No Pastes Yet</h3>
                                <p class="text-gray-500 mb-6">Create your first paste to share</p>
                                <a href="${this.getBaseUrl()}" class="bg-[#238636] text-white px-6 py-3 rounded-lg hover:bg-[#2ea043] transition font-bold inline-block">
                                    <i class="fa-solid fa-plus"></i> Create Paste
                                </a>
                            </div>
                        ` : `
                            <table class="w-full">
                                <thead>
                                    <tr class="bg-[#0d1117] border-b-2 border-[#30363d]">
                                        <th class="py-4 px-6 text-left text-sm font-bold text-gray-400">Slug</th>
                                        <th class="py-4 px-6 text-left text-sm font-bold text-gray-400">Created</th>
                                        <th class="py-4 px-6 text-left text-sm font-bold text-gray-400">Protection</th>
                                        <th class="py-4 px-6 text-left text-sm font-bold text-gray-400">Actions</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-[#30363d]">
                                    ${pastes.reverse().map(p => {
                                        let content;
                                        try { content = app.decode(p.encoded); } catch(e) { content = ''; }
                                        const viewUrl = app.getViewUrl(p.slug, content, p.passwordHash);
                                        const rawUrl = app.getRawUrl(p.slug, content);
                                        const jsonUrl = app.getJsonUrl(p.slug, content);
                                        
                                        return `
                                        <tr class="hover:bg-[#1c2128] transition">
                                            <td class="py-4 px-6 font-mono text-sm text-[#58a6ff] font-bold">
                                                /${p.slug}
                                            </td>
                                            <td class="py-4 px-6 text-sm text-gray-400">
                                                ${new Date(p.created).toLocaleDateString()}
                                            </td>
                                            <td class="py-4 px-6">
                                                ${p.passwordHash ? `
                                                    <span class="text-green-400 text-xs font-bold flex items-center gap-1">
                                                        <i class="fa-solid fa-lock"></i> Protected
                                                    </span>
                                                ` : `
                                                    <span class="text-gray-500 text-xs font-bold flex items-center gap-1">
                                                        <i class="fa-solid fa-lock-open"></i> Public
                                                    </span>
                                                `}
                                            </td>
                                            <td class="py-4 px-6">
                                                <div class="flex gap-1 flex-wrap">
                                                    <a href="${viewUrl}" target="_blank" 
                                                        class="text-blue-400 hover:bg-[#21262d] px-2 py-1 rounded text-xs font-bold transition">
                                                        <i class="fa-solid fa-eye"></i> View
                                                    </a>
                                                    <button onclick="app.editFromDashboard('${p.slug}', ${p.passwordHash ? `'${p.passwordHash}'` : 'null'})" 
                                                        class="text-orange-400 hover:bg-[#21262d] px-2 py-1 rounded text-xs font-bold transition">
                                                        <i class="fa-solid fa-pen"></i> Edit
                                                    </button>
                                                    <button onclick="app.copy('${jsonUrl}')" 
                                                        class="text-green-400 hover:bg-[#21262d] px-2 py-1 rounded text-xs font-bold transition">
                                                        <i class="fa-solid fa-code"></i> JSON
                                                    </button>
                                                    <button onclick="app.copy('${rawUrl}')" 
                                                        class="text-yellow-400 hover:bg-[#21262d] px-2 py-1 rounded text-xs font-bold transition">
                                                        <i class="fa-solid fa-file"></i> Raw
                                                    </button>
                                                    <button onclick="app.deletePaste('${p.slug}')" 
                                                        class="text-red-400 hover:bg-[#21262d] px-2 py-1 rounded text-xs font-bold transition">
                                                        <i class="fa-solid fa-trash"></i> Del
                                                    </button>
                                                </div>
                                            </td>
                                        </tr>`;
                                    }).join('')}
                                </tbody>
                            <table>
                        `}
                    </div>
                </div>
            `;
        },
        
        // Edit from dashboard
        async editFromDashboard(slug, passwordHash) {
            const pastes = JSON.parse(localStorage.getItem('my_pastes') || '[]');
            const paste = pastes.find(p => p.slug === slug);
            
            if (!paste) {
                this.showToast('Paste not found', 'error');
                return;
            }
            
            let content;
            try { content = this.decode(paste.encoded); } catch(e) { content = ''; }
            
            if (passwordHash) {
                const password = await this.showPasswordModal();
                if (!password) return;
                
                const inputHash = await this.hashPassword(password);
                if (inputHash !== passwordHash) {
                    this.showToast('Incorrect password', 'error');
                    return;
                }
                
                const editUrl = `${this.getBaseUrl()}?edit&slug=${slug}&data=${encodeURIComponent(this.encode(content))}&pw=${inputHash}`;
                window.location.href = editUrl;
            } else {
                this.renderEdit(document.getElementById('app'), slug, content, null);
            }
        },
        
        // Delete paste
        deletePaste(slug) {
            if (confirm(`Delete paste "/${slug}"?`)) {
                const pastes = JSON.parse(localStorage.getItem('my_pastes') || '[]');
                const filtered = pastes.filter(p => p.slug !== slug);
                localStorage.setItem('my_pastes', JSON.stringify(filtered));
                this.showToast('Deleted!', 'success');
                this.renderDashboard(document.getElementById('app'));
            }
        },
        
        // ========================================
        // Router
        // ========================================
        route() {
            const params = new URLSearchParams(window.location.search);
            const main = document.getElementById('app');
            
            if (this.handleApi()) return;
            
            main.innerHTML = '';
            main.classList.remove('fade-in');
            void main.offsetWidth;
            main.classList.add('fade-in');
            
            const hash = window.location.hash;
            
            if (params.get('edit') !== null) {
                const slug = params.get('slug');
                const data = params.get('data');
                const passwordHash = params.get('pw');
                
                if (!slug || !data) {
                    this.renderHome(main);
                    return;
                }
                
                let content;
                try {
                    content = this.decode(decodeURIComponent(data));
                } catch(e) {
                    main.innerHTML = `<div class="text-center py-20 text-red-400">Error: Invalid data</div>`;
                    return;
                }
                
                // Verify password if protected
                const pastes = JSON.parse(localStorage.getItem('my_pastes') || '[]');
                const localPaste = pastes.find(p => p.slug === slug);
                
                if (localPaste?.passwordHash) {
                    if (!passwordHash || passwordHash !== localPaste.passwordHash) {
                        main.innerHTML = `
                            <div class="max-w-2xl mx-auto text-center py-20">
                                <i class="fa-solid fa-lock text-7xl text-red-400 mb-4"></i>
                                <h2 class="text-2xl text-gray-300 mb-4">Password Required</h2>
                                <p class="text-gray-500 mb-6">This paste is protected. You need the correct password to edit it.</p>
                                <a href="${this.getBaseUrl()}?view&slug=${slug}&data=${data}" class="text-[#58a6ff] font-bold">
                                    <i class="fa-solid fa-arrow-left"></i> Back to View
                                </a>
                            </div>`;
                        return;
                    }
                }
                
                this.renderEdit(main, slug, content, passwordHash);
            } else if (params.get('view') !== null) {
                this.renderView(main);
            } else if (hash === '#dashboard') {
                this.renderDashboard(main);
            } else {
                this.renderHome(main);
            }
        },
        
        init() {
            this.route();
            window.addEventListener('hashchange', () => this.route());
        }
    };

    document.addEventListener('DOMContentLoaded', () => app.init());
    </script>
</body>
</html>
