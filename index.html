<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام حفظ الأسماء - التخزين السحابي JSONBin.io</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tahoma', 'Arial', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 25px;
            padding: 40px;
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.3);
            max-width: 750px;
            width: 100%;
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .cloud-badge {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            color: #333;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
            margin-bottom: 15px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .config-section {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 25px;
        }

        .config-section label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
            font-size: 14px;
        }

        .config-section input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .config-section small {
            color: #666;
            font-size: 12px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: #555;
            font-weight: bold;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        input {
            flex: 1;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 15px 0;
        }

        .button-group button {
            flex: 1;
            justify-content: center;
        }

        .btn-danger {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
        }

        .btn-success {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            color: #333;
        }

        .result {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 15px;
            display: none;
            max-height: 400px;
            overflow-y: auto;
        }

        .result.show {
            display: block;
        }

        .result h3 {
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .names-list {
            list-style: none;
            padding: 0;
        }

        .names-list li {
            padding: 12px;
            background: white;
            margin: 8px 0;
            border-radius: 10px;
            border-right: 4px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .delete-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            background: #e8e8e8;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #667eea;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            z-index: 1000;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            .input-wrapper {
                flex-direction: column;
            }
            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            <span>☁️</span>
            نظام حفظ الأسماء
            <span>💾</span>
        </h1>
        <div style="text-align: center;">
            <span class="cloud-badge">✨ التخزين السحابي - JSONBin.io ✨</span>
        </div>
        <div class="subtitle">
            جميع المستخدمين يشتركون في نفس قاعدة البيانات
        </div>

        <!-- قسم الإعدادات -->
        <div class="config-section">
            <label>🔑 API Key من JSONBin.io:</label>
            <input type="password" id="apiKey" placeholder="أدخل API Key الخاص بك" autocomplete="off">
            <label>📦 Bin ID (اختياري - سيتم إنشاؤه تلقائياً):</label>
            <input type="text" id="binId" placeholder="اتركه فارغاً للإنشاء التلقائي">
            <small>⚠️ ملاحظة: API Key يتم تخزينه محلياً فقط في متصفحك</small>
        </div>

        <div class="form-group">
            <label>✏️ أدخل الاسم الجديد:</label>
            <div class="input-wrapper">
                <input type="text" id="nameInput" placeholder="مثال: أحمد محمد" autocomplete="off">
                <button id="saveBtn">
                    <span>💾</span> حفظ الاسم
                </button>
            </div>
        </div>

        <div class="button-group">
            <button id="loadBtn">
                <span>📋</span> تحميل من السحاب
            </button>
            <button id="syncBtn" class="btn-success">
                <span>🔄</span> مزامنة مع السحاب
            </button>
            <button id="clearAllBtn" class="btn-danger">
                <span>🗑️</span> مسح الكل
            </button>
        </div>

        <div id="result" class="result"></div>
    </div>

    <script>
        // إعدادات JSONBin.io
        let API_KEY = '';
        let BIN_ID = '';
        let namesData = [];

        // مفاتيح التخزين المحلي
        const STORAGE_API_KEY = 'jsonbin_api_key';
        const STORAGE_BIN_ID = 'jsonbin_bin_id';

        // تحميل الإعدادات المحفوظة
        function loadSettings() {
            const savedApiKey = localStorage.getItem(STORAGE_API_KEY);
            const savedBinId = localStorage.getItem(STORAGE_BIN_ID);
            
            if (savedApiKey) {
                document.getElementById('apiKey').value = savedApiKey;
                API_KEY = savedApiKey;
            }
            if (savedBinId) {
                document.getElementById('binId').value = savedBinId;
                BIN_ID = savedBinId;
            }
        }

        // حفظ الإعدادات
        function saveSettings() {
            API_KEY = document.getElementById('apiKey').value;
            BIN_ID = document.getElementById('binId').value;
            
            if (API_KEY) {
                localStorage.setItem(STORAGE_API_KEY, API_KEY);
            }
            if (BIN_ID) {
                localStorage.setItem(STORAGE_BIN_ID, BIN_ID);
            }
        }

        // عرض رسالة منبثقة
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.background = isError ? '#ff4757' : '#333';
            toast.innerHTML = message;
            document.body.appendChild(toast);
            
            setTimeout(() => toast.remove(), 3000);
        }

        // عرض حالة التحميل
        function showLoading(show) {
            const resultDiv = document.getElementById('result');
            if (show) {
                resultDiv.innerHTML = `
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>جاري الاتصال بالسحاب...</p>
                    </div>
                `;
                resultDiv.classList.add('show');
            }
        }

        // إنشاء Bin جديد على JSONBin.io
        async function createBin() {
            if (!API_KEY) {
                showToast('❌ الرجاء إدخال API Key أولاً', true);
                return null;
            }

            const initialData = {
                names: [],
                createdAt: new Date().toISOString(),
                lastUpdated: new Date().toISOString()
            };

            try {
                const response = await fetch('https://api.jsonbin.io/v3/b', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': API_KEY
                    },
                    body: JSON.stringify(initialData)
                });

                if (!response.ok) {
                    throw new Error(`فشل الإنشاء: ${response.status}`);
                }

                const data = await response.json();
                BIN_ID = data.metadata.id;
                document.getElementById('binId').value = BIN_ID;
                localStorage.setItem(STORAGE_BIN_ID, BIN_ID);
                
                showToast(`✅ تم إنشاء Bin جديد! ID: ${BIN_ID}`);
                return BIN_ID;
            } catch (error) {
                console.error('خطأ في الإنشاء:', error);
                showToast(`❌ فشل إنشاء Bin: ${error.message}`, true);
                return null;
            }
        }

        // قراءة البيانات من JSONBin.io
        async function loadFromCloud() {
            if (!API_KEY) {
                showToast('❌ الرجاء إدخال API Key أولاً', true);
                return null;
            }

            if (!BIN_ID) {
                showToast('ℹ️ لا يوجد Bin ID، سيتم إنشاء واحد جديد...');
                const newBinId = await createBin();
                if (!newBinId) return null;
            }

            showLoading(true);

            try {
                const url = `https://api.jsonbin.io/v3/b/${BIN_ID}/latest`;
                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'X-Master-Key': API_KEY
                    }
                });

                if (!response.ok) {
                    if (response.status === 404) {
                        showToast('⚠️ Bin غير موجود، سيتم إنشاء جديد...');
                        const newBinId = await createBin();
                        if (newBinId) return await loadFromCloud();
                    }
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                const record = data.record;
                
                if (record && record.names) {
                    namesData = record.names;
                    showToast(`✅ تم تحميل ${namesData.length} اسم من السحاب`);
                } else {
                    namesData = [];
                }
                
                return namesData;
            } catch (error) {
                console.error('خطأ في التحميل:', error);
                showToast(`❌ فشل التحميل: ${error.message}`, true);
                return null;
            } finally {
                showLoading(false);
            }
        }

        // حفظ البيانات إلى JSONBin.io
        async function saveToCloud() {
            if (!API_KEY) {
                showToast('❌ الرجاء إدخال API Key أولاً', true);
                return false;
            }

            if (!BIN_ID) {
                const newBinId = await createBin();
                if (!newBinId) return false;
            }

            showLoading(true);

            const dataToSave = {
                names: namesData,
                lastUpdated: new Date().toISOString(),
                totalCount: namesData.length
            };

            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': API_KEY
                    },
                    body: JSON.stringify(dataToSave)
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                showToast(`✅ تم حفظ ${namesData.length} اسم في السحاب`);
                return true;
            } catch (error) {
                console.error('خطأ في الحفظ:', error);
                showToast(`❌ فشل الحفظ: ${error.message}`, true);
                return false;
            } finally {
                showLoading(false);
            }
        }

        // إضافة اسم جديد
        async function addName(name) {
            if (!name || !name.trim()) {
                showToast('⚠️ الرجاء إدخال اسم صحيح', true);
                return false;
            }

            const newName = {
                id: Date.now(),
                name: name.trim(),
                date: new Date().toISOString(),
                dateFormatted: new Date().toLocaleString('ar-EG')
            };

            namesData.push(newName);
            const saved = await saveToCloud();
            
            if (saved) {
                showToast(`✅ تم حفظ "${name}" في السحاب`);
                document.getElementById('nameInput').value = '';
                return true;
            } else {
                // التراجع إذا فشل الحفظ
                namesData.pop();
                return false;
            }
        }

        // حذف اسم
        async function deleteName(id) {
            const nameItem = namesData.find(item => item.id === id);
            namesData = namesData.filter(item => item.id !== id);
            const saved = await saveToCloud();
            
            if (saved) {
                showToast(`🗑️ تم حذف "${nameItem?.name}"`);
                displayNames();
            } else {
                // استعادة البيانات إذا فشل الحذف
                await loadFromCloud();
                displayNames();
            }
        }

        // مسح جميع الأسماء
        async function clearAllNames() {
            if (namesData.length === 0) {
                showToast('📭 لا توجد أسماء للحذف');
                return;
            }

            if (confirm(`⚠️ هل أنت متأكد من حذف جميع الأسماء (${namesData.length} اسم) من السحاب؟`)) {
                namesData = [];
                const saved = await saveToCloud();
                if (saved) {
                    showToast('🗑️ تم مسح جميع الأسماء من السحاب');
                    displayNames();
                }
            }
        }

        // عرض الأسماء
        function displayNames() {
            const resultDiv = document.getElementById('result');
            
            if (namesData.length === 0) {
                resultDiv.innerHTML = `
                    <div style="text-align: center; padding: 40px;">
                        <div style="font-size: 50px;">☁️📭</div>
                        <p>لا توجد أسماء في السحاب</p>
                        <p style="font-size: 12px; margin-top: 10px;">أضف اسماً جديداً لمشاركته مع الجميع</p>
                    </div>
                `;
                resultDiv.classList.add('show');
                return;
            }

            let html = `
                <div class="stats">
                    <span>☁️ السحاب: <strong>${namesData.length}</strong> اسم</span>
                    <span>🆔 Bin ID: ${BIN_ID ? BIN_ID.substring(0, 15) + '...' : 'غير محدد'}</span>
                </div>
                <h3>
                    <span>📋</span>
                    قائمة الأسماء (مشاركة مع الجميع)
                </h3>
                <ul class="names-list">
            `;

            [...namesData].reverse().forEach(item => {
                html += `
                    <li>
                        <div style="flex:1">
                            <strong>📌 ${escapeHtml(item.name)}</strong>
                            <div style="font-size: 11px; color: #888; margin-top: 5px;">
                                📅 ${item.dateFormatted}
                            </div>
                        </div>
                        <button class="delete-btn" onclick="deleteName(${item.id})">🗑️ حذف</button>
                    </li>
                `;
            });

            html += `</ul>`;
            resultDiv.innerHTML = html;
            resultDiv.classList.add('show');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // حدث المزامنة
        async function syncWithCloud() {
            saveSettings();
            const data = await loadFromCloud();
            if (data) {
                displayNames();
            }
        }

        // تهيئة الصفحة
        function init() {
            loadSettings();
            
            // الأحداث
            document.getElementById('saveBtn').addEventListener('click', async () => {
                const nameInput = document.getElementById('nameInput');
                await addName(nameInput.value);
                nameInput.value = '';
                nameInput.focus();
            });

            document.getElementById('loadBtn').addEventListener('click', syncWithCloud);
            
            document.getElementById('syncBtn').addEventListener('click', syncWithCloud);
            
            document.getElementById('clearAllBtn').addEventListener('click', clearAllNames);
            
            // Enter key
            document.getElementById('nameInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    document.getElementById('saveBtn').click();
                }
            });

            // حفظ الإعدادات عند تغييرها
            document.getElementById('apiKey').addEventListener('change', saveSettings);
            document.getElementById('binId').addEventListener('change', saveSettings);
        }

        window.deleteName = deleteName;
        init();
    </script>
</body>
</html>
