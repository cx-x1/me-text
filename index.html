<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rentry Clone - Text Editor & Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5.0.18/index.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">
    
    <nav class="bg-indigo-600 text-white shadow-lg sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <a href="#home" class="text-2xl font-bold flex items-center gap-2 hover:text-indigo-100 transition">
                <i class="fa-solid fa-pen-to-square"></i> Rentry Clone
            </a>
            <div class="flex gap-6 text-sm font-medium">
                <a href="#home" class="hover:text-indigo-200 transition flex items-center gap-2">
                    <i class="fa-solid fa-plus"></i> Create New
                </a>
                <a href="#dashboard" class="hover:text-indigo-200 transition flex items-center gap-2">
                    <i class="fa-solid fa-gauge-high"></i> Dashboard
                </a>
            </div>
        </div>
    </nav>

    <main id="app" class="container mx-auto px-4 py-8 flex-grow fade-in">
    </main>

    <div id="toast" class="fixed bottom-5 right-5 bg-gray-800 text-white px-6 py-3 rounded-lg shadow-xl transform translate-y-20 opacity-0 transition-all duration-300 flex items-center gap-3 z-50">
        <i class="fa-solid fa-circle-check text-green-400"></i>
        <span id="toast-msg">Operation successful</span>
    </div>

    <script>
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('api') === 'json' && urlParams.get('slug')) {
                const slug = urlParams.get('slug');
                const raw = localStorage.getItem('rentry_' + slug);
                if (raw) {
                    try {
                        const data = JSON.parse(raw);
                        const publicData = { 
                            slug: data.slug, 
                            content: data.content, 
                            createdAt: data.createdAt 
                        };
                        document.documentElement.innerHTML = '<pre style="font-family: monospace; padding: 20px; background: #1e1e1e; color: #d4d4d4; direction: ltr; text-align: left; margin: 0; height: 100vh; box-sizing: border-box; overflow: auto;">' + JSON.stringify(publicData, null, 2) + '</pre>';
                    } catch (e) {
                        document.documentElement.innerHTML = '<pre style="font-family: monospace; padding: 20px; background: #1e1e1e; color: #ff6b6b; direction: ltr; text-align: left;">{"error": "Invalid data format"}</pre>';
                    }
                } else {
                    document.documentElement.innerHTML = '<pre style="font-family: monospace; padding: 20px; background: #1e1e1e; color: #ff6b6b; direction: ltr; text-align: left;">{"error": "Entry not found"}</pre>';
                }
                return;
            }
        })();

        const app = {
            data: {
                entries: JSON.parse(localStorage.getItem('rentry_entries') || '[]'),
                dashboardPassword: '199@178'
            },

            init() {
                this.handleRouting();
                window.addEventListener('hashchange', () => this.handleRouting());
            },

            handleRouting() {
                const hash = window.location.hash || '#home';
                const main = document.getElementById('app');
                main.innerHTML = '';
                main.classList.remove('fade-in');
                void main.offsetWidth;
                main.classList.add('fade-in');

                if (hash === '#home') {
                    this.renderHome(main);
                } else if (hash.startsWith('#view/')) {
                    const slug = hash.split('/')[1];
                    this.renderView(main, slug);
                } else if (hash.startsWith('#edit/')) {
                    const slug = hash.split('/')[1];
                    this.renderEdit(main, slug);
                } else if (hash === '#dashboard') {
                    this.renderDashboard(main);
                } else {
                    this.renderHome(main);
                }
            },

            navigate(route) {
                window.location.hash = route;
            },

            saveEntries() {
                localStorage.setItem('rentry_entries', JSON.stringify(this.data.entries));
            },

            showToast(message) {
                const toast = document.getElementById('toast');
                document.getElementById('toast-msg').textContent = message;
                toast.classList.remove('translate-y-20', 'opacity-0');
                setTimeout(() => {
                    toast.classList.add('translate-y-20', 'opacity-0');
                }, 3000);
            },

            renderHome(container) {
                container.innerHTML = `
                    <div class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-md border border-gray-100">
                        <h2 class="text-2xl font-bold mb-6 text-indigo-700 flex items-center gap-2">
                            <i class="fa-solid fa-plus-circle"></i> Create New Page
                        </h2>
                        <form id="createForm" class="space-y-5">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">URL Slug</label>
                                <div class="flex">
                                    <span class="inline-flex items-center px-3 rounded-l-md border border-r-0 border-gray-300 bg-gray-50 text-gray-500 text-sm">
                                        page/
                                    </span>
                                    <input type="text" id="slug" required pattern="[a-zA-Z0-9_-]+" 
                                        class="flex-1 min-w-0 block w-full px-3 py-2 rounded-r-md border border-gray-300 focus:ring-indigo-500 focus:border-indigo-500 font-mono" 
                                        placeholder="my-page-name">
                                </div>
                                <p class="text-xs text-gray-500 mt-1">Only English letters, numbers, and dashes are allowed.</p>
                            </div>
                            
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Edit Password <span class="text-red-500">*</span></label>
                                <input type="password" id="editPassword" required 
                                    class="block w-full px-3 py-2 rounded-md border border-gray-300 focus:ring-indigo-500 focus:border-indigo-500" 
                                    placeholder="Enter a password to protect editing">
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Content</label>
                                <textarea id="content" required rows="10" 
                                    class="block w-full px-3 py-2 rounded-md border border-gray-300 focus:ring-indigo-500 focus:border-indigo-500 font-mono text-sm" 
                                    placeholder="Write your page content here..."></textarea>
                            </div>

                            <button type="submit" class="w-full bg-indigo-600 text-white py-3 px-4 rounded-md hover:bg-indigo-700 transition font-bold shadow-md flex justify-center items-center gap-2">
                                <i class="fa-solid fa-save"></i> Save and Publish Page
                            </button>
                        </form>
                    </div>
                `;

                document.getElementById('createForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    const slug = document.getElementById('slug').value.trim();
                    const editPassword = document.getElementById('editPassword').value;
                    const content = document.getElementById('content').value;

                    if (this.data.entries.find(entry => entry.slug === slug)) {
                        alert('This slug is already taken, please choose another one.');
                        return;
                    }

                    const newEntry = {
                        slug,
                        editPassword,
                        content,
                        createdAt: new Date().toISOString()
                    };

                    this.data.entries.push(newEntry);
                    this.saveEntries();
                    localStorage.setItem('rentry_' + slug, JSON.stringify(newEntry));

                    this.showToast('Page created successfully!');
                    this.navigate(`view/${slug}`);
                });
            },

            renderView(container, slug) {
                const entry = this.data.entries.find(e => e.slug === slug);
                if (!entry) {
                    container.innerHTML = `
                        <div class="text-center py-20">
                            <i class="fa-solid fa-circle-exclamation text-6xl text-gray-300 mb-4"></i>
                            <h2 class="text-2xl font-bold text-gray-600">Page Not Found</h2>
                            <a href="#home" class="mt-4 inline-block text-indigo-600 hover:underline font-bold">Back to Home</a>
                        </div>
                    `;
                    return;
                }

                const baseUrl = window.location.origin + window.location.pathname;
                const jsonUrl = `${baseUrl}?api=json&slug=${slug}`;

                container.innerHTML = `
                    <div class="max-w-3xl mx-auto">
                        <div class="bg-white p-8 rounded-xl shadow-md border border-gray-100 mb-6">
                            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 border-b border-gray-100 pb-4 gap-4">
                                <div>
                                    <h1 class="text-3xl font-bold text-gray-800 mb-1 font-mono">${entry.slug}</h1>
                                    <p class="text-sm text-gray-500">Created: ${new Date(entry.createdAt).toLocaleDateString()}</p>
                                </div>
                                <button onclick="app.navigate('edit/${entry.slug}')" class="bg-yellow-500 hover:bg-yellow-600 text-white px-5 py-2 rounded-lg transition flex items-center gap-2 shadow-sm font-bold">
                                    <i class="fa-solid fa-pen"></i> Edit Page
                                </button>
                            </div>
                            <div class="prose max-w-none text-gray-700 whitespace-pre-wrap font-mono text-sm bg-gray-50 p-6 rounded-lg border border-gray-200 leading-relaxed">
                                ${entry.content.replace(/</g, '&lt;').replace(/>/g, '&gt;')}
                            </div>
                        </div>

                        <div class="bg-indigo-50 border border-indigo-100 p-6 rounded-xl flex flex-col md:flex-row items-center justify-between gap-4">
                            <div class="flex items-center gap-4">
                                <div class="bg-indigo-100 p-3 rounded-full text-indigo-600">
                                    <i class="fa-solid fa-code text-xl"></i>
                                </div>
                                <div>
                                    <h3 class="font-bold text-indigo-900">JSON Data Access Link</h3>
                                    <p class="text-sm text-indigo-700">Use this link to access the page content as JSON data from your external projects.</p>
                                </div>
                            </div>
                            <button onclick="app.copyJsonLink('${jsonUrl}')" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-lg transition flex items-center gap-2 shadow-md whitespace-nowrap font-bold">
                                <i class="fa-regular fa-copy"></i> Copy Link
                            </button>
                        </div>
                    </div>
                `;
            },

            copyJsonLink(url) {
                navigator.clipboard.writeText(url).then(() => {
                    this.showToast('JSON link copied successfully!');
                }).catch(() => {
                    prompt('Copy the link manually:', url);
                });
            },

            renderEdit(container, slug) {
                const entry = this.data.entries.find(e => e.slug === slug);
                if (!entry) {
                    this.navigate('home');
                    return;
                }

                container.innerHTML = `
                    <div class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-md border border-gray-100">
                        <h2 class="text-2xl font-bold mb-6 text-yellow-600 flex items-center gap-2">
                            <i class="fa-solid fa-pen-to-square"></i> Edit Page: <span class="font-mono text-gray-700">${slug}</span>
                        </h2>
                        
                        <div id="passwordGate" class="mb-6">
                            <label class="block text-sm font-medium text-gray-700 mb-2">Enter the edit password to continue</label>
                            <div class="flex gap-2">
                                <input type="password" id="verifyEditPassword" class="flex-1 px-4 py-3 rounded-md border border-gray-300 focus:ring-yellow-500 focus:border-yellow-500 text-lg" placeholder="Password">
                                <button onclick="app.verifyEdit('${slug}')" class="bg-yellow-500 hover:bg-yellow-600 text-white px-6 py-3 rounded-md transition font-bold shadow-sm">
                                    Verify
                                </button>
                            </div>
                        </div>

                        <form id="editForm" class="space-y-5 hidden">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">New Content</label>
                                <textarea id="editContent" required rows="12" 
                                    class="block w-full px-3 py-2 rounded-md border border-gray-300 focus:ring-yellow-500 focus:border-yellow-500 font-mono text-sm">${entry.content}</textarea>
                            </div>
                            <div class="flex gap-3">
                                <button type="submit" class="flex-1 bg-yellow-500 text-white py-3 px-4 rounded-md hover:bg-yellow-600 transition font-bold shadow-md flex justify-center items-center gap-2">
                                    <i class="fa-solid fa-save"></i> Save Changes
                                </button>
                                <button type="button" onclick="app.navigate('view/${slug}')" class="px-6 py-3 border border-gray-300 rounded-md hover:bg-gray-50 transition text-gray-700 font-bold">
                                    Cancel
                                </button>
                            </div>
                        </form>
                    </div>
                `;
            },

            verifyEdit(slug) {
                const entry = this.data.entries.find(e => e.slug === slug);
                const inputPassword = document.getElementById('verifyEditPassword').value;
                
                if (inputPassword === entry.editPassword) {
                    document.getElementById('passwordGate').classList.add('hidden');
                    document.getElementById('editForm').classList.remove('hidden');
                    
                    document.getElementById('editForm').addEventListener('submit', (e) => {
                        e.preventDefault();
                        entry.content = document.getElementById('editContent').value;
                        entry.updatedAt = new Date().toISOString();
                        
                        this.saveEntries();
                        localStorage.setItem('rentry_' + slug, JSON.stringify(entry));
                        
                        this.showToast('Content updated successfully!');
                        this.navigate(`view/${slug}`);
                    });
                } else {
                    alert('Incorrect password!');
                    document.getElementById('verifyEditPassword').value = '';
                    document.getElementById('verifyEditPassword').focus();
                }
            },

            renderDashboard(container) {
                const isAuth = sessionStorage.getItem('dashboard_auth') === 'true';

                if (!isAuth) {
                    container.innerHTML = `
                        <div class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-md border border-gray-100 mt-10">
                            <div class="text-center mb-6">
                                <div class="bg-indigo-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-indigo-600 text-2xl">
                                    <i class="fa-solid fa-lock"></i>
                                </div>
                                <h2 class="text-2xl font-bold text-gray-800">Protected Dashboard</h2>
                                <p class="text-gray-500 text-sm mt-2">Enter the admin password to access the dashboard</p>
                                <p class="text-xs text-gray-400 mt-1 bg-gray-50 inline-block px-2 py-1 rounded">(Default password: 199@178)</p>
                            </div>
                            <form id="dashboardLoginForm" class="space-y-4">
                                <input type="password" id="dashPassword" required class="block w-full px-4 py-3 rounded-md border border-gray-300 focus:ring-indigo-500 focus:border-indigo-500 text-center text-lg tracking-widest" placeholder="••••••••">
                                <button type="submit" class="w-full bg-indigo-600 text-white py-3 px-4 rounded-md hover:bg-indigo-700 transition font-bold shadow-md">
                                    Login
                                </button>
                            </form>
                        </div>
                    `;

                    document.getElementById('dashboardLoginForm').addEventListener('submit', (e) => {
                        e.preventDefault();
                        if (document.getElementById('dashPassword').value === this.data.dashboardPassword) {
                            sessionStorage.setItem('dashboard_auth', 'true');
                            this.renderDashboard(container);
                        } else {
                            alert('Incorrect password!');
                            document.getElementById('dashPassword').value = '';
                        }
                    });
                    return;
                }

                const entries = this.data.entries;
                let rows = '';
                if (entries.length === 0) {
                    rows = `<tr><td colspan="4" class="text-center py-12 text-gray-500">No pages created yet.</td></tr>`;
                } else {
                    rows = entries.map(entry => {
                        const baseUrl = window.location.origin + window.location.pathname;
                        const jsonUrl = `${baseUrl}?api=json&slug=${entry.slug}`;
                        return `
                            <tr class="border-b border-gray-100 hover:bg-gray-50 transition">
                                <td class="py-4 px-4 font-mono text-sm text-indigo-600 font-bold">${entry.slug}</td>
                                <td class="py-4 px-4 text-sm text-gray-600">${new Date(entry.createdAt).toLocaleDateString()}</td>
                                <td class="py-4 px-4">
                                    <div class="flex gap-2">
                                        <button onclick="app.navigate('view/${entry.slug}')" class="text-blue-600 hover:bg-blue-50 p-2 rounded transition" title="View">
                                            <i class="fa-solid fa-eye"></i>
                                        </button>
                                        <button onclick="app.navigate('edit/${entry.slug}')" class="text-yellow-600 hover:bg-yellow-50 p-2 rounded transition" title="Edit">
                                            <i class="fa-solid fa-pen"></i>
                                        </button>
                                        <button onclick="app.copyJsonLink('${jsonUrl}')" class="text-green-600 hover:bg-green-50 p-2 rounded transition" title="Copy JSON Link">
                                            <i class="fa-solid fa-code"></i>
                                        </button>
                                        <button onclick="app.deleteEntry('${entry.slug}')" class="text-red-600 hover:bg-red-50 p-2 rounded transition" title="Delete">
                                            <i class="fa-solid fa-trash"></i>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        `;
                    }).join('');
                }

                container.innerHTML = `
                    <div class="max-w-5xl mx-auto">
                        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4">
                            <h2 class="text-2xl font-bold text-gray-800 flex items-center gap-2">
                                <i class="fa-solid fa-gauge-high text-indigo-600"></i> Dashboard
                            </h2>
                            <button onclick="sessionStorage.removeItem('dashboard_auth'); app.navigate('dashboard')" class="text-red-600 hover:bg-red-50 px-4 py-2 rounded-lg transition text-sm font-bold border border-red-200 flex items-center gap-2">
                                <i class="fa-solid fa-right-from-bracket"></i> Logout
                            </button>
                        </div>

                        <div class="bg-white rounded-xl shadow-md border border-gray-100 overflow-hidden">
                            <div class="overflow-x-auto">
                                <table class="w-full text-left">
                                    <thead class="bg-gray-50 border-b border-gray-200">
                                        <tr>
                                            <th class="py-4 px-4 text-sm font-bold text-gray-600">URL Slug</th>
                                            <th class="py-4 px-4 text-sm font-bold text-gray-600">Created Date</th>
                                            <th class="py-4 px-4 text-sm font-bold text-gray-600">Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-gray-100">
                                        ${rows}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                `;
            },

            deleteEntry(slug) {
                if (confirm('Are you sure you want to delete this page? This action cannot be undone.')) {
                    this.data.entries = this.data.entries.filter(e => e.slug !== slug);
                    this.saveEntries();
                    localStorage.removeItem('rentry_' + slug);
                    this.showToast('Page deleted successfully');
                    this.renderDashboard(document.getElementById('app'));
                }
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            app.init();
        });
    </script>
</body>
</html>
