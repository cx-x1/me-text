<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rentry Clone - Paste & Share</title>
    
    <!-- Fonts -->
    <link href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5.0.18/index.css" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- CryptoJS for Encryption -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['Courier New', 'monospace'],
                    }
                }
            }
        }
    </script>
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .spinner {
            display: inline-block; width: 20px; height: 20px;
            border: 3px solid rgba(255,255,255,.3); border-radius: 50%;
            border-top-color: #fff; animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        pre { white-space: pre-wrap; word-wrap: break-word; }
        .content-area { font-family: 'Courier New', monospace; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col">
    
    <!-- ========== Navigation ========== -->
    <nav class="bg-gray-800 border-b border-gray-700 sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <a href="#home" class="text-xl font-bold flex items-center gap-2 hover:text-indigo-400 transition">
                <i class="fa-solid fa-paste text-indigo-400"></i> 
                <span class="text-white">Rentry</span><span class="text-indigo-400">Clone</span>
            </a>
            <div id="navLinks" class="flex gap-4 text-sm font-medium">
                <a href="#home" class="text-gray-300 hover:text-white transition flex items-center gap-1">
                    <i class="fa-solid fa-plus text-xs"></i> New Paste
                </a>
                <a href="#dashboard" class="text-gray-300 hover:text-white transition flex items-center gap-1">
                    <i class="fa-solid fa-list text-xs"></i> Dashboard
                </a>
                <button id="lockBtn" class="hidden text-gray-300 hover:text-white transition flex items-center gap-1" onclick="app.lock()">
                    <i class="fa-solid fa-lock text-xs"></i> Lock
                </button>
            </div>
        </div>
    </nav>

    <!-- ========== Main Content ========== -->
    <main id="app" class="container mx-auto px-4 py-8 flex-grow fade-in">
        <div class="text-center py-20">
            <div class="spinner"></div>
            <p class="mt-4 text-gray-400">Loading...</p>
        </div>
    </main>

    <!-- ========== Toast ========== -->
    <div id="toast" class="fixed bottom-5 right-5 bg-gray-700 text-white px-6 py-3 rounded-lg shadow-xl transform translate-y-20 opacity-0 transition-all duration-300 flex items-center gap-3 z-50 border border-gray-600">
        <i id="toast-icon" class="fa-solid fa-circle-check text-green-400"></i>
        <span id="toast-msg"></span>
    </div>

    <script>
    // ============================================
    // RENTRY CLONE + PUBLIC JSON API
    // Single file - GitHub Pages compatible
    // ============================================
    
    const app = {
        // ========================================
        // State
        // ========================================
        masterKey: null,
        isUnlocked: false,
        
        // ========================================
        // Encryption
        // ========================================
        encrypt(text, key) {
            return CryptoJS.AES.encrypt(text, key).toString();
        },
        
        decrypt(ciphertext, key) {
            try {
                const bytes = CryptoJS.AES.decrypt(ciphertext, key);
                const decrypted = bytes.toString(CryptoJS.enc.Utf8);
                if (!decrypted) throw new Error('Decryption failed');
                return decrypted;
            } catch (e) {
                return null;
            }
        },
        
        deriveKey(password) {
            return CryptoJS.SHA256(password + "rentry_clone_salt_2024").toString();
        },
        
        // ========================================
        // Encrypted Storage
        // ========================================
        saveData(key, data) {
            if (!this.masterKey) return false;
            const encrypted = this.encrypt(JSON.stringify(data), this.masterKey);
            localStorage.setItem('enc_' + key, encrypted);
            return true;
        },
        
        loadData(key) {
            if (!this.masterKey) return null;
            const encrypted = localStorage.getItem('enc_' + key);
            if (!encrypted) return null;
            try {
                const decrypted = this.decrypt(encrypted, this.masterKey);
                return decrypted ? JSON.parse(decrypted) : null;
            } catch (e) {
                return null;
            }
        },
        
        // ========================================
        // Public Data (Unencrypted - accessible via JSON API)
        // ========================================
        savePublicPage(page) {
            // Store a public unencrypted copy for JSON API access
            const publicData = {
                slug: page.slug,
                content: page.content,
                created_at: page.createdAt,
                updated_at: page.updatedAt,
                edit_token: page.editToken
            };
            localStorage.setItem('pub_' + page.slug, JSON.stringify(publicData));
        },
        
        getPublicPage(slug) {
            const data = localStorage.getItem('pub_' + slug);
            if (!data) return null;
            try {
                return JSON.parse(data);
            } catch (e) {
                return null;
            }
        },
        
        deletePublicPage(slug) {
            localStorage.removeItem('pub_' + slug);
        },
        
        // ========================================
        // Auth
        // ========================================
        hasStoredPassword() {
            return localStorage.getItem('pwd_hash') !== null;
        },
        
        setupPassword(password) {
            const hash = CryptoJS.SHA256(password).toString();
            localStorage.setItem('pwd_hash', hash);
            this.masterKey = this.deriveKey(password);
            this.isUnlocked = true;
            this.saveData('pages', []);
            this.showToast('Account created! Start pasting.', 'success');
        },
        
        verifyPassword(password) {
            const storedHash = localStorage.getItem('pwd_hash');
            if (!storedHash) return false;
            return CryptoJS.SHA256(password).toString() === storedHash;
        },
        
        unlock(password) {
            if (this.verifyPassword(password)) {
                this.masterKey = this.deriveKey(password);
                this.isUnlocked = true;
                return true;
            }
            return false;
        },
        
        lock() {
            this.masterKey = null;
            this.isUnlocked = false;
            this.navigate('login');
            this.showToast('App locked', 'success');
        },
        
        // ========================================
        // Page CRUD
        // ========================================
        getPages() {
            return this.loadData('pages') || [];
        },
        
        savePages(pages) {
            this.saveData('pages', pages);
        },
        
        createPage(slug, content) {
            const pages = this.getPages();
            
            if (pages.find(p => p.slug === slug)) {
                return { success: false, error: 'This slug is already taken' };
            }
            
            const editToken = CryptoJS.SHA256(slug + Date.now() + Math.random()).toString().substring(0, 32);
            
            const page = {
                slug: slug,
                content: content,
                editToken: editToken,
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString()
            };
            
            pages.push(page);
            this.savePages(pages);
            
            // Always save public copy for JSON API access
            this.savePublicPage(page);
            
            return { success: true, page: page };
        },
        
        getPage(slug) {
            const pages = this.getPages();
            return pages.find(p => p.slug === slug) || null;
        },
        
        updatePage(slug, content) {
            const pages = this.getPages();
            const index = pages.findIndex(p => p.slug === slug);
            
            if (index === -1) {
                return { success: false, error: 'Page not found' };
            }
            
            pages[index].content = content;
            pages[index].updatedAt = new Date().toISOString();
            this.savePages(pages);
            
            // Update public copy
            this.savePublicPage(pages[index]);
            
            return { success: true, page: pages[index] };
        },
        
        deletePage(slug) {
            let pages = this.getPages();
            pages = pages.filter(p => p.slug !== slug);
            this.savePages(pages);
            this.deletePublicPage(slug);
            return { success: true };
        },
        
        // ========================================
        // JSON URL Generator
        // ========================================
        getJsonUrl(slug) {
            const base = window.location.origin + window.location.pathname;
            return `${base}?api=json&slug=${slug}`;
        },
        
        getRawUrl(slug) {
            const base = window.location.origin + window.location.pathname;
            return `${base}?api=raw&slug=${slug}`;
        },
        
        // ========================================
        // Toast
        // ========================================
        showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toast-icon');
            const msg = document.getElementById('toast-msg');
            msg.textContent = message;
            icon.className = type === 'error' 
                ? 'fa-solid fa-circle-xmark text-red-400' 
                : 'fa-solid fa-circle-check text-green-400';
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3500);
        },
        
        navigate(route) {
            window.location.hash = '#' + route;
        },
        
        updateNav() {
            const lockBtn = document.getElementById('lockBtn');
            lockBtn.classList.toggle('hidden', !this.isUnlocked);
        },
        
        copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                this.showToast('Copied to clipboard!', 'success');
            }).catch(() => {
                prompt('Copy this URL:', text);
            });
        },
        
        // ========================================
        // Render: Public View (No Login Required)
        // ========================================
        renderPublicView(container, slug) {
            const publicPage = this.getPublicPage(slug);
            
            if (!publicPage) {
                container.innerHTML = `
                    <div class="max-w-2xl mx-auto text-center py-20">
                        <i class="fa-solid fa-file-circle-question text-7xl text-gray-600 mb-6"></i>
                        <h2 class="text-3xl font-bold text-gray-300 mb-3">Paste Not Found</h2>
                        <p class="text-gray-500 mb-2">The paste <code class="text-indigo-400 bg-gray-800 px-2 py-1 rounded">${slug}</code> doesn't exist</p>
                        <a href="#home" class="inline-block mt-4 text-indigo-400 hover:text-indigo-300 font-bold">
                            <i class="fa-solid fa-arrow-left"></i> Create New Paste
                        </a>
                    </div>
                `;
                return;
            }
            
            const jsonUrl = this.getJsonUrl(slug);
            const rawUrl = this.getRawUrl(slug);
            
            container.innerHTML = `
                <div class="max-w-4xl mx-auto">
                    <!-- Paste Content -->
                    <div class="bg-gray-800 rounded-xl border border-gray-700 shadow-xl mb-6">
                        <div class="p-5 border-b border-gray-700 flex justify-between items-center flex-wrap gap-3">
                            <div>
                                <h1 class="text-xl font-bold font-mono text-indigo-400">/${publicPage.slug}</h1>
                                <p class="text-xs text-gray-500 mt-1">
                                    <i class="fa-regular fa-clock"></i> 
                                    ${new Date(publicPage.created_at).toLocaleString()}
                                    ${publicPage.updated_at !== publicPage.created_at ? ' (edited)' : ''}
                                </p>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="app.copyToClipboard('${jsonUrl}')" 
                                    class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-500 transition font-bold text-sm">
                                    <i class="fa-solid fa-code"></i> JSON
                                </button>
                                <button onclick="app.copyToClipboard('${rawUrl}')" 
                                    class="bg-gray-600 text-white px-4 py-2 rounded-lg hover:bg-gray-500 transition font-bold text-sm">
                                    <i class="fa-solid fa-file-lines"></i> Raw
                                </button>
                            </div>
                        </div>
                        <div class="p-6">
                            <pre class="content-area text-gray-200 text-sm bg-gray-900 p-5 rounded-lg leading-relaxed border border-gray-700 overflow-x-auto">${publicPage.content}</pre>
                        </div>
                    </div>
                    
                    <!-- API Info -->
                    <div class="bg-gray-800 rounded-xl border border-gray-700 shadow-xl p-6">
                        <h3 class="font-bold text-lg text-white mb-4 flex items-center gap-2">
                            <i class="fa-solid fa-plug text-indigo-400"></i> API Access
                        </h3>
                        
                        <div class="space-y-4">
                            <!-- JSON Endpoint -->
                            <div class="bg-gray-900 rounded-lg p-4 border border-gray-700">
                                <p class="text-xs font-semibold text-gray-400 mb-2">JSON Endpoint (with metadata):</p>
                                <div class="flex items-center gap-2">
                                    <code class="flex-1 text-xs text-green-400 break-all font-mono bg-gray-800 p-2 rounded">${jsonUrl}</code>
                                    <button onclick="app.copyToClipboard('${jsonUrl}')" class="text-gray-400 hover:text-white p-2">
                                        <i class="fa-solid fa-copy"></i>
                                    </button>
                                </div>
                            </div>
                            
                            <!-- Raw Endpoint -->
                            <div class="bg-gray-900 rounded-lg p-4 border border-gray-700">
                                <p class="text-xs font-semibold text-gray-400 mb-2">Raw Content (plain text only):</p>
                                <div class="flex items-center gap-2">
                                    <code class="flex-1 text-xs text-yellow-400 break-all font-mono bg-gray-800 p-2 rounded">${rawUrl}</code>
                                    <button onclick="app.copyToClipboard('${rawUrl}')" class="text-gray-400 hover:text-white p-2">
                                        <i class="fa-solid fa-copy"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Usage Examples -->
                        <div class="mt-4 bg-gray-900 rounded-lg p-4 border border-gray-700">
                            <p class="text-xs font-semibold text-gray-400 mb-3">Usage Examples:</p>
                            
                            <div class="space-y-3">
                                <div>
                                    <p class="text-xs text-gray-500 mb-1">cURL:</p>
                                    <pre class="text-xs bg-gray-950 text-green-400 p-3 rounded overflow-x-auto"><code>curl "${jsonUrl}"</code></pre>
                                </div>
                                
                                <div>
                                    <p class="text-xs text-gray-500 mb-1">JavaScript (fetch):</p>
                                    <pre class="text-xs bg-gray-950 text-green-400 p-3 rounded overflow-x-auto"><code>fetch("${jsonUrl}")
  .then(res => res.json())
  .then(data => console.log(data.content));</code></pre>
                                </div>
                                
                                <div>
                                    <p class="text-xs text-gray-500 mb-1">Python:</p>
                                    <pre class="text-xs bg-gray-950 text-green-400 p-3 rounded overflow-x-auto"><code>import requests
r = requests.get("${jsonUrl}")
data = r.json()
print(data["content"])</code></pre>
                                </div>
                                
                                <div>
                                    <p class="text-xs text-gray-500 mb-1">PHP:</p>
                                    <pre class="text-xs bg-gray-950 text-green-400 p-3 rounded overflow-x-auto"><code>$data = file_get_contents("${jsonUrl}");
$json = json_decode($data, true);
echo $json['content'];</code></pre>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        },
        
        // ========================================
        // Render: Login
        // ========================================
        renderLogin(container) {
            const hasPassword = this.hasStoredPassword();
            
            container.innerHTML = `
                <div class="max-w-md mx-auto bg-gray-800 p-8 rounded-xl border border-gray-700 shadow-xl mt-10">
                    <div class="text-center mb-6">
                        <div class="bg-indigo-900 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4 border-2 border-indigo-500">
                            <i class="fa-solid fa-paste text-3xl text-indigo-400"></i>
                        </div>
                        <h2 class="text-2xl font-bold text-white">
                            ${hasPassword ? 'Unlock Dashboard' : 'Create Account'}
                        </h2>
                        <p class="text-gray-400 mt-2 text-sm">
                            ${hasPassword 
                                ? 'Enter your password to manage pastes' 
                                : 'Create a password to start creating pastes. This password cannot be recovered!'}
                        </p>
                    </div>
                    
                    <form id="passwordForm" class="space-y-4">
                        <div>
                            <label class="block text-sm font-semibold text-gray-300 mb-1">Password</label>
                            <input type="password" id="password" required 
                                class="block w-full px-4 py-3 rounded-md bg-gray-700 border border-gray-600 text-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition" 
                                placeholder="${hasPassword ? 'Enter password' : 'Create password (min 8 chars)'}"
                                minlength="${hasPassword ? '1' : '8'}"
                                autocomplete="off">
                        </div>
                        
                        ${!hasPassword ? `
                        <div>
                            <label class="block text-sm font-semibold text-gray-300 mb-1">Confirm Password</label>
                            <input type="password" id="confirmPassword" required minlength="8" 
                                class="block w-full px-4 py-3 rounded-md bg-gray-700 border border-gray-600 text-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition" 
                                placeholder="Confirm password"
                                autocomplete="off">
                        </div>
                        ` : ''}
                        
                        <button type="submit" class="w-full bg-indigo-600 text-white py-3 px-4 rounded-md hover:bg-indigo-500 transition font-bold shadow-md text-lg">
                            <i class="fa-solid fa-key"></i> ${hasPassword ? 'Unlock' : 'Create Account'}
                        </button>
                        
                        ${hasPassword ? `
                        <div class="border-t border-gray-700 pt-4 mt-4">
                            <button type="button" id="resetBtn" class="w-full bg-red-900/50 text-red-400 py-3 px-4 rounded-md hover:bg-red-900 transition font-bold border border-red-800 text-sm">
                                <i class="fa-solid fa-triangle-exclamation"></i> Reset Everything
                            </button>
                            <p class="text-xs text-gray-500 text-center mt-2">Deletes all data permanently</p>
                        </div>
                        ` : ''}
                    </form>
                </div>
            `;
            
            document.getElementById('passwordForm').addEventListener('submit', (e) => {
                e.preventDefault();
                const password = document.getElementById('password').value;
                
                if (!hasPassword) {
                    const confirm = document.getElementById('confirmPassword').value;
                    if (password !== confirm) {
                        this.showToast('Passwords do not match', 'error');
                        return;
                    }
                    if (password.length < 8) {
                        this.showToast('Password must be at least 8 characters', 'error');
                        return;
                    }
                    this.setupPassword(password);
                    this.navigate('home');
                } else {
                    if (this.unlock(password)) {
                        this.showToast('Unlocked!', 'success');
                        this.navigate('dashboard');
                    } else {
                        this.showToast('Wrong password', 'error');
                    }
                }
            });
            
            if (hasPassword) {
                document.getElementById('resetBtn').addEventListener('click', () => {
                    if (confirm('DELETE ALL DATA?\n\nThis cannot be undone!')) {
                        if (confirm('FINAL WARNING!\n\nReally delete everything?')) {
                            localStorage.clear();
                            this.isUnlocked = false;
                            this.masterKey = null;
                            this.showToast('All data deleted', 'success');
                            this.renderLogin(container);
                        }
                    }
                });
            }
        },
        
        // ========================================
        // Render: Home (Create Paste)
        // ========================================
        renderHome(container) {
            if (!this.isUnlocked) {
                this.navigate('login');
                return;
            }
            
            container.innerHTML = `
                <div class="max-w-3xl mx-auto bg-gray-800 p-8 rounded-xl border border-gray-700 shadow-xl">
                    <h2 class="text-2xl font-bold mb-2 text-white flex items-center gap-2">
                        <i class="fa-solid fa-file-circle-plus text-indigo-400"></i> Create New Paste
                    </h2>
                    <p class="text-gray-400 text-sm mb-6">Each paste gets a public URL and JSON API endpoint automatically</p>
                    
                    <form id="createForm" class="space-y-5">
                        <div>
                            <label class="block text-sm font-semibold text-gray-300 mb-1">
                                Paste Slug <span class="text-gray-500">(URL name)</span>
                            </label>
                            <div class="flex rounded-md shadow-sm">
                                <span class="inline-flex items-center px-3 rounded-l-md border border-r-0 border-gray-600 bg-gray-700 text-gray-400 text-sm font-mono">
                                    / 
                                </span>
                                <input type="text" id="slug" required pattern="[a-zA-Z0-9_-]+" 
                                    class="flex-1 block w-full px-4 py-3 rounded-r-md bg-gray-700 border border-gray-600 text-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 font-mono" 
                                    placeholder="my-awesome-paste">
                            </div>
                            <p class="text-xs text-gray-500 mt-1">Letters, numbers, hyphens, underscores (3-50 chars)</p>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-semibold text-gray-300 mb-1">Content</label>
                            <textarea id="content" required rows="16" 
                                class="content-area block w-full px-4 py-3 rounded-md bg-gray-700 border border-gray-600 text-gray-100 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm" 
                                placeholder="Paste your content here...&#10;&#10;Supports plain text.&#10;Markdown-friendly."></textarea>
                        </div>
                        
                        <button type="submit" class="w-full bg-indigo-600 text-white py-3 px-4 rounded-md hover:bg-indigo-500 transition font-bold shadow-md text-lg flex justify-center items-center gap-2">
                            <i class="fa-solid fa-paper-plane"></i> Create Paste
                        </button>
                    </form>
                </div>
            `;
            
            document.getElementById('createForm').addEventListener('submit', (e) => {
                e.preventDefault();
                const slug = document.getElementById('slug').value.trim().toLowerCase();
                const content = document.getElementById('content').value;
                
                if (!/^[a-zA-Z0-9_-]{3,50}$/.test(slug)) {
                    this.showToast('Invalid slug: 3-50 chars, letters/numbers/hyphens/underscores', 'error');
                    return;
                }
                
                const result = this.createPage(slug, content);
                if (result.success) {
                    const jsonUrl = this.getJsonUrl(slug);
                    this.showToast(`Paste created! JSON API ready`, 'success');
                    
                    // Store edit token
                    sessionStorage.setItem('edit_token_' + slug, result.page.editToken);
                    
                    // Navigate to public view
                    window.location.hash = '#view/' + slug;
                } else {
                    this.showToast(result.error, 'error');
                }
            });
        },
        
        // ========================================
        // Render: Edit Page
        // ========================================
        renderEdit(container, slug) {
            if (!this.isUnlocked) {
                this.navigate('login');
                return;
            }
            
            const page = this.getPage(slug);
            if (!page) {
                this.navigate('home');
                return;
            }
            
            container.innerHTML = `
                <div class="max-w-3xl mx-auto bg-gray-800 p-8 rounded-xl border border-gray-700 shadow-xl">
                    <h2 class="text-2xl font-bold mb-6 text-yellow-400 flex items-center gap-2">
                        <i class="fa-solid fa-pen-to-square"></i> Edit: 
                        <span class="font-mono text-white">/${slug}</span>
                    </h2>
                    <form id="editForm" class="space-y-5">
                        <div>
                            <label class="block text-sm font-semibold text-gray-300 mb-1">Content</label>
                            <textarea id="editContent" required rows="18" 
                                class="content-area block w-full px-4 py-3 rounded-md bg-gray-700 border border-gray-600 text-gray-100 focus:ring-2 focus:ring-yellow-500 focus:border-yellow-500 text-sm">${page.content}</textarea>
                        </div>
                        <div class="flex gap-3">
                            <button type="submit" class="flex-1 bg-yellow-600 text-white py-3 px-4 rounded-md hover:bg-yellow-500 transition font-bold">
                                <i class="fa-solid fa-check"></i> Update Paste
                            </button>
                            <button type="button" onclick="window.location.hash='#view/${slug}'" 
                                class="px-6 py-3 bg-gray-700 border border-gray-600 rounded-md hover:bg-gray-600 transition text-gray-300 font-bold">
                                Cancel
                            </button>
                        </div>
                    </form>
                </div>
            `;
            
            document.getElementById('editForm').addEventListener('submit', (e) => {
                e.preventDefault();
                const content = document.getElementById('editContent').value;
                const result = this.updatePage(slug, content);
                
                if (result.success) {
                    this.showToast('Paste updated!', 'success');
                    window.location.hash = '#view/' + slug;
                } else {
                    this.showToast(result.error, 'error');
                }
            });
        },
        
        // ========================================
        // Render: Dashboard
        // ========================================
        renderDashboard(container) {
            if (!this.isUnlocked) {
                this.navigate('login');
                return;
            }
            
            const pages = this.getPages();
            
            container.innerHTML = `
                <div class="max-w-6xl mx-auto">
                    <div class="flex justify-between items-center mb-6 flex-wrap gap-3">
                        <h2 class="text-2xl font-bold text-white flex items-center gap-2">
                            <i class="fa-solid fa-list text-indigo-400"></i> My Pastes
                            <span class="text-sm font-normal text-gray-400 bg-gray-800 px-3 py-1 rounded-full border border-gray-700">
                                ${pages.length}
                            </span>
                        </h2>
                        <a href="#home" class="bg-indigo-600 text-white px-5 py-3 rounded-lg hover:bg-indigo-500 transition font-bold text-sm">
                            <i class="fa-solid fa-plus"></i> New Paste
                        </a>
                    </div>
                    
                    <div class="bg-gray-800 rounded-xl border border-gray-700 shadow-xl overflow-hidden">
                        ${pages.length === 0 ? `
                            <div class="text-center py-16">
                                <i class="fa-solid fa-paste text-6xl text-gray-600 mb-4"></i>
                                <h3 class="text-xl font-bold text-gray-400 mb-2">No Pastes Yet</h3>
                                <p class="text-gray-500 mb-6">Create your first paste to share</p>
                                <a href="#home" class="bg-indigo-600 text-white px-6 py-3 rounded-lg hover:bg-indigo-500 transition font-bold inline-block">
                                    <i class="fa-solid fa-plus"></i> Create Paste
                                </a>
                            </div>
                        ` : `
                            <div class="overflow-x-auto">
                                <table class="w-full">
                                    <thead>
                                        <tr class="bg-gray-900 border-b-2 border-gray-700">
                                            <th class="py-4 px-6 text-left text-sm font-bold text-gray-400">Slug</th>
                                            <th class="py-4 px-6 text-left text-sm font-bold text-gray-400">JSON API</th>
                                            <th class="py-4 px-6 text-left text-sm font-bold text-gray-400">Created</th>
                                            <th class="py-4 px-6 text-left text-sm font-bold text-gray-400">Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-gray-700">
                                        ${pages.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)).map(page => `
                                            <tr class="hover:bg-gray-750 transition">
                                                <td class="py-4 px-6 font-mono text-sm text-indigo-400 font-bold">
                                                    /${page.slug}
                                                </td>
                                                <td class="py-4 px-6">
                                                    <button onclick="app.copyToClipboard('${this.getJsonUrl(page.slug)}')" 
                                                        class="text-xs bg-gray-700 text-green-400 px-3 py-1 rounded hover:bg-gray-600 transition font-mono">
                                                        <i class="fa-solid fa-link"></i> JSON
                                                    </button>
                                                </td>
                                                <td class="py-4 px-6 text-sm text-gray-400">
                                                    ${new Date(page.createdAt).toLocaleDateString()}
                                                </td>
                                                <td class="py-4 px-6">
                                                    <div class="flex gap-1">
                                                        <button onclick="window.location.hash='#view/${page.slug}'" 
                                                            class="text-blue-400 hover:bg-gray-700 p-2 rounded transition" title="View Public Page">
                                                            <i class="fa-solid fa-eye"></i>
                                                        </button>
                                                        <button onclick="app.navigate('edit/${page.slug}')" 
                                                            class="text-yellow-400 hover:bg-gray-700 p-2 rounded transition" title="Edit">
                                                            <i class="fa-solid fa-pen"></i>
                                                        </button>
                                                        <button onclick="app.copyToClipboard('${this.getJsonUrl(page.slug)}')" 
                                                            class="text-green-400 hover:bg-gray-700 p-2 rounded transition" title="Copy JSON URL">
                                                            <i class="fa-solid fa-code"></i>
                                                        </button>
                                                        <button onclick="app.deletePageConfirm('${page.slug}')" 
                                                            class="text-red-400 hover:bg-gray-700 p-2 rounded transition" title="Delete">
                                                            <i class="fa-solid fa-trash"></i>
                                                        </button>
                                                    </div>
                                                </td>
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            </div>
                        `}
                    </div>
                </div>
            `;
        },
        
        deletePageConfirm(slug) {
            if (confirm(`Delete "/${slug}"?\n\nThis will also remove the JSON API endpoint.`)) {
                if (confirm('Are you sure? This cannot be undone!')) {
                    this.deletePage(slug);
                    this.showToast('Paste deleted', 'success');
                    this.renderDashboard(document.getElementById('app'));
                }
            }
        },
        
        // ========================================
        // API Handler (No login required)
        // ========================================
        handleApiRequest() {
            const params = new URLSearchParams(window.location.search);
            const api = params.get('api');
            const slug = params.get('slug');
            
            if (!api || !slug) return false;
            
            const publicPage = this.getPublicPage(slug);
            
            if (!publicPage) {
                this.outputResponse({ error: 'Paste not found', slug: slug }, 404);
                return true;
            }
            
            if (api === 'json') {
                // Full JSON response
                this.outputResponse({
                    slug: publicPage.slug,
                    content: publicPage.content,
                    created_at: publicPage.created_at,
                    updated_at: publicPage.updated_at,
                    url: this.getJsonUrl(slug)
                });
            } else if (api === 'raw') {
                // Raw text only
                document.body.innerHTML = '';
                document.head.innerHTML = '';
                const pre = document.createElement('pre');
                pre.style.cssText = `
                    font-family: monospace; padding: 20px; margin: 0;
                    background: #1a1a2e; color: #e0e0e0; min-height: 100vh;
                    white-space: pre-wrap; word-wrap: break-word;
                    font-size: 14px; line-height: 1.6;
                `;
                pre.textContent = publicPage.content;
                document.body.appendChild(pre);
            } else {
                this.outputResponse({ error: 'Invalid API type. Use ?api=json or ?api=raw' }, 400);
            }
            
            return true;
        },
        
        outputResponse(data, statusCode = 200) {
            document.body.innerHTML = '';
            document.head.innerHTML = '';
            
            const pre = document.createElement('pre');
            pre.style.cssText = `
                font-family: 'Courier New', monospace;
                padding: 20px; margin: 0;
                background: #1a1a2e; color: #c9d1d9;
                min-height: 100vh; font-size: 14px;
                line-height: 1.6; white-space: pre-wrap;
            `;
            pre.textContent = JSON.stringify(data, null, 2);
            document.body.appendChild(pre);
        },
        
        // ========================================
        // Router
        // ========================================
        handleRouting() {
            const hash = window.location.hash || '#home';
            const main = document.getElementById('app');
            
            this.updateNav();
            
            main.innerHTML = '';
            main.classList.remove('fade-in');
            void main.offsetWidth;
            main.classList.add('fade-in');
            
            if (hash === '#login') {
                this.renderLogin(main);
            } else if (hash.startsWith('#view/')) {
                // Public view - no login required
                const slug = hash.replace('#view/', '');
                this.renderPublicView(main, slug);
            } else if (!this.isUnlocked) {
                this.navigate('login');
            } else if (hash === '#home') {
                this.renderHome(main);
            } else if (hash === '#dashboard') {
                this.renderDashboard(main);
            } else if (hash.startsWith('#edit/')) {
                const slug = hash.replace('#edit/', '');
                this.renderEdit(main, slug);
            } else {
                this.renderHome(main);
            }
        },
        
        // ========================================
        // Init
        // ========================================
        init() {
            // Check for API request FIRST (no auth needed)
            if (this.handleApiRequest()) {
                return;
            }
            
            window.addEventListener('hashchange', () => this.handleRouting());
            
            if (this.hasStoredPassword()) {
                if (!window.location.hash || window.location.hash === '#') {
                    window.location.hash = '#home';
                }
            } else {
                window.location.hash = '#login';
            }
            
            this.handleRouting();
        }
    };

    document.addEventListener('DOMContentLoaded', () => app.init());
    </script>
</body>
</html>
