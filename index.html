<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Rentry - Encrypted Notes</title>
    
    <!-- Fonts -->
    <link href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5.0.18/index.css" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- CryptoJS for AES Encryption -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
        }
        .fade-in { 
            animation: fadeIn 0.3s ease-in-out; 
        }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        .spinner {
            display: inline-block;
            width: 20px; 
            height: 20px; 
            border: 3px solid rgba(255,255,255,.3); 
            border-radius: 50%; 
            border-top-color: #fff; 
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin { 
            to { transform: rotate(360deg); } 
        }
        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .json-key { color: #0066cc; }
        .json-string { color: #008000; }
        .json-number { color: #cc6600; }
        .json-boolean { color: #cc0066; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">
    
    <!-- ========== Navigation Bar ========== -->
    <nav class="bg-indigo-600 text-white shadow-lg sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <a href="#home" class="text-2xl font-bold flex items-center gap-2 hover:text-indigo-100 transition">
                <i class="fa-solid fa-lock"></i> Secure Rentry
            </a>
            <div id="navLinks" class="flex gap-6 text-sm font-medium">
                <a href="#home" class="hover:text-indigo-200 transition flex items-center gap-2">
                    <i class="fa-solid fa-plus"></i> New Page
                </a>
                <a href="#dashboard" class="hover:text-indigo-200 transition flex items-center gap-2">
                    <i class="fa-solid fa-gauge-high"></i> Dashboard
                </a>
                <button id="lockBtn" class="hidden hover:text-indigo-200 transition flex items-center gap-2" onclick="app.lock()">
                    <i class="fa-solid fa-lock"></i> Lock
                </button>
            </div>
        </div>
    </nav>

    <!-- ========== Main Content Area ========== -->
    <main id="app" class="container mx-auto px-4 py-8 flex-grow fade-in">
        <div class="text-center py-20">
            <div class="spinner"></div>
            <p class="mt-4 text-gray-600">Loading...</p>
        </div>
    </main>

    <!-- ========== Toast Notifications ========== -->
    <div id="toast" class="fixed bottom-5 right-5 bg-gray-800 text-white px-6 py-3 rounded-lg shadow-xl transform translate-y-20 opacity-0 transition-all duration-300 flex items-center gap-3 z-50">
        <i id="toast-icon" class="fa-solid fa-circle-check text-green-400"></i>
        <span id="toast-msg"></span>
    </div>

    <script>
    // ============================================
    // COMPLETE APP - GitHub Pages Only
    // All data encrypted with AES-256
    // Public JSON endpoints available
    // ============================================
    
    const app = {
        // ========================================
        // State Variables
        // ========================================
        masterKey: null,          // Encryption key derived from password
        isUnlocked: false,        // Is app unlocked?
        publicSlugs: new Set(),   // Track which slugs are public
        
        // ========================================
        // Encryption Utilities
        // ========================================
        
        // Encrypt text with AES
        encrypt(text, key) {
            return CryptoJS.AES.encrypt(text, key).toString();
        },
        
        // Decrypt text with AES
        decrypt(ciphertext, key) {
            try {
                const bytes = CryptoJS.AES.decrypt(ciphertext, key);
                const decrypted = bytes.toString(CryptoJS.enc.Utf8);
                if (!decrypted) throw new Error('Decryption failed');
                return decrypted;
            } catch (e) {
                return null;
            }
        },
        
        // Derive encryption key from password
        deriveKey(password) {
            return CryptoJS.SHA256(password + "secure_rentry_salt_2024_v2").toString();
        },
        
        // ========================================
        // Encrypted LocalStorage Operations
        // ========================================
        
        // Save encrypted data
        saveData(key, data) {
            if (!this.masterKey) return false;
            const encrypted = this.encrypt(JSON.stringify(data), this.masterKey);
            localStorage.setItem('enc_' + key, encrypted);
            return true;
        },
        
        // Load and decrypt data
        loadData(key) {
            if (!this.masterKey) return null;
            const encrypted = localStorage.getItem('enc_' + key);
            if (!encrypted) return null;
            try {
                const decrypted = this.decrypt(encrypted, this.masterKey);
                return decrypted ? JSON.parse(decrypted) : null;
            } catch (e) {
                return null;
            }
        },
        
        // Delete encrypted data
        deleteData(key) {
            localStorage.removeItem('enc_' + key);
        },
        
        // ========================================
        // Authentication
        // ========================================
        
        // Check if password exists
        hasStoredPassword() {
            return localStorage.getItem('password_hash') !== null;
        },
        
        // Setup new password
        setupPassword(password) {
            const hash = CryptoJS.SHA256(password).toString();
            localStorage.setItem('password_hash', hash);
            this.masterKey = this.deriveKey(password);
            this.isUnlocked = true;
            
            // Initialize empty pages array
            this.saveData('pages', []);
            this.saveData('public_slugs', []);
            
            this.showToast('Password created successfully!', 'success');
        },
        
        // Verify password
        verifyPassword(password) {
            const storedHash = localStorage.getItem('password_hash');
            if (!storedHash) return false;
            const inputHash = CryptoJS.SHA256(password).toString();
            return inputHash === storedHash;
        },
        
        // Unlock app
        unlock(password) {
            if (this.verifyPassword(password)) {
                this.masterKey = this.deriveKey(password);
                this.isUnlocked = true;
                
                // Load public slugs
                const publicSlugs = this.loadData('public_slugs') || [];
                this.publicSlugs = new Set(publicSlugs);
                
                return true;
            }
            return false;
        },
        
        // Lock app
        lock() {
            this.masterKey = null;
            this.isUnlocked = false;
            this.publicSlugs = new Set();
            this.navigate('login');
            this.showToast('App locked', 'success');
        },
        
        // ========================================
        // Page Management
        // ========================================
        
        // Get all pages
        getPages() {
            return this.loadData('pages') || [];
        },
        
        // Save all pages
        savePages(pages) {
            this.saveData('pages', pages);
        },
        
        // Create new page
        createPage(slug, content) {
            const pages = this.getPages();
            
            // Check for duplicate slug
            if (pages.find(p => p.slug === slug)) {
                return { success: false, error: 'This slug already exists' };
            }
            
            const newPage = {
                slug: slug,
                content: content,
                isPublic: false,     // Public JSON access flag
                publicToken: null,   // Token for public JSON access
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString()
            };
            
            pages.push(newPage);
            this.savePages(pages);
            
            return { success: true, page: newPage };
        },
        
        // Get single page
        getPage(slug) {
            const pages = this.getPages();
            return pages.find(p => p.slug === slug) || null;
        },
        
        // Update page
        updatePage(slug, content) {
            const pages = this.getPages();
            const index = pages.findIndex(p => p.slug === slug);
            
            if (index === -1) {
                return { success: false, error: 'Page not found' };
            }
            
            pages[index].content = content;
            pages[index].updatedAt = new Date().toISOString();
            this.savePages(pages);
            
            return { success: true, page: pages[index] };
        },
        
        // Delete page
        deletePage(slug) {
            let pages = this.getPages();
            pages = pages.filter(p => p.slug !== slug);
            this.savePages(pages);
            
            // Remove from public slugs
            this.publicSlugs.delete(slug);
            this.saveData('public_slugs', Array.from(this.publicSlugs));
            
            // Remove public data
            localStorage.removeItem('public_' + slug);
            
            return { success: true };
        },
        
        // ========================================
        // Public JSON Access System
        // ========================================
        
        // Toggle public access for a page
        togglePublic(slug) {
            const pages = this.getPages();
            const index = pages.findIndex(p => p.slug === slug);
            
            if (index === -1) return { success: false, error: 'Page not found' };
            
            if (pages[index].isPublic) {
                // Make private
                pages[index].isPublic = false;
                pages[index].publicToken = null;
                this.publicSlugs.delete(slug);
                localStorage.removeItem('public_' + slug);
            } else {
                // Make public
                const token = CryptoJS.SHA256(slug + Date.now() + Math.random()).toString().substring(0, 32);
                pages[index].isPublic = true;
                pages[index].publicToken = token;
                this.publicSlugs.add(slug);
                
                // Store public copy (unencrypted)
                localStorage.setItem('public_' + slug, JSON.stringify({
                    slug: slug,
                    content: pages[index].content,
                    token: token,
                    created_at: pages[index].createdAt,
                    updated_at: pages[index].updatedAt
                }));
            }
            
            this.savePages(pages);
            this.saveData('public_slugs', Array.from(this.publicSlugs));
            
            return { 
                success: true, 
                isPublic: pages[index].isPublic,
                publicUrl: pages[index].isPublic ? this.getPublicUrl(slug) : null
            };
        },
        
        // Check if page is public
        isPagePublic(slug) {
            return this.publicSlugs.has(slug);
        },
        
        // Get public page data
        getPublicPageData(slug) {
            const data = localStorage.getItem('public_' + slug);
            if (!data) return null;
            try {
                return JSON.parse(data);
            } catch (e) {
                return null;
            }
        },
        
        // Get public JSON URL
        getPublicUrl(slug) {
            const baseUrl = window.location.origin + window.location.pathname;
            return `${baseUrl}?api=json&slug=${slug}`;
        },
        
        // ========================================
        // UI Utilities
        // ========================================
        
        showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toast-icon');
            const msg = document.getElementById('toast-msg');
            
            msg.textContent = message;
            
            if (type === 'error') {
                icon.className = 'fa-solid fa-circle-xmark text-red-400';
            } else {
                icon.className = 'fa-solid fa-circle-check text-green-400';
            }
            
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        },
        
        navigate(route) {
            window.location.hash = '#' + route;
        },
        
        updateNav() {
            const lockBtn = document.getElementById('lockBtn');
            if (this.isUnlocked) {
                lockBtn.classList.remove('hidden');
            } else {
                lockBtn.classList.add('hidden');
            }
        },
        
        // ========================================
        // Page Renderers
        // ========================================
        
        // Login / Setup Password Page
        renderLogin(container) {
            const hasPassword = this.hasStoredPassword();
            
            container.innerHTML = `
                <div class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-lg border border-gray-100 mt-10">
                    <div class="text-center mb-6">
                        <div class="bg-indigo-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4">
                            <i class="fa-solid fa-shield-halved text-3xl text-indigo-600"></i>
                        </div>
                        <h2 class="text-2xl font-bold text-gray-800">
                            ${hasPassword ? 'Unlock Your Vault' : 'Create Master Password'}
                        </h2>
                        <p class="text-gray-500 mt-2 text-sm">
                            ${hasPassword 
                                ? 'Enter your master password to decrypt and access your data.' 
                                : 'Create a strong master password. All your data will be encrypted with AES-256. This password cannot be recovered!'}
                        </p>
                    </div>
                    
                    <form id="passwordForm" class="space-y-4">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">Master Password</label>
                            <input type="password" id="password" required 
                                class="block w-full px-4 py-3 rounded-md border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition" 
                                placeholder="${hasPassword ? 'Enter your master password' : 'Create a strong password (min 8 characters)'}"
                                minlength="${hasPassword ? '1' : '8'}"
                                autocomplete="off">
                        </div>
                        
                        ${!hasPassword ? `
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">Confirm Password</label>
                            <input type="password" id="confirmPassword" required minlength="8" 
                                class="block w-full px-4 py-3 rounded-md border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition" 
                                placeholder="Re-enter your password"
                                autocomplete="off">
                        </div>
                        ` : ''}
                        
                        <button type="submit" class="w-full bg-indigo-600 text-white py-3 px-4 rounded-md hover:bg-indigo-700 transition font-bold shadow-md text-lg">
                            <i class="fa-solid fa-key"></i> ${hasPassword ? 'Unlock' : 'Create Vault'}
                        </button>
                        
                        ${hasPassword ? `
                        <div class="border-t border-gray-200 pt-4 mt-4">
                            <button type="button" id="resetBtn" class="w-full bg-red-50 text-red-600 py-3 px-4 rounded-md hover:bg-red-100 transition font-bold border border-red-200">
                                <i class="fa-solid fa-triangle-exclamation"></i> Reset Everything (Delete All Data)
                            </button>
                            <p class="text-xs text-gray-400 text-center mt-2">This will permanently delete all encrypted data</p>
                        </div>
                        ` : ''}
                    </form>
                </div>
            `;
            
            document.getElementById('passwordForm').addEventListener('submit', (e) => {
                e.preventDefault();
                const password = document.getElementById('password').value;
                
                if (!hasPassword) {
                    const confirmPassword = document.getElementById('confirmPassword').value;
                    if (password !== confirmPassword) {
                        this.showToast('Passwords do not match', 'error');
                        return;
                    }
                    if (password.length < 8) {
                        this.showToast('Password must be at least 8 characters', 'error');
                        return;
                    }
                    this.setupPassword(password);
                    this.navigate('home');
                } else {
                    if (this.unlock(password)) {
                        this.showToast('Vault unlocked successfully!', 'success');
                        this.navigate('dashboard');
                    } else {
                        this.showToast('Invalid password', 'error');
                    }
                }
            });
            
            if (hasPassword) {
                document.getElementById('resetBtn').addEventListener('click', () => {
                    if (confirm('WARNING: This will permanently delete ALL your encrypted data!\n\nAre you absolutely sure?')) {
                        if (confirm('FINAL WARNING: This action CANNOT be undone!\n\nDelete everything?')) {
                            localStorage.clear();
                            this.isUnlocked = false;
                            this.masterKey = null;
                            this.showToast('All data has been deleted', 'success');
                            this.renderLogin(container);
                        }
                    }
                });
            }
        },
        
        // Home Page - Create New
        renderHome(container) {
            if (!this.isUnlocked) {
                this.navigate('login');
                return;
            }
            
            container.innerHTML = `
                <div class="max-w-3xl mx-auto bg-white p-8 rounded-xl shadow-lg border border-gray-100">
                    <h2 class="text-2xl font-bold mb-6 text-indigo-700 flex items-center gap-2">
                        <i class="fa-solid fa-file-circle-plus"></i> Create New Page
                    </h2>
                    <form id="createForm" class="space-y-5">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">Page Slug (URL Identifier)</label>
                            <div class="flex rounded-md shadow-sm">
                                <span class="inline-flex items-center px-3 rounded-l-md border border-r-0 border-gray-300 bg-gray-50 text-gray-500 text-sm font-mono">
                                    page/
                                </span>
                                <input type="text" id="slug" required pattern="[a-zA-Z0-9_-]+" 
                                    class="flex-1 block w-full px-4 py-3 rounded-r-md border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 font-mono" 
                                    placeholder="my-awesome-page">
                            </div>
                            <p class="text-xs text-gray-500 mt-1">Letters, numbers, hyphens, and underscores only (3-50 characters)</p>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">Content</label>
                            <textarea id="content" required rows="14" 
                                class="block w-full px-4 py-3 rounded-md border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 font-mono text-sm" 
                                placeholder="Write your page content here...&#10;&#10;This content will be encrypted and stored securely."></textarea>
                            <p class="text-xs text-gray-500 mt-1">Supports plain text and will be displayed as-is</p>
                        </div>
                        
                        <button type="submit" class="w-full bg-indigo-600 text-white py-3 px-4 rounded-md hover:bg-indigo-700 transition font-bold shadow-md flex justify-center items-center gap-2 text-lg">
                            <i class="fa-solid fa-lock"></i> Encrypt & Save Page
                        </button>
                    </form>
                </div>
            `;
            
            document.getElementById('createForm').addEventListener('submit', (e) => {
                e.preventDefault();
                const slug = document.getElementById('slug').value.trim().toLowerCase();
                const content = document.getElementById('content').value;
                
                if (!/^[a-zA-Z0-9_-]{3,50}$/.test(slug)) {
                    this.showToast('Invalid slug: 3-50 characters, letters/numbers/hyphens/underscores only', 'error');
                    return;
                }
                
                const result = this.createPage(slug, content);
                if (result.success) {
                    this.showToast('Page created and encrypted successfully!', 'success');
                    this.navigate('view/' + slug);
                } else {
                    this.showToast(result.error, 'error');
                }
            });
        },
        
        // View Page
        renderView(container, slug) {
            if (!this.isUnlocked) {
                this.navigate('login');
                return;
            }
            
            const page = this.getPage(slug);
            
            if (!page) {
                container.innerHTML = `
                    <div class="text-center py-20">
                        <i class="fa-solid fa-file-circle-question text-7xl text-gray-300 mb-4"></i>
                        <h2 class="text-2xl font-bold text-gray-600">Page Not Found</h2>
                        <p class="text-gray-500 mt-2">The page "${slug}" doesn't exist</p>
                        <a href="#home" class="mt-4 inline-block text-indigo-600 hover:underline font-bold">
                            <i class="fa-solid fa-arrow-left"></i> Back to Home
                        </a>
                    </div>
                `;
                return;
            }
            
            const publicUrl = page.isPublic ? this.getPublicUrl(slug) : null;
            
            container.innerHTML = `
                <div class="max-w-4xl mx-auto">
                    <!-- Page Content Card -->
                    <div class="bg-white rounded-xl shadow-lg border border-gray-100 mb-6">
                        <div class="p-6 border-b border-gray-100 flex justify-between items-start flex-wrap gap-4">
                            <div>
                                <h1 class="text-2xl font-bold font-mono text-indigo-700">
                                    <i class="fa-solid fa-file-lock"></i> ${page.slug}
                                </h1>
                                <div class="flex gap-4 mt-2 text-xs text-gray-500">
                                    <span><i class="fa-regular fa-calendar"></i> Created: ${new Date(page.createdAt).toLocaleString()}</span>
                                    <span><i class="fa-regular fa-clock"></i> Updated: ${new Date(page.updatedAt).toLocaleString()}</span>
                                </div>
                            </div>
                            <div class="flex gap-2 flex-wrap">
                                <button onclick="app.navigate('edit/${page.slug}')" 
                                    class="bg-yellow-500 text-white px-4 py-2 rounded-lg hover:bg-yellow-600 transition font-bold text-sm">
                                    <i class="fa-solid fa-pen-to-square"></i> Edit
                                </button>
                                <button onclick="app.copyContent('${page.slug}')" 
                                    class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600 transition font-bold text-sm">
                                    <i class="fa-solid fa-copy"></i> Copy Content
                                </button>
                                <button onclick="app.togglePublicAccess('${page.slug}')" 
                                    class="${page.isPublic ? 'bg-green-500 hover:bg-green-600' : 'bg-gray-400 hover:bg-gray-500'} text-white px-4 py-2 rounded-lg transition font-bold text-sm">
                                    <i class="fa-solid fa-${page.isPublic ? 'globe' : 'lock'}"></i> 
                                    ${page.isPublic ? 'Public' : 'Private'}
                                </button>
                            </div>
                        </div>
                        <div class="p-6">
                            <pre class="text-gray-800 font-mono text-sm bg-gray-50 p-6 rounded-lg leading-relaxed border border-gray-200">${page.content}</pre>
                        </div>
                    </div>
                    
                    <!-- Public JSON Access Card -->
                    <div class="${page.isPublic ? 'bg-green-50 border-green-200' : 'bg-gray-50 border-gray-200'} border rounded-xl p-6">
                        <div class="flex items-start justify-between flex-wrap gap-4">
                            <div class="flex items-start gap-4">
                                <div class="${page.isPublic ? 'bg-green-100 text-green-600' : 'bg-gray-200 text-gray-500'} p-3 rounded-full">
                                    <i class="fa-solid fa-code text-xl"></i>
                                </div>
                                <div>
                                    <h3 class="font-bold text-lg ${page.isPublic ? 'text-green-800' : 'text-gray-600'}">
                                        JSON API Access
                                    </h3>
                                    <p class="text-sm ${page.isPublic ? 'text-green-700' : 'text-gray-500'} mt-1">
                                        ${page.isPublic 
                                            ? '✅ This page is publicly accessible via JSON API' 
                                            : '🔒 Make this page public to get a JSON API endpoint'}
                                    </p>
                                    ${page.isPublic ? `
                                    <div class="mt-3 bg-white rounded-lg p-3 border border-green-200">
                                        <code class="text-xs text-green-800 break-all font-mono">${publicUrl}</code>
                                    </div>
                                    ` : ''}
                                </div>
                            </div>
                            ${page.isPublic ? `
                            <button onclick="app.copyToClipboard('${publicUrl}')" 
                                class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 transition font-bold text-sm">
                                <i class="fa-solid fa-link"></i> Copy JSON URL
                            </button>
                            ` : ''}
                        </div>
                        ${page.isPublic ? `
                        <div class="mt-4 bg-white rounded-lg p-4 border border-green-200">
                            <p class="text-xs font-semibold text-gray-500 mb-2">Example usage (curl):</p>
                            <pre class="text-xs bg-gray-900 text-green-400 p-3 rounded overflow-x-auto"><code>curl "${publicUrl}"</code></pre>
                            <p class="text-xs font-semibold text-gray-500 mt-3 mb-2">Example usage (JavaScript fetch):</p>
                            <pre class="text-xs bg-gray-900 text-green-400 p-3 rounded overflow-x-auto"><code>fetch("${publicUrl}")
  .then(res => res.json())
  .then(data => console.log(data));</code></pre>
                        </div>
                        ` : ''}
                    </div>
                </div>
            `;
        },
        
        // Toggle public access
        togglePublicAccess(slug) {
            const result = this.togglePublic(slug);
            if (result.success) {
                this.showToast(
                    result.isPublic ? 'Page is now public! JSON API enabled' : 'Page is now private', 
                    'success'
                );
                this.renderView(document.getElementById('app'), slug);
            } else {
                this.showToast(result.error, 'error');
            }
        },
        
        // Copy content to clipboard
        copyContent(slug) {
            const page = this.getPage(slug);
            if (page) {
                navigator.clipboard.writeText(page.content).then(() => {
                    this.showToast('Content copied to clipboard!', 'success');
                }).catch(() => {
                    this.showToast('Failed to copy content', 'error');
                });
            }
        },
        
        // Copy to clipboard utility
        copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                this.showToast('URL copied to clipboard!', 'success');
            }).catch(() => {
                prompt('Copy this URL:', text);
            });
        },
        
        // Edit Page
        renderEdit(container, slug) {
            if (!this.isUnlocked) {
                this.navigate('login');
                return;
            }
            
            const page = this.getPage(slug);
            if (!page) {
                this.navigate('home');
                return;
            }
            
            container.innerHTML = `
                <div class="max-w-3xl mx-auto bg-white p-8 rounded-xl shadow-lg border border-gray-100">
                    <h2 class="text-2xl font-bold mb-6 text-yellow-600 flex items-center gap-2">
                        <i class="fa-solid fa-pen-to-square"></i> Edit Page: 
                        <span class="font-mono text-gray-700">${page.slug}</span>
                    </h2>
                    <form id="editForm" class="space-y-5">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">Content</label>
                            <textarea id="editContent" required rows="16" 
                                class="block w-full px-4 py-3 rounded-md border border-gray-300 focus:ring-2 focus:ring-yellow-500 focus:border-yellow-500 font-mono text-sm">${page.content}</textarea>
                        </div>
                        <div class="flex gap-3">
                            <button type="submit" class="flex-1 bg-yellow-500 text-white py-3 px-4 rounded-md hover:bg-yellow-600 transition font-bold shadow-md">
                                <i class="fa-solid fa-check"></i> Save Changes
                            </button>
                            <button type="button" onclick="app.navigate('view/${slug}')" 
                                class="px-6 py-3 border-2 border-gray-300 rounded-md hover:bg-gray-50 transition text-gray-700 font-bold">
                                Cancel
                            </button>
                        </div>
                    </form>
                </div>
            `;
            
            document.getElementById('editForm').addEventListener('submit', (e) => {
                e.preventDefault();
                const content = document.getElementById('editContent').value;
                const result = this.updatePage(slug, content);
                
                if (result.success) {
                    // Update public copy if page is public
                    if (result.page.isPublic) {
                        localStorage.setItem('public_' + slug, JSON.stringify({
                            slug: slug,
                            content: content,
                            token: result.page.publicToken,
                            created_at: result.page.createdAt,
                            updated_at: result.page.updatedAt
                        }));
                    }
                    
                    this.showToast('Page updated successfully!', 'success');
                    this.navigate('view/' + slug);
                } else {
                    this.showToast(result.error, 'error');
                }
            });
        },
        
        // Dashboard
        renderDashboard(container) {
            if (!this.isUnlocked) {
                this.navigate('login');
                return;
            }
            
            const pages = this.getPages();
            
            container.innerHTML = `
                <div class="max-w-6xl mx-auto">
                    <div class="flex justify-between items-center mb-6 flex-wrap gap-3">
                        <h2 class="text-2xl font-bold text-gray-800 flex items-center gap-2">
                            <i class="fa-solid fa-gauge-high text-indigo-600"></i> Dashboard
                            <span class="text-sm font-normal text-gray-500 bg-gray-100 px-3 py-1 rounded-full">
                                ${pages.length} page${pages.length !== 1 ? 's' : ''}
                            </span>
                        </h2>
                        <a href="#home" class="bg-indigo-600 text-white px-5 py-3 rounded-lg hover:bg-indigo-700 transition font-bold text-sm">
                            <i class="fa-solid fa-plus"></i> New Page
                        </a>
                    </div>
                    
                    <div class="bg-white rounded-xl shadow-lg border border-gray-100 overflow-hidden">
                        ${pages.length === 0 ? `
                            <div class="text-center py-16">
                                <i class="fa-solid fa-file-circle-plus text-6xl text-gray-300 mb-4"></i>
                                <h3 class="text-xl font-bold text-gray-600 mb-2">No Pages Yet</h3>
                                <p class="text-gray-500 mb-6">Create your first encrypted page</p>
                                <a href="#home" class="bg-indigo-600 text-white px-6 py-3 rounded-lg hover:bg-indigo-700 transition font-bold inline-block">
                                    <i class="fa-solid fa-plus"></i> Create First Page
                                </a>
                            </div>
                        ` : `
                            <div class="overflow-x-auto">
                                <table class="w-full">
                                    <thead>
                                        <tr class="bg-gray-50 border-b-2 border-gray-200">
                                            <th class="py-4 px-6 text-left text-sm font-bold text-gray-600">Slug</th>
                                            <th class="py-4 px-6 text-left text-sm font-bold text-gray-600">Status</th>
                                            <th class="py-4 px-6 text-left text-sm font-bold text-gray-600">Created</th>
                                            <th class="py-4 px-6 text-left text-sm font-bold text-gray-600">Updated</th>
                                            <th class="py-4 px-6 text-left text-sm font-bold text-gray-600">Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-gray-100">
                                        ${pages.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)).map(page => `
                                            <tr class="hover:bg-gray-50 transition">
                                                <td class="py-4 px-6 font-mono text-sm text-indigo-600 font-bold">
                                                    <i class="fa-solid fa-file-lock text-xs text-gray-400"></i> ${page.slug}
                                                </td>
                                                <td class="py-4 px-6">
                                                    <span class="inline-flex items-center gap-1 px-2 py-1 rounded-full text-xs font-bold ${
                                                        page.isPublic 
                                                            ? 'bg-green-100 text-green-700' 
                                                            : 'bg-gray-100 text-gray-600'
                                                    }">
                                                        <i class="fa-solid fa-${page.isPublic ? 'globe' : 'lock'}"></i>
                                                        ${page.isPublic ? 'Public' : 'Private'}
                                                    </span>
                                                </td>
                                                <td class="py-4 px-6 text-sm text-gray-600">
                                                    ${new Date(page.createdAt).toLocaleDateString()}
                                                </td>
                                                <td class="py-4 px-6 text-sm text-gray-600">
                                                    ${new Date(page.updatedAt).toLocaleDateString()}
                                                </td>
                                                <td class="py-4 px-6">
                                                    <div class="flex gap-1">
                                                        <button onclick="app.navigate('view/${page.slug}')" 
                                                            class="text-blue-600 hover:bg-blue-50 p-2 rounded transition" title="View">
                                                            <i class="fa-solid fa-eye"></i>
                                                        </button>
                                                        <button onclick="app.navigate('edit/${page.slug}')" 
                                                            class="text-yellow-600 hover:bg-yellow-50 p-2 rounded transition" title="Edit">
                                                            <i class="fa-solid fa-pen"></i>
                                                        </button>
                                                        ${page.isPublic ? `
                                                        <button onclick="app.copyToClipboard('${this.getPublicUrl(page.slug)}')" 
                                                            class="text-green-600 hover:bg-green-50 p-2 rounded transition" title="Copy JSON URL">
                                                            <i class="fa-solid fa-link"></i>
                                                        </button>
                                                        ` : ''}
                                                        <button onclick="app.deletePageConfirm('${page.slug}')" 
                                                            class="text-red-600 hover:bg-red-50 p-2 rounded transition" title="Delete">
                                                            <i class="fa-solid fa-trash"></i>
                                                        </button>
                                                    </div>
                                                </td>
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            </div>
                        `}
                    </div>
                    
                    ${pages.length > 0 ? `
                    <div class="mt-4 text-xs text-gray-400 text-center">
                        <i class="fa-solid fa-shield-halved"></i> 
                        All data is encrypted with AES-256. Public pages are accessible via JSON API.
                    </div>
                    ` : ''}
                </div>
            `;
        },
        
        // Confirm Delete
        deletePageConfirm(slug) {
            if (confirm(`Delete page "${slug}"?\n\nThis action cannot be undone!`)) {
                if (confirm('Are you absolutely sure?')) {
                    this.deletePage(slug);
                    this.showToast('Page deleted successfully', 'success');
                    this.renderDashboard(document.getElementById('app'));
                }
            }
        },
        
        // ========================================
        // Routing
        // ========================================
        handleRouting() {
            const hash = window.location.hash || '#login';
            const main = document.getElementById('app');
            
            // Update navigation UI
            this.updateNav();
            
            // Reset and animate
            main.innerHTML = '';
            main.classList.remove('fade-in');
            void main.offsetWidth;
            main.classList.add('fade-in');
            
            // Route
            if (hash === '#login') {
                this.renderLogin(main);
            } else if (!this.isUnlocked) {
                this.navigate('login');
            } else if (hash === '#home') {
                this.renderHome(main);
            } else if (hash === '#dashboard') {
                this.renderDashboard(main);
            } else if (hash.startsWith('#view/')) {
                const slug = hash.replace('#view/', '');
                this.renderView(main, slug);
            } else if (hash.startsWith('#edit/')) {
                const slug = hash.replace('#edit/', '');
                this.renderEdit(main, slug);
            } else {
                this.renderHome(main);
            }
        },
        
        // ========================================
        // API Handler (for external JSON access)
        // ========================================
        handleApiRequest() {
            const params = new URLSearchParams(window.location.search);
            
            if (params.get('api') === 'json') {
                const slug = params.get('slug');
                
                if (!slug) {
                    this.outputJson({ error: 'Missing slug parameter' }, 400);
                    return true;
                }
                
                const publicData = this.getPublicPageData(slug);
                
                if (!publicData) {
                    this.outputJson({ error: 'Page not found or not public' }, 404);
                    return true;
                }
                
                // Return public JSON data
                this.outputJson({
                    slug: publicData.slug,
                    content: publicData.content,
                    created_at: publicData.created_at,
                    updated_at: publicData.updated_at,
                    access_token: publicData.token
                });
                
                return true;
            }
            
            return false;
        },
        
        // Output JSON response
        outputJson(data, statusCode = 200) {
            document.body.innerHTML = '';
            document.head.innerHTML = '';
            
            const pre = document.createElement('pre');
            pre.style.cssText = `
                font-family: 'Courier New', monospace;
                padding: 20px;
                background: #1e1e1e;
                color: #d4d4d4;
                min-height: 100vh;
                margin: 0;
                font-size: 14px;
                line-height: 1.6;
            `;
            pre.textContent = JSON.stringify(data, null, 2);
            
            document.body.appendChild(pre);
        },
        
        // ========================================
        // Initialize Application
        // ========================================
        init() {
            // Check if this is an API request
            if (this.handleApiRequest()) {
                return; // Don't load the app UI for API requests
            }
            
            // Listen for hash changes
            window.addEventListener('hashchange', () => this.handleRouting());
            
            // Check if password is set
            if (this.hasStoredPassword()) {
                if (!window.location.hash || window.location.hash === '#') {
                    window.location.hash = '#login';
                }
            } else {
                window.location.hash = '#login';
            }
            
            this.handleRouting();
        }
    };

    // Start app when page loads
    document.addEventListener('DOMContentLoaded', () => {
        app.init();
    });
    </script>
</body>
</html>
