<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Rentry - GitHub Pages</title>
    
    <!-- الخطوط -->
    <link href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5.0.18/index.css" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome للأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- CryptoJS للتشفير -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
        }
        .fade-in { 
            animation: fadeIn 0.3s ease-in-out; 
        }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        .spinner {
            display: inline-block;
            width: 20px; 
            height: 20px; 
            border: 3px solid rgba(255,255,255,.3); 
            border-radius: 50%; 
            border-top-color: #fff; 
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin { 
            to { transform: rotate(360deg); } 
        }
        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">
    
    <!-- ========== الشريط العلوي ========== -->
    <nav class="bg-indigo-600 text-white shadow-lg sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <a href="#home" class="text-2xl font-bold flex items-center gap-2 hover:text-indigo-100 transition">
                <i class="fa-solid fa-lock"></i> Secure Notes
            </a>
            <div id="navLinks" class="flex gap-6 text-sm font-medium">
                <a href="#home" class="hover:text-indigo-200 transition flex items-center gap-2">
                    <i class="fa-solid fa-plus"></i> جديد
                </a>
                <a href="#dashboard" class="hover:text-indigo-200 transition flex items-center gap-2">
                    <i class="fa-solid fa-gauge-high"></i> لوحة التحكم
                </a>
                <button id="lockBtn" class="hidden hover:text-indigo-200 transition flex items-center gap-2" onclick="app.lock()">
                    <i class="fa-solid fa-lock"></i> قفل
                </button>
            </div>
        </div>
    </nav>

    <!-- ========== المحتوى الرئيسي ========== -->
    <main id="app" class="container mx-auto px-4 py-8 flex-grow fade-in">
        <div class="text-center py-20">
            <div class="spinner"></div>
            <p class="mt-4 text-gray-600">جاري التحميل...</p>
        </div>
    </main>

    <!-- ========== الإشعارات ========== -->
    <div id="toast" class="fixed bottom-5 right-5 bg-gray-800 text-white px-6 py-3 rounded-lg shadow-xl transform translate-y-20 opacity-0 transition-all duration-300 flex items-center gap-3 z-50">
        <i id="toast-icon" class="fa-solid fa-circle-check text-green-400"></i>
        <span id="toast-msg"></span>
    </div>

    <script>
    // ============================================
    // التطبيق الكامل - يعمل على GitHub Pages فقط
    // ============================================
    
    const app = {
        // ========================================
        // المتغيرات
        // ========================================
        masterKey: null,          // مفتاح التشفير (يتم إنشاؤه من كلمة المرور)
        isUnlocked: false,        // هل تم فتح التطبيق؟
        
        // ========================================
        // دوال التشفير
        // ========================================
        
        // تشفير النص
        encrypt(text, key) {
            return CryptoJS.AES.encrypt(text, key).toString();
        },
        
        // فك تشفير النص
        decrypt(ciphertext, key) {
            try {
                const bytes = CryptoJS.AES.decrypt(ciphertext, key);
                const decrypted = bytes.toString(CryptoJS.enc.Utf8);
                if (!decrypted) throw new Error('فشل فك التشفير');
                return decrypted;
            } catch (e) {
                return null;
            }
        },
        
        // إنشاء مفتاح من كلمة المرور
        deriveKey(password) {
            return CryptoJS.SHA256(password + "secure_salt_2024").toString();
        },
        
        // ========================================
        // دوال التخزين (مشفرة)
        // ========================================
        
        // حفظ البيانات مشفرة
        saveData(key, data) {
            if (!this.masterKey) return false;
            const encrypted = this.encrypt(JSON.stringify(data), this.masterKey);
            localStorage.setItem('enc_' + key, encrypted);
            return true;
        },
        
        // قراءة البيانات المشفرة
        loadData(key) {
            if (!this.masterKey) return null;
            const encrypted = localStorage.getItem('enc_' + key);
            if (!encrypted) return null;
            try {
                const decrypted = this.decrypt(encrypted, this.masterKey);
                return decrypted ? JSON.parse(decrypted) : null;
            } catch (e) {
                return null;
            }
        },
        
        // حذف بيانات
        deleteData(key) {
            localStorage.removeItem('enc_' + key);
        },
        
        // الحصول على كل المفاتيح المخزنة
        getAllKeys() {
            const keys = [];
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key && key.startsWith('enc_')) {
                    keys.push(key.replace('enc_', ''));
                }
            }
            return keys;
        },
        
        // ========================================
        // دوال المصادقة
        // ========================================
        
        // التحقق من وجود كلمة مرور محفوظة
        hasStoredPassword() {
            const hash = localStorage.getItem('password_hash');
            return hash !== null;
        },
        
        // إنشاء كلمة مرور جديدة
        async setupPassword(password) {
            const hash = CryptoJS.SHA256(password).toString();
            localStorage.setItem('password_hash', hash);
            this.masterKey = this.deriveKey(password);
            this.isUnlocked = true;
            this.saveData('pages', []); // تهيئة مصفوفة الصفحات
            this.showToast('تم إنشاء كلمة المرور بنجاح!', 'success');
        },
        
        // التحقق من كلمة المرور
        verifyPassword(password) {
            const storedHash = localStorage.getItem('password_hash');
            if (!storedHash) return false;
            const inputHash = CryptoJS.SHA256(password).toString();
            return inputHash === storedHash;
        },
        
        // فتح التطبيق
        unlock(password) {
            if (this.verifyPassword(password)) {
                this.masterKey = this.deriveKey(password);
                this.isUnlocked = true;
                return true;
            }
            return false;
        },
        
        // قفل التطبيق
        lock() {
            this.masterKey = null;
            this.isUnlocked = false;
            this.navigate('login');
            this.showToast('تم قفل التطبيق', 'success');
        },
        
        // ========================================
        // دوال الصفحات
        // ========================================
        
        // الحصول على كل الصفحات
        getPages() {
            return this.loadData('pages') || [];
        },
        
        // حفظ كل الصفحات
        savePages(pages) {
            this.saveData('pages', pages);
        },
        
        // إنشاء صفحة جديدة
        createPage(slug, content) {
            const pages = this.getPages();
            
            // التحقق من عدم وجود slug مكرر
            if (pages.find(p => p.slug === slug)) {
                return { success: false, error: 'هذا المعرف موجود بالفعل' };
            }
            
            const newPage = {
                slug: slug,
                content: content,
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString()
            };
            
            pages.push(newPage);
            this.savePages(pages);
            
            return { success: true, page: newPage };
        },
        
        // الحصول على صفحة
        getPage(slug) {
            const pages = this.getPages();
            return pages.find(p => p.slug === slug) || null;
        },
        
        // تحديث صفحة
        updatePage(slug, content) {
            const pages = this.getPages();
            const index = pages.findIndex(p => p.slug === slug);
            
            if (index === -1) {
                return { success: false, error: 'الصفحة غير موجودة' };
            }
            
            pages[index].content = content;
            pages[index].updatedAt = new Date().toISOString();
            this.savePages(pages);
            
            return { success: true, page: pages[index] };
        },
        
        // حذف صفحة
        deletePage(slug) {
            let pages = this.getPages();
            pages = pages.filter(p => p.slug !== slug);
            this.savePages(pages);
            return { success: true };
        },
        
        // ========================================
        // دوال الواجهة
        // ========================================
        
        showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toast-icon');
            const msg = document.getElementById('toast-msg');
            
            msg.textContent = message;
            
            if (type === 'error') {
                icon.className = 'fa-solid fa-circle-xmark text-red-400';
                toast.className = toast.className.replace('bg-gray-800', 'bg-red-800');
            } else {
                icon.className = 'fa-solid fa-circle-check text-green-400';
                toast.className = toast.className.replace('bg-red-800', 'bg-gray-800');
            }
            
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        },
        
        navigate(route) {
            window.location.hash = '#' + route;
        },
        
        updateNav() {
            const lockBtn = document.getElementById('lockBtn');
            if (this.isUnlocked) {
                lockBtn.classList.remove('hidden');
            } else {
                lockBtn.classList.add('hidden');
            }
        },
        
        // ========================================
        // عرض الصفحات
        // ========================================
        
        // صفحة تسجيل الدخول / إنشاء كلمة المرور
        renderLogin(container) {
            const hasPassword = this.hasStoredPassword();
            
            container.innerHTML = `
                <div class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-md border border-gray-100 mt-10">
                    <div class="text-center mb-6">
                        <div class="bg-indigo-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                            <i class="fa-solid fa-lock text-2xl text-indigo-600"></i>
                        </div>
                        <h2 class="text-2xl font-bold text-gray-800">
                            ${hasPassword ? 'فتح التطبيق' : 'إنشاء كلمة مرور'}
                        </h2>
                        <p class="text-gray-500 mt-2 text-sm">
                            ${hasPassword 
                                ? 'أدخل كلمة المرور لفتح بياناتك المشفرة' 
                                : 'أنشئ كلمة مرور قوية لتشفير بياناتك. لا يمكن استعادتها!'}
                        </p>
                    </div>
                    
                    <form id="passwordForm" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">كلمة المرور</label>
                            <input type="password" id="password" required 
                                class="block w-full px-4 py-3 rounded-md border border-gray-300 focus:ring-indigo-500 focus:border-indigo-500" 
                                placeholder="${hasPassword ? 'أدخل كلمة المرور' : 'أنشئ كلمة مرور قوية (8 أحرف على الأقل)'}"
                                minlength="${hasPassword ? '1' : '8'}">
                        </div>
                        
                        ${!hasPassword ? `
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">تأكيد كلمة المرور</label>
                            <input type="password" id="confirmPassword" required minlength="8" 
                                class="block w-full px-4 py-3 rounded-md border border-gray-300 focus:ring-indigo-500 focus:border-indigo-500" 
                                placeholder="أعد كتابة كلمة المرور">
                        </div>
                        ` : ''}
                        
                        <button type="submit" class="w-full bg-indigo-600 text-white py-3 px-4 rounded-md hover:bg-indigo-700 transition font-bold shadow-md">
                            ${hasPassword ? 'فتح' : 'إنشاء'}
                        </button>
                        
                        ${hasPassword ? `
                        <button type="button" id="resetBtn" class="w-full bg-red-50 text-red-600 py-3 px-4 rounded-md hover:bg-red-100 transition font-bold border border-red-200">
                            <i class="fa-solid fa-triangle-exclamation"></i> إعادة تعيين (حذف كل البيانات)
                        </button>
                        ` : ''}
                    </form>
                </div>
            `;
            
            document.getElementById('passwordForm').addEventListener('submit', (e) => {
                e.preventDefault();
                const password = document.getElementById('password').value;
                
                if (!hasPassword) {
                    const confirmPassword = document.getElementById('confirmPassword').value;
                    if (password !== confirmPassword) {
                        this.showToast('كلمتا المرور غير متطابقتين', 'error');
                        return;
                    }
                    if (password.length < 8) {
                        this.showToast('كلمة المرور يجب أن تكون 8 أحرف على الأقل', 'error');
                        return;
                    }
                    this.setupPassword(password);
                    this.navigate('home');
                } else {
                    if (this.unlock(password)) {
                        this.showToast('تم الفتح بنجاح', 'success');
                        this.navigate('dashboard');
                    } else {
                        this.showToast('كلمة المرور غير صحيحة', 'error');
                    }
                }
            });
            
            if (hasPassword) {
                document.getElementById('resetBtn').addEventListener('click', () => {
                    if (confirm('هل أنت متأكد؟ سيتم حذف جميع البيانات المشفرة نهائياً!')) {
                        localStorage.clear();
                        this.showToast('تم حذف جميع البيانات', 'success');
                        this.renderLogin(container);
                    }
                });
            }
        },
        
        // الصفحة الرئيسية (إنشاء صفحة جديدة)
        renderHome(container) {
            if (!this.isUnlocked) {
                this.navigate('login');
                return;
            }
            
            container.innerHTML = `
                <div class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-md border border-gray-100">
                    <h2 class="text-2xl font-bold mb-6 text-indigo-700 flex items-center gap-2">
                        <i class="fa-solid fa-plus-circle"></i> إنشاء صفحة جديدة
                    </h2>
                    <form id="createForm" class="space-y-5">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">معرف الصفحة</label>
                            <input type="text" id="slug" required pattern="[a-zA-Z0-9_-]+" 
                                class="block w-full px-4 py-3 rounded-md border border-gray-300 font-mono" 
                                placeholder="my-page">
                            <p class="text-xs text-gray-500 mt-1">أحرف إنجليزية، أرقام، وشرطات فقط (3-50 حرف)</p>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">المحتوى</label>
                            <textarea id="content" required rows="12" 
                                class="block w-full px-4 py-3 rounded-md border border-gray-300 font-mono text-sm" 
                                placeholder="اكتب محتوى صفحتك هنا..."></textarea>
                        </div>
                        
                        <button type="submit" class="w-full bg-indigo-600 text-white py-3 px-4 rounded-md hover:bg-indigo-700 transition font-bold shadow-md flex justify-center items-center gap-2">
                            <i class="fa-solid fa-save"></i> حفظ ونشر
                        </button>
                    </form>
                </div>
            `;
            
            document.getElementById('createForm').addEventListener('submit', (e) => {
                e.preventDefault();
                const slug = document.getElementById('slug').value.trim();
                const content = document.getElementById('content').value;
                
                if (!/^[a-zA-Z0-9_-]{3,50}$/.test(slug)) {
                    this.showToast('معرف غير صالح (أحرف إنجليزية وأرقام وشرطات فقط، 3-50 حرف)', 'error');
                    return;
                }
                
                const result = this.createPage(slug, content);
                if (result.success) {
                    this.showToast('تم إنشاء الصفحة بنجاح!', 'success');
                    this.navigate('view/' + slug);
                } else {
                    this.showToast(result.error, 'error');
                }
            });
        },
        
        // عرض صفحة
        renderView(container, slug) {
            if (!this.isUnlocked) {
                this.navigate('login');
                return;
            }
            
            const page = this.getPage(slug);
            
            if (!page) {
                container.innerHTML = `
                    <div class="text-center py-20">
                        <i class="fa-solid fa-circle-exclamation text-6xl text-gray-300 mb-4"></i>
                        <h2 class="text-2xl font-bold text-gray-600">الصفحة غير موجودة</h2>
                        <a href="#home" class="mt-4 inline-block text-indigo-600 hover:underline font-bold">العودة للرئيسية</a>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = `
                <div class="max-w-4xl mx-auto">
                    <div class="bg-white rounded-xl shadow-md border border-gray-100 mb-6">
                        <div class="p-6 border-b border-gray-100 flex justify-between items-center flex-wrap gap-3">
                            <div>
                                <h1 class="text-2xl font-bold font-mono text-indigo-700">${page.slug}</h1>
                                <p class="text-xs text-gray-500 mt-1">
                                    تم الإنشاء: ${new Date(page.createdAt).toLocaleString('ar-IQ')}
                                </p>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="app.navigate('edit/${page.slug}')" 
                                    class="bg-yellow-500 text-white px-4 py-2 rounded-lg hover:bg-yellow-600 transition font-bold text-sm">
                                    <i class="fa-solid fa-pen"></i> تعديل
                                </button>
                                <button onclick="app.copyContent('${page.slug}')" 
                                    class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600 transition font-bold text-sm">
                                    <i class="fa-solid fa-copy"></i> نسخ
                                </button>
                            </div>
                        </div>
                        <div class="p-6">
                            <pre class="text-gray-700 font-mono text-sm bg-gray-50 p-4 rounded-lg leading-relaxed">${page.content}</pre>
                        </div>
                    </div>
                </div>
            `;
        },
        
        // نسخ محتوى الصفحة
        copyContent(slug) {
            const page = this.getPage(slug);
            if (page) {
                navigator.clipboard.writeText(page.content).then(() => {
                    this.showToast('تم نسخ المحتوى!', 'success');
                });
            }
        },
        
        // تعديل صفحة
        renderEdit(container, slug) {
            if (!this.isUnlocked) {
                this.navigate('login');
                return;
            }
            
            const page = this.getPage(slug);
            if (!page) {
                this.navigate('home');
                return;
            }
            
            container.innerHTML = `
                <div class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-md border border-gray-100">
                    <h2 class="text-2xl font-bold mb-6 text-yellow-600 flex items-center gap-2">
                        <i class="fa-solid fa-pen-to-square"></i> تعديل: 
                        <span class="font-mono">${page.slug}</span>
                    </h2>
                    <form id="editForm" class="space-y-5">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">المحتوى</label>
                            <textarea id="editContent" required rows="12" 
                                class="block w-full px-4 py-3 rounded-md border border-gray-300 font-mono text-sm">${page.content}</textarea>
                        </div>
                        <div class="flex gap-3">
                            <button type="submit" class="flex-1 bg-yellow-500 text-white py-3 px-4 rounded-md hover:bg-yellow-600 transition font-bold shadow-md">
                                <i class="fa-solid fa-save"></i> حفظ التعديلات
                            </button>
                            <button type="button" onclick="app.navigate('view/${slug}')" 
                                class="px-6 py-3 border border-gray-300 rounded-md hover:bg-gray-50 transition text-gray-700 font-bold">
                                إلغاء
                            </button>
                        </div>
                    </form>
                </div>
            `;
            
            document.getElementById('editForm').addEventListener('submit', (e) => {
                e.preventDefault();
                const content = document.getElementById('editContent').value;
                const result = this.updatePage(slug, content);
                
                if (result.success) {
                    this.showToast('تم تحديث الصفحة بنجاح!', 'success');
                    this.navigate('view/' + slug);
                } else {
                    this.showToast(result.error, 'error');
                }
            });
        },
        
        // لوحة التحكم
        renderDashboard(container) {
            if (!this.isUnlocked) {
                this.navigate('login');
                return;
            }
            
            const pages = this.getPages();
            
            container.innerHTML = `
                <div class="max-w-6xl mx-auto">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-2xl font-bold text-gray-800 flex items-center gap-2">
                            <i class="fa-solid fa-gauge-high text-indigo-600"></i> لوحة التحكم
                        </h2>
                        <a href="#home" class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 transition font-bold text-sm">
                            <i class="fa-solid fa-plus"></i> صفحة جديدة
                        </a>
                    </div>
                    
                    <div class="bg-white rounded-xl shadow-md border border-gray-100 overflow-hidden">
                        ${pages.length === 0 ? `
                            <div class="text-center py-12">
                                <i class="fa-solid fa-file-circle-plus text-5xl text-gray-300 mb-4"></i>
                                <p class="text-gray-500 mb-4">لا توجد صفحات بعد</p>
                                <a href="#home" class="text-indigo-600 hover:underline font-bold">إنشاء أول صفحة</a>
                            </div>
                        ` : `
                            <div class="overflow-x-auto">
                                <table class="w-full">
                                    <thead>
                                        <tr class="bg-gray-50 border-b border-gray-200">
                                            <th class="py-4 px-6 text-right text-sm font-bold text-gray-600">المعرف</th>
                                            <th class="py-4 px-6 text-right text-sm font-bold text-gray-600">تاريخ الإنشاء</th>
                                            <th class="py-4 px-6 text-right text-sm font-bold text-gray-600">آخر تحديث</th>
                                            <th class="py-4 px-6 text-right text-sm font-bold text-gray-600">إجراءات</th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-gray-100">
                                        ${pages.map(page => `
                                            <tr class="hover:bg-gray-50 transition">
                                                <td class="py-4 px-6 font-mono text-sm text-indigo-600 font-bold">
                                                    ${page.slug}
                                                </td>
                                                <td class="py-4 px-6 text-sm text-gray-600">
                                                    ${new Date(page.createdAt).toLocaleDateString('ar-IQ')}
                                                </td>
                                                <td class="py-4 px-6 text-sm text-gray-600">
                                                    ${new Date(page.updatedAt).toLocaleDateString('ar-IQ')}
                                                </td>
                                                <td class="py-4 px-6">
                                                    <div class="flex gap-2">
                                                        <button onclick="app.navigate('view/${page.slug}')" 
                                                            class="text-blue-600 hover:bg-blue-50 p-2 rounded transition" title="عرض">
                                                            <i class="fa-solid fa-eye"></i>
                                                        </button>
                                                        <button onclick="app.navigate('edit/${page.slug}')" 
                                                            class="text-yellow-600 hover:bg-yellow-50 p-2 rounded transition" title="تعديل">
                                                            <i class="fa-solid fa-pen"></i>
                                                        </button>
                                                        <button onclick="app.deletePageConfirm('${page.slug}')" 
                                                            class="text-red-600 hover:bg-red-50 p-2 rounded transition" title="حذف">
                                                            <i class="fa-solid fa-trash"></i>
                                                        </button>
                                                    </div>
                                                </td>
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            </div>
                        `}
                    </div>
                </div>
            `;
        },
        
        // تأكيد حذف صفحة
        deletePageConfirm(slug) {
            if (confirm(`هل أنت متأكد من حذف صفحة "${slug}"؟ لا يمكن التراجع عن هذا الإجراء.`)) {
                this.deletePage(slug);
                this.showToast('تم حذف الصفحة بنجاح', 'success');
                this.renderDashboard(document.getElementById('app'));
            }
        },
        
        // ========================================
        // التوجيه
        // ========================================
        handleRouting() {
            const hash = window.location.hash || '#login';
            const main = document.getElementById('app');
            
            // تحديث حالة القفل
            this.updateNav();
            
            // إعادة تحميل الصفحة بتأثير
            main.innerHTML = '';
            main.classList.remove('fade-in');
            void main.offsetWidth;
            main.classList.add('fade-in');
            
            // توجيه حسب الـ hash
            if (hash === '#login') {
                this.renderLogin(main);
            } else if (!this.isUnlocked) {
                // أي صفحة أخرى تتطلب الفتح
                this.navigate('login');
            } else if (hash === '#home') {
                this.renderHome(main);
            } else if (hash === '#dashboard') {
                this.renderDashboard(main);
            } else if (hash.startsWith('#view/')) {
                const slug = hash.replace('#view/', '');
                this.renderView(main, slug);
            } else if (hash.startsWith('#edit/')) {
                const slug = hash.replace('#edit/', '');
                this.renderEdit(main, slug);
            } else {
                this.renderHome(main);
            }
        },
        
        // ========================================
        // بدء التطبيق
        // ========================================
        init() {
            // الاستماع لتغييرات الـ hash
            window.addEventListener('hashchange', () => this.handleRouting());
            
            // التحقق من وجود كلمة مرور
            if (this.hasStoredPassword()) {
                // توجيه إلى صفحة تسجيل الدخول
                if (!window.location.hash || window.location.hash === '#') {
                    window.location.hash = '#login';
                }
            } else {
                // توجيه إلى إنشاء كلمة مرور
                window.location.hash = '#login';
            }
            
            this.handleRouting();
        }
    };

    // تشغيل التطبيق عند تحميل الصفحة
    document.addEventListener('DOMContentLoaded', () => {
        app.init();
    });
    </script>
</body>
</html>
