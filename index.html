<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rentry Clone - Secure Version</title>
    <link href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5.0.18/index.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .loading { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s ease-in-out infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">
    
    <nav class="bg-indigo-600 text-white shadow-lg sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <a href="#home" class="text-2xl font-bold flex items-center gap-2 hover:text-indigo-100 transition">
                <i class="fa-solid fa-pen-to-square"></i> Rentry Clone
            </a>
            <div id="navLinks" class="flex gap-6 text-sm font-medium">
                <a href="#home" class="hover:text-indigo-200 transition flex items-center gap-2">
                    <i class="fa-solid fa-plus"></i> Create New
                </a>
                <a href="#dashboard" class="hover:text-indigo-200 transition flex items-center gap-2">
                    <i class="fa-solid fa-gauge-high"></i> Dashboard
                </a>
                <button id="logoutBtn" class="hidden hover:text-indigo-200 transition flex items-center gap-2">
                    <i class="fa-solid fa-right-from-bracket"></i> Logout
                </button>
            </div>
        </div>
    </nav>

    <main id="app" class="container mx-auto px-4 py-8 flex-grow fade-in">
        <div class="text-center py-20">
            <div class="loading"></div>
            <p class="mt-4 text-gray-600">Loading...</p>
        </div>
    </main>

    <div id="toast" class="fixed bottom-5 right-5 bg-gray-800 text-white px-6 py-3 rounded-lg shadow-xl transform translate-y-20 opacity-0 transition-all duration-300 flex items-center gap-3 z-50">
        <i id="toast-icon" class="fa-solid fa-circle-check text-green-400"></i>
        <span id="toast-msg">Operation successful</span>
    </div>

    <script>
        // ============================================
        // Firebase Configuration
        // ============================================
        // IMPORTANT: Replace with your Firebase config
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ============================================
        // Security Utilities
        // ============================================
        const Security = {
            // Sanitize HTML to prevent XSS
            sanitizeHTML(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            },

            // Validate slug format
            validateSlug(slug) {
                return /^[a-zA-Z0-9_-]+$/.test(slug) && slug.length >= 3 && slug.length <= 50;
            },

            // Validate password strength
            validatePassword(password) {
                return password.length >= 8;
            },

            // Generate random edit token (for page editing)
            generateEditToken() {
                const array = new Uint8Array(32);
                crypto.getRandomValues(array);
                return Array.from(array, byte => byte.toString(16).padStart(2, '0')).join('');
            }
        };

        // ============================================
        // App State
        // ============================================
        const app = {
            currentUser: null,
            
            async init() {
                // Listen to auth state changes
                auth.onAuthStateChanged(async (user) => {
                    this.currentUser = user;
                    this.updateUI();
                    this.handleRouting();
                });

                window.addEventListener('hashchange', () => this.handleRouting());
                
                document.getElementById('logoutBtn').addEventListener('click', async () => {
                    await auth.signOut();
                    this.showToast('Logged out successfully', 'success');
                    this.navigate('home');
                });
            },

            updateUI() {
                const logoutBtn = document.getElementById('logoutBtn');
                if (this.currentUser) {
                    logoutBtn.classList.remove('hidden');
                } else {
                    logoutBtn.classList.add('hidden');
                }
            },

            handleRouting() {
                const hash = window.location.hash || '#home';
                const main = document.getElementById('app');
                main.innerHTML = '';
                main.classList.remove('fade-in');
                void main.offsetWidth;
                main.classList.add('fade-in');

                if (hash === '#home') {
                    this.renderHome(main);
                } else if (hash.startsWith('#view/')) {
                    const slug = hash.split('/')[1];
                    this.renderView(main, slug);
                } else if (hash.startsWith('#edit/')) {
                    const slug = hash.split('/')[1];
                    this.renderEdit(main, slug);
                } else if (hash === '#dashboard') {
                    this.renderDashboard(main);
                } else if (hash === '#login') {
                    this.renderLogin(main);
                } else if (hash === '#register') {
                    this.renderRegister(main);
                } else {
                    this.renderHome(main);
                }
            },

            navigate(route) {
                window.location.hash = route;
            },

            showToast(message, type = 'success') {
                const toast = document.getElementById('toast');
                const icon = document.getElementById('toast-icon');
                document.getElementById('toast-msg').textContent = message;
                
                if (type === 'error') {
                    icon.className = 'fa-solid fa-circle-xmark text-red-400';
                } else {
                    icon.className = 'fa-solid fa-circle-check text-green-400';
                }
                
                toast.classList.remove('translate-y-20', 'opacity-0');
                setTimeout(() => {
                    toast.classList.add('translate-y-20', 'opacity-0');
                }, 3000);
            },

            // ============================================
            // Authentication Pages
            // ============================================
            renderLogin(container) {
                container.innerHTML = `
                    <div class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-md border border-gray-100 mt-10">
                        <div class="text-center mb-6">
                            <div class="bg-indigo-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-indigo-600 text-2xl">
                                <i class="fa-solid fa-right-to-bracket"></i>
                            </div>
                            <h2 class="text-2xl font-bold text-gray-800">Login</h2>
                        </div>
                        <form id="loginForm" class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                                <input type="email" id="loginEmail" required class="block w-full px-4 py-3 rounded-md border border-gray-300 focus:ring-indigo-500 focus:border-indigo-500" placeholder="your@email.com">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                                <input type="password" id="loginPassword" required class="block w-full px-4 py-3 rounded-md border border-gray-300 focus:ring-indigo-500 focus:border-indigo-500" placeholder="••••••••">
                            </div>
                            <button type="submit" class="w-full bg-indigo-600 text-white py-3 px-4 rounded-md hover:bg-indigo-700 transition font-bold shadow-md">
                                Login
                            </button>
                            <p class="text-center text-sm text-gray-600">
                                Don't have an account? <a href="#register" class="text-indigo-600 hover:underline font-bold">Register</a>
                            </p>
                        </form>
                    </div>
                `;

                document.getElementById('loginForm').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const email = document.getElementById('loginEmail').value;
                    const password = document.getElementById('loginPassword').value;

                    try {
                        await auth.signInWithEmailAndPassword(email, password);
                        this.showToast('Logged in successfully', 'success');
                        this.navigate('dashboard');
                    } catch (error) {
                        this.showToast(error.message, 'error');
                    }
                });
            },

            renderRegister(container) {
                container.innerHTML = `
                    <div class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-md border border-gray-100 mt-10">
                        <div class="text-center mb-6">
                            <div class="bg-indigo-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-indigo-600 text-2xl">
                                <i class="fa-solid fa-user-plus"></i>
                            </div>
                            <h2 class="text-2xl font-bold text-gray-800">Register</h2>
                        </div>
                        <form id="registerForm" class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                                <input type="email" id="registerEmail" required class="block w-full px-4 py-3 rounded-md border border-gray-300 focus:ring-indigo-500 focus:border-indigo-500" placeholder="your@email.com">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                                <input type="password" id="registerPassword" required minlength="8" class="block w-full px-4 py-3 rounded-md border border-gray-300 focus:ring-indigo-500 focus:border-indigo-500" placeholder="Minimum 8 characters">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
                                <input type="password" id="registerConfirmPassword" required minlength="8" class="block w-full px-4 py-3 rounded-md border border-gray-300 focus:ring-indigo-500 focus:border-indigo-500" placeholder="••••••••">
                            </div>
                            <button type="submit" class="w-full bg-indigo-600 text-white py-3 px-4 rounded-md hover:bg-indigo-700 transition font-bold shadow-md">
                                Register
                            </button>
                            <p class="text-center text-sm text-gray-600">
                                Already have an account? <a href="#login" class="text-indigo-600 hover:underline font-bold">Login</a>
                            </p>
                        </form>
                    </div>
                `;

                document.getElementById('registerForm').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const email = document.getElementById('registerEmail').value;
                    const password = document.getElementById('registerPassword').value;
                    const confirmPassword = document.getElementById('registerConfirmPassword').value;

                    if (password !== confirmPassword) {
                        this.showToast('Passwords do not match', 'error');
                        return;
                    }

                    if (!Security.validatePassword(password)) {
                        this.showToast('Password must be at least 8 characters', 'error');
                        return;
                    }

                    try {
                        await auth.createUserWithEmailAndPassword(email, password);
                        this.showToast('Registered successfully', 'success');
                        this.navigate('dashboard');
                    } catch (error) {
                        this.showToast(error.message, 'error');
                    }
                });
            },

            // ============================================
            // Home Page (Create New)
            // ============================================
            renderHome(container) {
                if (!this.currentUser) {
                    container.innerHTML = `
                        <div class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-md border border-gray-100 text-center">
                            <h2 class="text-2xl font-bold mb-4 text-indigo-700">Welcome to Rentry Clone</h2>
                            <p class="text-gray-600 mb-6">Please login or register to create and manage pages.</p>
                            <div class="flex gap-4 justify-center">
                                <a href="#login" class="bg-indigo-600 text-white px-6 py-3 rounded-md hover:bg-indigo-700 transition font-bold">Login</a>
                                <a href="#register" class="bg-gray-200 text-gray-800 px-6 py-3 rounded-md hover:bg-gray-300 transition font-bold">Register</a>
                            </div>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = `
                    <div class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-md border border-gray-100">
                        <h2 class="text-2xl font-bold mb-6 text-indigo-700 flex items-center gap-2">
                            <i class="fa-solid fa-plus-circle"></i> Create New Page
                        </h2>
                        <form id="createForm" class="space-y-5">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">URL Slug</label>
                                <div class="flex">
                                    <span class="inline-flex items-center px-3 rounded-l-md border border-r-0 border-gray-300 bg-gray-50 text-gray-500 text-sm">
                                        page/
                                    </span>
                                    <input type="text" id="slug" required pattern="[a-zA-Z0-9_-]+" 
                                        class="flex-1 min-w-0 block w-full px-3 py-2 rounded-r-md border border-gray-300 focus:ring-indigo-500 focus:border-indigo-500 font-mono" 
                                        placeholder="my-page-name">
                                </div>
                                <p class="text-xs text-gray-500 mt-1">Only English letters, numbers, and dashes are allowed (3-50 characters).</p>
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Content</label>
                                <textarea id="content" required rows="10" 
                                    class="block w-full px-3 py-2 rounded-md border border-gray-300 focus:ring-indigo-500 focus:border-indigo-500 font-mono text-sm" 
                                    placeholder="Write your page content here..."></textarea>
                            </div>

                            <button type="submit" class="w-full bg-indigo-600 text-white py-3 px-4 rounded-md hover:bg-indigo-700 transition font-bold shadow-md flex justify-center items-center gap-2">
                                <i class="fa-solid fa-save"></i> Save and Publish Page
                            </button>
                        </form>
                    </div>
                `;

                document.getElementById('createForm').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const slug = document.getElementById('slug').value.trim();
                    const content = document.getElementById('content').value;

                    if (!Security.validateSlug(slug)) {
                        this.showToast('Invalid slug format', 'error');
                        return;
                    }

                    // Check if slug exists
                    const existingDoc = await db.collection('pages').doc(slug).get();
                    if (existingDoc.exists) {
                        this.showToast('This slug is already taken', 'error');
                        return;
                    }

                    // Generate secure edit token
                    const editToken = Security.generateEditToken();

                    try {
                        await db.collection('pages').doc(slug).set({
                            slug: slug,
                            content: content,
                            ownerId: this.currentUser.uid,
                            editToken: editToken, // Stored securely in Firestore
                            createdAt: firebase.firestore.FieldValue.serverTimestamp()
                        });

                        // Store edit token in sessionStorage (temporary)
                        sessionStorage.setItem(`edit_token_${slug}`, editToken);

                        this.showToast('Page created successfully!', 'success');
                        this.navigate(`view/${slug}`);
                    } catch (error) {
                        this.showToast('Error creating page: ' + error.message, 'error');
                    }
                });
            },

            // ============================================
            // View Page
            // ============================================
            async renderView(container, slug) {
                if (!Security.validateSlug(slug)) {
                    this.renderNotFound(container);
                    return;
                }

                try {
                    const doc = await db.collection('pages').doc(slug).get();
                    
                    if (!doc.exists) {
                        this.renderNotFound(container);
                        return;
                    }

                    const entry = doc.data();
                    const isOwner = this.currentUser && this.currentUser.uid === entry.ownerId;

                    const baseUrl = window.location.origin + window.location.pathname;
                    const jsonUrl = `${baseUrl}?api=json&slug=${slug}`;

                    container.innerHTML = `
                        <div class="max-w-3xl mx-auto">
                            <div class="bg-white p-8 rounded-xl shadow-md border border-gray-100 mb-6">
                                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 border-b border-gray-100 pb-4 gap-4">
                                    <div>
                                        <h1 class="text-3xl font-bold text-gray-800 mb-1 font-mono">${Security.sanitizeHTML(entry.slug)}</h1>
                                        <p class="text-sm text-gray-500">Created: ${entry.createdAt ? new Date(entry.createdAt.toDate()).toLocaleDateString() : 'Unknown'}</p>
                                    </div>
                                    ${isOwner ? `
                                        <button onclick="app.navigate('edit/${entry.slug}')" class="bg-yellow-500 hover:bg-yellow-600 text-white px-5 py-2 rounded-lg transition flex items-center gap-2 shadow-sm font-bold">
                                            <i class="fa-solid fa-pen"></i> Edit Page
                                        </button>
                                    ` : ''}
                                </div>
                                <div class="prose max-w-none text-gray-700 whitespace-pre-wrap font-mono text-sm bg-gray-50 p-6 rounded-lg border border-gray-200 leading-relaxed">
                                    ${Security.sanitizeHTML(entry.content)}
                                </div>
                            </div>

                            <div class="bg-indigo-50 border border-indigo-100 p-6 rounded-xl flex flex-col md:flex-row items-center justify-between gap-4">
                                <div class="flex items-center gap-4">
                                    <div class="bg-indigo-100 p-3 rounded-full text-indigo-600">
                                        <i class="fa-solid fa-code text-xl"></i>
                                    </div>
                                    <div>
                                        <h3 class="font-bold text-indigo-900">JSON Data Access Link</h3>
                                        <p class="text-sm text-indigo-700">Use this link to access the page content as JSON data.</p>
                                    </div>
                                </div>
                                <button onclick="app.copyJsonLink('${jsonUrl}')" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-lg transition flex items-center gap-2 shadow-md whitespace-nowrap font-bold">
                                    <i class="fa-regular fa-copy"></i> Copy Link
                                </button>
                            </div>
                        </div>
                    `;
                } catch (error) {
                    this.showToast('Error loading page', 'error');
                    this.renderNotFound(container);
                }
            },

            renderNotFound(container) {
                container.innerHTML = `
                    <div class="text-center py-20">
                        <i class="fa-solid fa-circle-exclamation text-6xl text-gray-300 mb-4"></i>
                        <h2 class="text-2xl font-bold text-gray-600">Page Not Found</h2>
                        <a href="#home" class="mt-4 inline-block text-indigo-600 hover:underline font-bold">Back to Home</a>
                    </div>
                `;
            },

            copyJsonLink(url) {
                navigator.clipboard.writeText(url).then(() => {
                    this.showToast('JSON link copied successfully!', 'success');
                }).catch(() => {
                    prompt('Copy the link manually:', url);
                });
            },

            // ============================================
            // Edit Page
            // ============================================
            async renderEdit(container, slug) {
                if (!this.currentUser) {
                    this.navigate('login');
                    return;
                }

                if (!Security.validateSlug(slug)) {
                    this.navigate('home');
                    return;
                }

                try {
                    const doc = await db.collection('pages').doc(slug).get();
                    
                    if (!doc.exists) {
                        this.navigate('home');
                        return;
                    }

                    const entry = doc.data();

                    // Check ownership
                    if (entry.ownerId !== this.currentUser.uid) {
                        this.showToast('You do not have permission to edit this page', 'error');
                        this.navigate('home');
                        return;
                    }

                    container.innerHTML = `
                        <div class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-md border border-gray-100">
                            <h2 class="text-2xl font-bold mb-6 text-yellow-600 flex items-center gap-2">
                                <i class="fa-solid fa-pen-to-square"></i> Edit Page: <span class="font-mono text-gray-700">${Security.sanitizeHTML(slug)}</span>
                            </h2>
                            
                            <form id="editForm" class="space-y-5">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">New Content</label>
                                    <textarea id="editContent" required rows="12" 
                                        class="block w-full px-3 py-2 rounded-md border border-gray-300 focus:ring-yellow-500 focus:border-yellow-500 font-mono text-sm">${Security.sanitizeHTML(entry.content)}</textarea>
                                </div>
                                <div class="flex gap-3">
                                    <button type="submit" class="flex-1 bg-yellow-500 text-white py-3 px-4 rounded-md hover:bg-yellow-600 transition font-bold shadow-md flex justify-center items-center gap-2">
                                        <i class="fa-solid fa-save"></i> Save Changes
                                    </button>
                                    <button type="button" onclick="app.navigate('view/${slug}')" class="px-6 py-3 border border-gray-300 rounded-md hover:bg-gray-50 transition text-gray-700 font-bold">
                                        Cancel
                                    </button>
                                </div>
                            </form>
                        </div>
                    `;

                    document.getElementById('editForm').addEventListener('submit', async (e) => {
                        e.preventDefault();
                        const newContent = document.getElementById('editContent').value;

                        try {
                            await db.collection('pages').doc(slug).update({
                                content: newContent,
                                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                            });

                            this.showToast('Content updated successfully!', 'success');
                            this.navigate(`view/${slug}`);
                        } catch (error) {
                            this.showToast('Error updating page: ' + error.message, 'error');
                        }
                    });
                } catch (error) {
                    this.showToast('Error loading page', 'error');
                    this.navigate('home');
                }
            },

            // ============================================
            // Dashboard
            // ============================================
            async renderDashboard(container) {
                if (!this.currentUser) {
                    container.innerHTML = `
                        <div class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-md border border-gray-100 text-center mt-10">
                            <h2 class="text-2xl font-bold mb-4 text-indigo-700">Dashboard</h2>
                            <p class="text-gray-600 mb-6">Please login to access your dashboard.</p>
                            <a href="#login" class="bg-indigo-600 text-white px-6 py-3 rounded-md hover:bg-indigo-700 transition font-bold inline-block">Login</a>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = `
                    <div class="max-w-5xl mx-auto">
                        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4">
                            <h2 class="text-2xl font-bold text-gray-800 flex items-center gap-2">
                                <i class="fa-solid fa-gauge-high text-indigo-600"></i> My Dashboard
                            </h2>
                            <a href="#home" class="bg-indigo-600 text-white px-4 py-2 rounded-lg transition text-sm font-bold flex items-center gap-2">
                                <i class="fa-solid fa-plus"></i> Create New Page
                            </a>
                        </div>

                        <div class="bg-white rounded-xl shadow-md border border-gray-100 overflow-hidden">
                            <div class="overflow-x-auto">
                                <table class="w-full text-left">
                                    <thead class="bg-gray-50 border-b border-gray-200">
                                        <tr>
                                            <th class="py-4 px-4 text-sm font-bold text-gray-600">URL Slug</th>
                                            <th class="py-4 px-4 text-sm font-bold text-gray-600">Created Date</th>
                                            <th class="py-4 px-4 text-sm font-bold text-gray-600">Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody id="dashboardTableBody" class="divide-y divide-gray-100">
                                        <tr><td colspan="3" class="text-center py-12 text-gray-500">Loading...</td></tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                `;

                // Load user's pages
                try {
                    const snapshot = await db.collection('pages')
                        .where('ownerId', '==', this.currentUser.uid)
                        .orderBy('createdAt', 'desc')
                        .get();

                    const tbody = document.getElementById('dashboardTableBody');
                    
                    if (snapshot.empty) {
                        tbody.innerHTML = `<tr><td colspan="3" class="text-center py-12 text-gray-500">No pages created yet.</td></tr>`;
                        return;
                    }

                    let rows = '';
                    snapshot.forEach(doc => {
                        const entry = doc.data();
                        const baseUrl = window.location.origin + window.location.pathname;
                        const jsonUrl = `${baseUrl}?api=json&slug=${entry.slug}`;
                        
                        rows += `
                            <tr class="border-b border-gray-100 hover:bg-gray-50 transition">
                                <td class="py-4 px-4 font-mono text-sm text-indigo-600 font-bold">${Security.sanitizeHTML(entry.slug)}</td>
                                <td class="py-4 px-4 text-sm text-gray-600">${entry.createdAt ? new Date(entry.createdAt.toDate()).toLocaleDateString() : 'Unknown'}</td>
                                <td class="py-4 px-4">
                                    <div class="flex gap-2">
                                        <button onclick="app.navigate('view/${entry.slug}')" class="text-blue-600 hover:bg-blue-50 p-2 rounded transition" title="View">
                                            <i class="fa-solid fa-eye"></i>
                                        </button>
                                        <button onclick="app.navigate('edit/${entry.slug}')" class="text-yellow-600 hover:bg-yellow-50 p-2 rounded transition" title="Edit">
                                            <i class="fa-solid fa-pen"></i>
                                        </button>
                                        <button onclick="app.copyJsonLink('${jsonUrl}')" class="text-green-600 hover:bg-green-50 p-2 rounded transition" title="Copy JSON Link">
                                            <i class="fa-solid fa-code"></i>
                                        </button>
                                        <button onclick="app.deleteEntry('${entry.slug}')" class="text-red-600 hover:bg-red-50 p-2 rounded transition" title="Delete">
                                            <i class="fa-solid fa-trash"></i>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        `;
                    });
                    
                    tbody.innerHTML = rows;
                } catch (error) {
                    this.showToast('Error loading dashboard', 'error');
                }
            },

            async deleteEntry(slug) {
                if (!confirm('Are you sure you want to delete this page? This action cannot be undone.')) {
                    return;
                }

                try {
                    await db.collection('pages').doc(slug).delete();
                    this.showToast('Page deleted successfully', 'success');
                    this.renderDashboard(document.getElementById('app'));
                } catch (error) {
                    this.showToast('Error deleting page: ' + error.message, 'error');
                }
            }
        };

        // Initialize app
        document.addEventListener('DOMContentLoaded', () => {
            app.init();
        });
    </script>
</body>
</html>
