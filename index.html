<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>JSON PasteBin | إنشاء بيانات JSON فورية</title>
    <!-- Inter Font & Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5.0.18/index.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: #0a0c10; color: #e6edf3; }
        /* custom scroll and glass effect */
        .glass-panel { background: rgba(22, 27, 34, 0.96); backdrop-filter: blur(2px); border: 1px solid #30363d; }
        pre, code { font-family: 'JetBrains Mono', 'Fira Code', monospace; }
        .fade-in { animation: fadeSlideUp 0.25s ease-out; }
        @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .btn-primary { background: #2ea043; transition: all 0.2s ease; }
        .btn-primary:hover { background: #3fb950; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(46, 160, 67, 0.2); }
        .code-block { background: #0d1117; border-radius: 1rem; border: 1px solid #21262d; }
        .toast-slide { transition: transform 0.3s ease, opacity 0.3s ease; }
        textarea, input { background: #0d1117 !important; border: 1px solid #30363d !important; color: #f0f6fc !important; border-radius: 12px !important; transition: all 0.2s; }
        textarea:focus, input:focus { border-color: #58a6ff !important; outline: none !important; box-shadow: 0 0 0 2px rgba(88, 166, 255, 0.2); }
        .api-badge { background: #1f6feb20; border-left: 3px solid #2ea043; }
        button:active { transform: scale(0.97); }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- header modern -->
    <header class="border-b border-[#21262d] bg-[#0d1117]/90 sticky top-0 z-30 backdrop-blur-sm">
        <div class="container mx-auto px-5 py-4 flex flex-wrap justify-between items-center gap-3">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-bolt text-[#f78166] text-2xl"></i>
                <span class="font-bold text-xl tracking-tight bg-gradient-to-r from-white to-gray-400 bg-clip-text text-transparent">JSON<span class="text-[#58a6ff]">.Paste</span></span>
                <span class="hidden md:inline-block text-xs bg-[#21262d] px-2 py-1 rounded-full text-gray-300"><i class="fa-regular fa-clock"></i> API فوري</span>
            </div>
            <div class="flex gap-2">
                <a href="#home" class="px-4 py-2 text-sm font-medium rounded-lg hover:bg-[#21262d] transition"><i class="fa-solid fa-pen-to-square"></i> إنشاء</a>
                <a href="#dashboard" class="px-4 py-2 text-sm font-medium rounded-lg hover:bg-[#21262d] transition"><i class="fa-solid fa-table-list"></i> مسوداتي</a>
            </div>
        </div>
    </header>

    <main id="app" class="container mx-auto px-4 py-10 flex-grow fade-in">
        <div class="flex justify-center items-center py-20">
            <div class="flex flex-col items-center gap-3">
                <div class="w-8 h-8 border-3 border-[#30363d] border-t-[#58a6ff] rounded-full animate-spin"></div>
                <p class="text-gray-500 text-sm">جاري التحميل ...</p>
            </div>
        </div>
    </main>

    <!-- Toast system -->
    <div id="toastRoot" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 pointer-events-none">
        <div id="toastMsg" class="pointer-events-auto bg-[#161b22] border border-[#30363d] rounded-xl shadow-2xl px-5 py-3 flex items-center gap-3 transition-all duration-300 translate-y-10 opacity-0 backdrop-blur-md">
            <i id="toastIcon" class="fa-regular fa-circle-check text-emerald-400"></i>
            <span id="toastText" class="text-sm font-medium">تم النسخ</span>
        </div>
    </div>

    <script>
        // =====================================================
        // JSON PASTE API -  إنشاء بيانات JSON مباشرة عند الضغط
        // لا يحتاج إلى خادم، يعمل محلياً، يدعم Base64 + URL parameters
        // يوفر API بنقرة واحدة: JSON + Raw + View
        // =====================================================
        
        const App = {
            // ------------------- Base64 مع دعم اليونيكود ------------------
            encode(str) {
                try {
                    return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, (_, p1) => String.fromCharCode('0x' + p1)));
                } catch(e) {
                    return btoa(str);
                }
            },
            decode(b64) {
                try {
                    const decoded = atob(b64);
                    return decodeURIComponent(decoded.split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
                } catch(e) {
                    try { return atob(b64); } catch(e2) { return ''; }
                }
            },
            
            // -------- أدوات مساعدة ----------
            showToast(message, type = 'success') {
                const toastEl = document.getElementById('toastMsg');
                const iconSpan = document.getElementById('toastIcon');
                const textSpan = document.getElementById('toastText');
                if (!toastEl) return;
                textSpan.innerText = message;
                if (type === 'error') {
                    iconSpan.className = 'fa-regular fa-circle-xmark text-red-400';
                } else {
                    iconSpan.className = 'fa-regular fa-circle-check text-emerald-400';
                }
                toastEl.classList.remove('translate-y-10', 'opacity-0');
                toastEl.classList.add('translate-y-0', 'opacity-100');
                setTimeout(() => {
                    toastEl.classList.add('translate-y-10', 'opacity-0');
                    toastEl.classList.remove('translate-y-0', 'opacity-100');
                }, 2800);
            },
            
            copyToClipboard(text) {
                navigator.clipboard.writeText(text).then(() => {
                    this.showToast('تم النسخ ✅', 'success');
                }).catch(() => {
                    prompt('انسخ الرابط يدويًا:', text);
                    this.showToast('انسخ الرابط', 'info');
                });
            },
            
            getBaseUrl() {
                return window.location.origin + window.location.pathname;
            },
            
            // ---------- تخزين القوائم في localStorage ----------
            savePasteMeta(slug, encodedContent) {
                const pastes = JSON.parse(localStorage.getItem('json_pastes_list') || '[]');
                const existingIndex = pastes.findIndex(p => p.slug === slug);
                const newEntry = {
                    slug: slug,
                    encoded: encodedContent,
                    createdAt: new Date().toISOString(),
                };
                if (existingIndex >= 0) pastes[existingIndex] = newEntry;
                else pastes.push(newEntry);
                localStorage.setItem('json_pastes_list', JSON.stringify(pastes));
                return newEntry;
            },
            
            deletePasteBySlug(slug) {
                let pastes = JSON.parse(localStorage.getItem('json_pastes_list') || '[]');
                pastes = pastes.filter(p => p.slug !== slug);
                localStorage.setItem('json_pastes_list', JSON.stringify(pastes));
                this.showToast(`تم حذف "${slug}"`, 'success');
                this.renderCurrentRoute();
            },
            
            getAllPastes() {
                return JSON.parse(localStorage.getItem('json_pastes_list') || '[]');
            },
            
            // ---------- إنشاء روابط API المختلفة ----------
            getJsonApiUrl(slug, rawContent) {
                const dataParam = encodeURIComponent(this.encode(rawContent));
                return `${this.getBaseUrl()}?api=json&slug=${slug}&data=${dataParam}`;
            },
            getRawApiUrl(slug, rawContent) {
                const dataParam = encodeURIComponent(this.encode(rawContent));
                return `${this.getBaseUrl()}?api=raw&slug=${slug}&data=${dataParam}`;
            },
            getViewUrl(slug, rawContent) {
                const dataParam = encodeURIComponent(this.encode(rawContent));
                return `${this.getBaseUrl()}?view&slug=${slug}&data=${dataParam}`;
            },
            
            // ---------- المعالج السحري: API JSON المباشر بدون واجهة ----------
            handleDirectApi() {
                const urlParams = new URLSearchParams(window.location.search);
                const apiType = urlParams.get('api');
                const slug = urlParams.get('slug');
                const encodedData = urlParams.get('data');
                
                if (!apiType || !slug || !encodedData) return false;
                
                try {
                    const decodedContent = this.decode(decodeURIComponent(encodedData));
                    // JSON API endpoint -> يخرج JSON نقي
                    if (apiType === 'json') {
                        this.renderPureJsonResponse(slug, decodedContent);
                        return true;
                    }
                    // Raw endpoint -> نص خام
                    if (apiType === 'raw') {
                        this.renderRawText(decodedContent);
                        return true;
                    }
                } catch (err) {
                    if (apiType === 'json') {
                        document.body.innerHTML = `<pre style="color:#f85149; background:#0d1117; padding:2rem;">{"error": "invalid data", "message": "فشل فك التشفير"}</pre>`;
                        return true;
                    }
                    if (apiType === 'raw') {
                        document.body.innerText = "Error: corrupted data";
                        return true;
                    }
                }
                return false;
            },
            
            renderPureJsonResponse(slug, content) {
                // إزالة كل شيء وعرض JSON مباشرة
                document.head.innerHTML = '<meta charset="UTF-8"><title>JSON API - ' + slug + '</title>';
                document.body.innerHTML = '';
                document.body.style.background = '#0d1117';
                document.body.style.margin = '0';
                document.body.style.padding = '1.5rem';
                const responseObject = {
                    status: "success",
                    slug: slug,
                    content: content,
                    timestamp: new Date().toISOString(),
                    api_version: "1.0",
                    raw_url: this.getBaseUrl() + `?api=raw&slug=${slug}&data=${encodeURIComponent(this.encode(content))}`,
                    view_url: this.getBaseUrl() + `?view&slug=${slug}&data=${encodeURIComponent(this.encode(content))}`
                };
                const pre = document.createElement('pre');
                pre.style.cssText = 'background:#0a0c10; color:#a5d6ff; padding:24px; border-radius:20px; font-family: monospace; font-size:14px; white-space:pre-wrap; word-break:break-word; max-width:100%; margin:0; border:1px solid #30363d;';
                pre.textContent = JSON.stringify(responseObject, null, 2);
                document.body.appendChild(pre);
            },
            
            renderRawText(content) {
                document.head.innerHTML = '<meta charset="UTF-8"><title>Raw Paste</title>';
                document.body.innerHTML = '';
                document.body.style.background = '#0a0c10';
                document.body.style.padding = '2rem';
                const pre = document.createElement('pre');
                pre.style.cssText = 'color:#e6edf3; font-family: monospace; font-size:14px; white-space:pre-wrap; background:#0d1117; padding:20px; border-radius:16px; margin:0;';
                pre.textContent = content;
                document.body.appendChild(pre);
            },
            
            // ---------- إنشاء لصقة جديدة (JSON API فوري) ----------
            handleCreatePaste(slug, content) {
                if (!slug.match(/^[a-zA-Z0-9_-]{3,50}$/)) {
                    this.showToast('الاسم (slug) يجب أن يكون 3-50 حرفاً (a-z,0-9,_,-)', 'error');
                    return false;
                }
                if (!content.trim()) {
                    this.showToast('المحتوى لا يمكن أن يكون فارغاً', 'error');
                    return false;
                }
                const encoded = this.encode(content);
                this.savePasteMeta(slug, encoded);
                // بعد الإنشاء ننتقل إلى صفحة العرض مع عرض روابط JSON فورية
                const viewUrl = this.getViewUrl(slug, content);
                window.location.href = viewUrl;
                return true;
            },
            
            // ---------- واجهة العرض (View) + إظهار روابط JSON مباشرة ----------
            renderViewScreen(container, slug, encodedData) {
                if (!slug || !encodedData) {
                    container.innerHTML = `<div class="text-center py-16"><i class="fa-regular fa-file-lines text-5xl text-gray-600"></i><p class="mt-3 text-gray-400">بيانات غير صالحة أو مفقودة</p><a href="${this.getBaseUrl()}" class="inline-block mt-4 text-[#58a6ff] underline">إنشاء لصقة جديدة</a></div>`;
                    return;
                }
                let content;
                try {
                    content = this.decode(decodeURIComponent(encodedData));
                } catch(e) {
                    container.innerHTML = `<div class="text-red-400 text-center p-10">فشل فك تشفير المحتوى</div>`;
                    return;
                }
                
                const jsonUrl = this.getJsonApiUrl(slug, content);
                const rawUrl = this.getRawApiUrl(slug, content);
                const viewUrl = this.getViewUrl(slug, content);
                
                container.innerHTML = `
                    <div class="max-w-5xl mx-auto space-y-6 fade-in">
                        <!-- رأس الباستا -->
                        <div class="glass-panel rounded-2xl p-6 shadow-md">
                            <div class="flex flex-wrap justify-between items-start gap-4">
                                <div>
                                    <div class="flex items-center gap-2 text-[#58a6ff] text-2xl font-mono font-bold">
                                        <i class="fa-solid fa-link"></i> /${escapeHtml(slug)}
                                    </div>
                                    <p class="text-gray-400 text-sm mt-1"><i class="fa-regular fa-calendar"></i> تم الإنشاء الآن · رابط شامل</p>
                                </div>
                                <div class="flex gap-2 flex-wrap">
                                    <button id="copyJsonBtn" class="bg-[#1f6feb] hover:bg-[#388bfd] text-white px-5 py-2 rounded-xl text-sm font-bold transition shadow-md"><i class="fa-solid fa-code"></i> نسخ JSON URL</button>
                                    <button id="copyRawBtn" class="bg-[#30363d] hover:bg-[#3d444d] text-white px-5 py-2 rounded-xl text-sm font-bold transition"><i class="fa-solid fa-file-lines"></i> نسخ Raw URL</button>
                                </div>
                            </div>
                        </div>
                        
                        <!-- محتوى النص -->
                        <div class="glass-panel rounded-2xl overflow-hidden">
                            <div class="bg-[#0d1117] px-5 py-3 border-b border-[#30363d] flex gap-3">
                                <i class="fa-regular fa-file-code"></i> <span class="text-sm font-mono">المحتوى الخام</span>
                            </div>
                            <pre class="p-6 text-sm font-mono overflow-x-auto leading-relaxed bg-[#0a0c10] text-[#e6edf3]" style="white-space: pre-wrap;">${escapeHtml(content)}</pre>
                        </div>
                        
                        <!-- قسم API المباشر - JSON عند الضغط على أي رابط -->
                        <div class="glass-panel rounded-2xl p-6 border-l-4 border-l-[#2ea043]">
                            <h3 class="text-xl font-bold flex items-center gap-2"><i class="fa-solid fa-cloud-arrow-up text-[#58a6ff]"></i> واجهة JSON API المباشرة</h3>
                            <p class="text-gray-400 text-sm mb-5">هذه الروابط تعرض JSON فوري عند فتحها أو الضغط عليها — يمكنك استخدامها في أي تطبيق.</p>
                            
                            <div class="space-y-4">
                                <div class="bg-[#161b22] rounded-xl p-4 api-badge">
                                    <div class="flex justify-between items-start flex-wrap gap-2">
                                        <div><i class="fa-solid fa-brackets-curly text-green-400"></i> <span class="font-mono text-xs text-gray-300">نقطة النهاية JSON (metadata + المحتوى)</span></div>
                                        <button class="json-copy-btn text-xs bg-[#21262d] hover:bg-[#30363d] px-3 py-1.5 rounded-lg transition" data-url="${jsonUrl}"><i class="fa-regular fa-copy"></i> نسخ الرابط</button>
                                    </div>
                                    <code class="block text-xs text-[#a5d6ff] break-all mt-2 bg-[#0d1117] p-2 rounded-lg">${escapeHtml(jsonUrl)}</code>
                                    <div class="mt-3 flex gap-2">
                                        <a href="${jsonUrl}" target="_blank" class="inline-flex items-center gap-1 text-[#58a6ff] text-sm hover:underline"><i class="fa-solid fa-arrow-up-right-from-square"></i> فتح JSON مباشرة</a>
                                        <span class="text-gray-500">|</span>
                                        <a href="${rawUrl}" target="_blank" class="inline-flex items-center gap-1 text-[#a5d6ff] text-sm hover:underline"><i class="fa-regular fa-file"></i> Raw text</a>
                                    </div>
                                </div>
                                
                                <div class="bg-[#0d1117] rounded-xl p-4 border border-[#21262d]">
                                    <p class="text-xs font-bold text-gray-400 mb-2"><i class="fa-brands fa-js"></i> مثال JavaScript (استدعاء JSON فوري)</p>
                                    <pre class="text-xs bg-black/40 p-3 rounded-lg overflow-x-auto text-[#d2a8ff]"><code>fetch("${jsonUrl}")
  .then(res => res.json())
  .then(data => console.log("المحتوى:", data.content));</code></pre>
                                </div>
                                
                                <div class="flex gap-3 pt-2">
                                    <button id="testJsonBtn" class="flex-1 bg-[#238636] hover:bg-[#2ea043] py-2.5 rounded-xl font-bold transition flex items-center justify-center gap-2"><i class="fa-solid fa-flask"></i> تجربة JSON API (فتح في نافذة)</button>
                                    <button id="shareAllBtn" class="flex-1 bg-[#1f6feb] hover:bg-[#388bfd] py-2.5 rounded-xl transition flex items-center justify-center gap-2"><i class="fa-regular fa-share-from-square"></i> مشاركة الرابط الرئيسي</button>
                                </div>
                            </div>
                        </div>
                        
                        <div class="text-center text-xs text-gray-500 border-t border-[#21262d] pt-6 mt-4">
                            <i class="fa-regular fa-message"></i> جميع البيانات مشفرة داخل الرابط — يمكنك حفظ الرابط أو إرساله وستعمل واجهة JSON فوراً.
                        </div>
                    </div>
                `;
                
                // ربط الأزرار
                document.getElementById('copyJsonBtn')?.addEventListener('click', () => { this.copyToClipboard(jsonUrl); });
                document.getElementById('copyRawBtn')?.addEventListener('click', () => { this.copyToClipboard(rawUrl); });
                document.getElementById('testJsonBtn')?.addEventListener('click', () => { window.open(jsonUrl, '_blank'); });
                document.getElementById('shareAllBtn')?.addEventListener('click', () => { this.copyToClipboard(viewUrl); });
                document.querySelectorAll('.json-copy-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const url = btn.getAttribute('data-url');
                        if(url) this.copyToClipboard(url);
                    });
                });
            },
            
            // ---------- الصفحة الرئيسية: إنشاء Paste والحصول على JSON API بنقرة واحدة ----------
            renderHome(container) {
                container.innerHTML = `
                    <div class="max-w-3xl mx-auto glass-panel rounded-2xl p-7 md:p-9 shadow-2xl">
                        <div class="text-center mb-6">
                            <i class="fa-solid fa-bolt text-4xl text-[#f78166]"></i>
                            <h1 class="text-3xl md:text-4xl font-extrabold mt-2 bg-gradient-to-r from-white to-gray-300 bg-clip-text text-transparent">JSON API فوري</h1>
                            <p class="text-gray-400 mt-2">أدخل المحتوى، اضغط على "إنشاء واستخراج JSON" — تحصل على رابط JSON مباشر يعرض البيانات بصيغة json</p>
                        </div>
                        
                        <form id="mainCreateForm" class="space-y-6">
                            <div>
                                <label class="block text-sm font-semibold mb-2"><i class="fa-regular fa-keyboard"></i> المعرف (Slug) :</label>
                                <input type="text" id="slugInput" required pattern="[a-zA-Z0-9_-]{3,50}" 
                                    placeholder="مثال: my-config-v1 أو api-docs" 
                                    class="w-full px-5 py-3 rounded-xl font-mono">
                                <p class="text-[11px] text-gray-500 mt-1">أحرف إنجليزية، أرقام، شرطة سفلية فقط (3-50)</p>
                            </div>
                            <div>
                                <label class="block text-sm font-semibold mb-2"><i class="fa-regular fa-rectangle-ad"></i> المحتوى (نص أو JSON أو كود):</label>
                                <textarea id="pasteContent" rows="12" class="w-full px-5 py-3 rounded-xl font-mono text-sm" placeholder='{"name": "مثال", "value": "يمكنك وضع أي نص أو JSON"}&#10;أو مجرد نص عادي&#10;سيتم توفيره عبر API فوري'></textarea>
                            </div>
                            <button type="submit" id="createBtnAction" class="btn-primary w-full py-4 rounded-xl text-white font-bold text-lg flex justify-center items-center gap-3 shadow-lg">
                                <i class="fa-solid fa-cloud-arrow-up"></i> إنشاء و الحصول على JSON API مباشر
                            </button>
                        </form>
                        <div class="mt-6 text-xs text-center text-gray-500 bg-[#0d1117] rounded-xl p-3">
                            <i class="fa-regular fa-lightbulb"></i> عند الضغط، سيتم إنشاء رابط يحتوي على API JSON جاهز — يمكنك استخدامه فوراً في أي برنامج أو curl.
                        </div>
                    </div>
                `;
                const form = document.getElementById('mainCreateForm');
                form.addEventListener('submit', (e) => {
                    e.preventDefault();
                    const slug = document.getElementById('slugInput').value.trim().toLowerCase();
                    const content = document.getElementById('pasteContent').value;
                    this.handleCreatePaste(slug, content);
                });
            },
            
            // لوحة التحكم - قائمة المسودات
            renderDashboard(container) {
                const pastes = this.getAllPastes();
                container.innerHTML = `
                    <div class="max-w-6xl mx-auto">
                        <div class="flex justify-between items-center flex-wrap gap-4 mb-8">
                            <h2 class="text-2xl font-bold"><i class="fa-solid fa-table-list text-[#58a6ff]"></i> مسودات JSON الخاصة بي</h2>
                            <a href="${this.getBaseUrl()}" class="bg-[#238636] hover:bg-[#2ea043] px-5 py-2.5 rounded-xl transition text-white font-bold"><i class="fa-solid fa-plus"></i> إنشاء جديدة</a>
                        </div>
                        <div class="glass-panel rounded-2xl overflow-hidden">
                            ${pastes.length === 0 ? `
                                <div class="text-center py-16">
                                    <i class="fa-regular fa-folder-open text-5xl text-gray-600"></i>
                                    <p class="mt-4 text-gray-400">لا توجد أي لصقات بعد، أنشئ أول لصقة JSON</p>
                                    <a href="${this.getBaseUrl()}" class="inline-block mt-5 bg-[#1f6feb] px-6 py-2 rounded-xl">إنشاء الآن</a>
                                </div>
                            ` : `
                                <div class="overflow-x-auto">
                                    <table class="w-full text-sm">
                                        <thead class="bg-[#0d1117] border-b border-[#30363d]">
                                            <tr class="text-left">
                                                <th class="px-5 py-4 font-mono">Slug</th>
                                                <th class="px-5 py-4">تاريخ الإنشاء</th>
                                                <th class="px-5 py-4">إجراءات JSON API</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            ${pastes.slice().reverse().map(p => {
                                                let decodedSample = '';
                                                try { decodedSample = this.decode(p.encoded).substring(0, 60); } catch(e){ decodedSample = '...'; }
                                                const jsonLink = this.getBaseUrl() + `?api=json&slug=${p.slug}&data=${encodeURIComponent(p.encoded)}`;
                                                return `
                                                    <tr class="border-b border-[#21262d] hover:bg-[#161b22] transition">
                                                        <td class="px-5 py-3 font-mono text-[#58a6ff] font-bold">/${p.slug}</td>
                                                        <td class="px-5 py-3 text-gray-400 text-xs">${new Date(p.createdAt).toLocaleString()}</td>
                                                        <td class="px-5 py-3 flex gap-2 flex-wrap">
                                                            <a href="${jsonLink}" target="_blank" class="text-[#2ea043] text-xs bg-[#21262d] px-2 py-1 rounded-md hover:bg-[#30363d]"><i class="fa-solid fa-bolt"></i> JSON مباشر</a>
                                                            <button class="copyJsonBtn text-[#58a6ff] text-xs bg-[#21262d] px-2 py-1 rounded-md" data-url="${jsonLink}"><i class="fa-regular fa-copy"></i> نسخ JSON URL</button>
                                                            <button onclick="App.deletePasteBySlug('${p.slug}')" class="text-red-400 text-xs bg-[#21262d] px-2 py-1 rounded-md"><i class="fa-regular fa-trash-can"></i> حذف</button>
                                                        </td>
                                                    </tr>
                                                `;
                                            }).join('')}
                                        </tbody>
                                    </table>
                                </div>
                            `}
                        </div>
                        <p class="text-center text-xs text-gray-500 mt-6"><i class="fa-regular fa-circle-info"></i> الروابط تحتوي على البيانات مشفرة — تعمل في أي مكان ويمكن استخدام API JSON فوراً.</p>
                    </div>
                `;
                document.querySelectorAll('.copyJsonBtn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const url = btn.getAttribute('data-url');
                        if(url) this.copyToClipboard(url);
                    });
                });
            },
            
            // محدد المسار
            renderCurrentRoute() {
                const mainContainer = document.getElementById('app');
                if (!mainContainer) return;
                const params = new URLSearchParams(window.location.search);
                const hash = window.location.hash;
                
                // عرض الصفحة بناءً على hash أو معامل view
                if (params.get('view') !== null && params.get('slug') && params.get('data')) {
                    const slug = params.get('slug');
                    const dataEnc = params.get('data');
                    this.renderViewScreen(mainContainer, slug, dataEnc);
                } else if (hash === '#dashboard') {
                    this.renderDashboard(mainContainer);
                } else {
                    this.renderHome(mainContainer);
                }
            },
            
            initRouting() {
                this.handleDirectApi();     // إذا كان api/json مباشر نعرض JSON بدون واجهة
                this.renderCurrentRoute();
                window.addEventListener('hashchange', () => {
                    if (this.handleDirectApi()) return;
                    this.renderCurrentRoute();
                });
                window.addEventListener('popstate', () => {
                    if (this.handleDirectApi()) return;
                    this.renderCurrentRoute();
                });
            }
        };
        
        function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){ if(m === '&') return '&amp;'; if(m === '<') return '&lt;'; if(m === '>') return '&gt;'; return m;}); }
        
        window.App = App;
        document.addEventListener('DOMContentLoaded', () => App.initRouting());
    </script>
</body>
</html>
